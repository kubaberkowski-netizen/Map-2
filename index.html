a community crowdfunder brought it roaring back in 2017 \u2014 now a beloved Homerton two-screener with a bar and a fierce local following. Resurrection, one pledge at a time."},{id:"the-lexi-kensal-rise",n:"The Lexi Cinema",a:"Kensal Rise",pc:"NW10",lat:51.535,lng:-.22,c:"cinema",s:"UK's first social-enterprise cinema",q:"The Lexi Cinema Kensal Rise charity",w:"The UK's first social-enterprise cinema \u2014 charity-run and volunteer-staffed in Kensal Rise, donating its profits to a South African township project. A single screen with a conscience, and a properly good programme."},{id:"garden-cinema-covent-garden",n:"The Garden Cinema",a:"Covent Garden",pc:"WC2B",lat:51.516,lng:-.121,c:"cinema",s:"Plush new arthouse, 2022",q:"The Garden Cinema Covent Garden",w:"An independent arthouse that opened in 2022 on Parker Street \u2014 all velvet, warm lighting and thoughtful repertory programming. A plush, grown-up antidote to the multiplex, hidden in plain sight near Holborn."},{id:"honest-jons-portobello",n:"Honest Jon's",a:"Notting Hill",pc:"W10",lat:51.521,lng:-.205,c:"vinyl",s:"Portobello's jazz-to-dub mecca",q:"Honest Jon's Portobello record shop",w:"Trading since 1974, first from a former butcher's where records sat on the old marble counters \u2014 a Portobello mecca for jazz, dub, soul and global sounds, and a record label in its own right. Crate-digging royalty."},{id:"rough-trade-east",n:"Rough Trade East",a:"Spitalfields",pc:"E1",lat:51.52,lng:-.072,c:"vinyl",s:"Brick Lane's gig-and-vinyl hub",q:"Rough Trade East Brick Lane",w:"The biggest of the Rough Trade shops, inside the Old Truman Brewery off Brick Lane \u2014 vast racks, in-store gigs, coffee and a wall of new vinyl. The flagship of the label that gave punk and post-punk a home."},{id:"sounds-of-the-universe",n:"Sounds of the Universe",a:"Soho",pc:"W1F",lat:51.514,lng:-.134,c:"vinyl",s:"Soul Jazz label HQ",q:"Sounds of the Universe Soho records",w:"Born as a Camden market stall, now a Broadwick Street cornerstone and home of the brilliant Soul Jazz label \u2014 reggae, funk, house, library music and reissues for serious diggers. Soho's deepest record room."},{id:"reckless-records-soho",n:"Reckless Records",a:"Soho",pc:"W1F",lat:51.514,lng:-.137,c:"vinyl",s:"On the Oasis album cover",q:"Reckless Records Berwick Street Soho",w:"A second-hand institution on Berwick Street since 1984 \u2014 and a slice of Britpop history, its shopfront immortalised on the cover of Oasis's Morning Glory. Browse the racks where the photo was shot."},{id:"flashback-islington",n:"Flashback Records",a:"Islington",pc:"N1",lat:51.538,lng:-.098,c:"vinyl",s:"Essex Road crate-digging",q:"Flashback Records Islington Essex Road",w:"A North London institution since 1997, the Essex Road flagship hides a basement trove beneath a well-curated ground floor \u2014 secondhand and new across every genre, generously priced. A proper afternoon's dig."},{id:"casbah-greenwich",n:"Casbah Records",a:"Greenwich",pc:"SE10",lat:51.481,lng:-.009,c:"vinyl",s:"Greenwich crate-digging cosy",q:"Casbah Records Greenwich",w:"A cosy Greenwich independent specialising in 60s and 70s pop, rock, soul, funk and cult soundtracks \u2014 the kind of small, knowledgeable shop where you go in for one record and leave with five."},{id:"princess-louise-holborn",n:"The Princess Louise",a:"Holborn",pc:"WC1V",lat:51.517,lng:-.12,c:"pub",s:"Victorian gin-palace, snob screens",q:"Princess Louise Holborn Victorian interior",w:"Built in 1872 with a sumptuous 1891 interior, this Grade II*-listed High Holborn pub keeps its rare Victorian 'snob screens' and etched-glass snugs intact \u2014 drinking in a gin-palace that time forgot, at Sam Smith's prices."},{id:"black-friar-blackfriars",n:"The Black Friar",a:"Blackfriars",pc:"EC4V",lat:51.512,lng:-.104,c:"pub",s:"Art Nouveau wedge masterpiece",q:"Black Friar pub Blackfriars Art Nouveau",w:"A wedge-shaped 1875 pub remodelled around 1905 into an Arts-and-Crafts jewel \u2014 friezes of jolly monks in marble, mosaic and bronze, saved from demolition by a campaign John Betjeman fronted. Quite possibly London's most beautiful pub interior."},{id:"cittie-of-yorke-holborn",n:"Cittie of Yorke",a:"Holborn",pc:"WC1V",lat:51.518,lng:-.112,c:"pub",s:"Cathedral-like long bar",q:"Cittie of Yorke Holborn pub",w:"A High Holborn pub with one of the longest bars in Britain, soaring triangular roof trusses and a row of cosy wooden cubicles \u2014 a vast, cathedral-like hall on a site that's served drinkers since the 15th century."},{id:"the-grenadier-belgravia",n:"The Grenadier",a:"Belgravia",pc:"SW1X",lat:51.501,lng:-.153,c:"pub",s:"Haunted duel pub, notes on the ceiling",q:"The Grenadier Belgravia ghost Wilton Row",w:"Hidden down a Belgravia mews on Wilton Row, this 1818 pub began as an officers' mess \u2014 sentry box still outside, ceiling papered with banknotes, and a famous (if unprovable) ghost. A duel-haunted bolt-hole behind the grand houses."},{id:"seven-stars-carey-street",n:"The Seven Stars",a:"Holborn",pc:"WC2A",lat:51.515,lng:-.113,c:"pub",s:"1602 pub behind the law courts",q:"Seven Stars Carey Street Holborn",w:"Established in 1602 \u2014 fourteen years before Shakespeare died \u2014 this tiny pub behind the Royal Courts of Justice survived the Great Fire and still pulls in barristers and a famously well-dressed pub cat. Four centuries of legal gossip."},{id:"sky-garden",n:"Sky Garden",a:"City of London",pc:"EC3M",lat:51.511,lng:-.083,c:"view",s:"Free 'Walkie-Talkie' garden",q:"Sky Garden Fenchurch Street free booking",w:"The free public garden atop the 'Walkie-Talkie' at 20 Fenchurch Street \u2014 three storeys of palms and lookout terraces on the 35th floor, with sweeping Thames views. Book a (free) slot ahead; arrive for sunset if you can."},{id:"horizon-22",n:"Horizon 22",a:"City of London",pc:"EC2N",lat:51.515,lng:-.082,c:"view",s:"Europe's highest free viewpoint",q:"Horizon 22 Bishopsgate free viewing",w:"Opened in 2023 on the 58th floor of 22 Bishopsgate, Horizon 22 is Europe's highest free public viewing gallery \u2014 254 metres up, looking down on the Shard and the whole City sprawl. Free, but book ahead."},{id:"garden-at-120",n:"The Garden at 120",a:"City of London",pc:"EC3M",lat:51.512,lng:-.082,c:"view",s:"Free rooftop garden, no booking",q:"Garden at 120 Fen Court rooftop",w:"The City's largest public roof garden, on the 15th floor of Fen Court \u2014 wisteria walkways, a fountain and open-air views of the surrounding towers, with no booking and no charge. The easy, uncrowded rooftop."},{id:"one-new-change-roof",n:"One New Change Roof Terrace",a:"City of London",pc:"EC4M",lat:51.514,lng:-.095,c:"view",s:"Framed St Paul's close-up",q:"One New Change roof terrace St Paul's",w:"A free sixth-floor roof terrace atop the One New Change centre, delivering an unusually intimate, eye-level view of St Paul's dome \u2014 close enough to count the stonework. The best free St Paul's photo in London."},{id:"parliament-hill",n:"Parliament Hill",a:"Hampstead Heath",pc:"NW5",lat:51.559,lng:-.156,c:"view",s:"The classic free Heath panorama",q:"Parliament Hill view Hampstead Heath",w:"A protected viewpoint on Hampstead Heath whose sightline to St Paul's is shielded by law \u2014 kite-fliers, swimmers and the whole city laid out below. The classic, free, no-queue London panorama; bring a flask."},{id:"greenwich-wolfe-statue",n:"General Wolfe Statue Viewpoint",a:"Greenwich",pc:"SE10",lat:51.477,lng:-.001,c:"view",s:"Maritime Greenwich to Canary Wharf",q:"General Wolfe statue Greenwich Park view",w:"The terrace by the General Wolfe statue at the top of Greenwich Park frames the Old Royal Naval College, the Thames and Canary Wharf in one sweep \u2014 Wren's baroque maritime London with the towers rising behind. Unforgettable at dusk."},{id:"severndroog-castle",n:"Severndroog Castle",a:"Oxleas Wood",pc:"SE18",lat:51.464,lng:.064,c:"view",s:"Gothic folly above the woods",q:"Severndroog Castle Oxleas Wood viewpoint",w:"A Gothic triangular folly built in 1784 in Oxleas Wood on Shooter's Hill, commemorating a colonial siege \u2014 and, on clear days, offering views over several counties from its tower. A genuinely secret South-East London lookout in the trees."},{id:"tooting-bec-lido",n:"Tooting Bec Lido",a:"Tooting",pc:"SW16",lat:51.429,lng:-.159,c:"lido",s:"UK's largest freshwater pool, 1906",q:"Tooting Bec Lido history",w:"Opened in 1906, this is the UK's largest freshwater pool by surface area \u2014 a vast, cold, gloriously unheated expanse ringed by candy-coloured changing cubicles. South London's great democratic swim, beloved by hardy year-round bathers."},{id:"parliament-hill-lido",n:"Parliament Hill Lido",a:"Gospel Oak",pc:"NW5",lat:51.555,lng:-.154,c:"lido",s:"Art Deco unheated steel, 1938",q:"Parliament Hill Lido Gospel Oak",w:"A Grade II-listed 1938 lido on the edge of Hampstead Heath, famous for its gleaming stainless-steel pool \u2014 bracingly unheated and open year-round. Art Deco municipal swimming at its most photogenic."},{id:"brockwell-lido",n:"Brockwell Lido",a:"Herne Hill",pc:"SE24",lat:51.453,lng:-.105,c:"lido",s:"'Brixton Beach' Art Deco icon",q:"Brockwell Lido Herne Hill",w:"A 1937 Art Deco lido nicknamed 'Brixton Beach,' ringed by Grade II-listed redbrick \u2014 a sun-trap of a summer institution between Herne Hill and Brixton. (Its operator's status has wobbled lately; check before you go.)"},{id:"hampstead-mixed-pond",n:"Hampstead Heath Mixed Bathing Pond",a:"Hampstead Heath",pc:"NW3",lat:51.564,lng:-.161,c:"lido",s:"Wild swimming, three ponds",q:"Hampstead Heath bathing ponds swimming",w:"The Heath's spring-fed bathing ponds \u2014 Men's, Ladies' and Mixed \u2014 offer genuine wild swimming a few miles from the West End, among ducks and willow. Cold, clear and quietly addictive; lifeguarded in season."},{id:"london-fields-lido",n:"London Fields Lido",a:"London Fields",pc:"E8",lat:51.541,lng:-.062,c:"lido",s:"Heated Olympic-size, floodlit",q:"London Fields Lido Hackney",w:"A 50-metre heated outdoor pool kept around 25\xB0C year-round and floodlit at dawn \u2014 Hackney's beloved Olympic-size lido, busy in summer, blissfully steaming in winter. The rare London lido you can happily swim in come January."},{id:"serpentine-lido",n:"The Serpentine Lido",a:"Hyde Park",pc:"W2",lat:51.505,lng:-.165,c:"lido",s:"Hyde Park's Peter Pan Cup",q:"Serpentine Lido Hyde Park swimming",w:"A roped-off swimming stretch of the Serpentine in Hyde Park, home to the Serpentine Swimming Club, who race for the Peter Pan Cup on Christmas morning. Open-water swimming in the very middle of the city."},{id:"pickering-place",n:"Pickering Place",a:"St James's",pc:"SW1A",lat:51.505,lng:-.139,c:"alley",s:"Smallest square, last duel",q:"Pickering Place St James's Texas Legation",w:"Reached through a wood-panelled passage beside wine merchant Berry Bros. & Rudd, Pickering Place is said to be London's smallest public square \u2014 a hushed Georgian courtyard that once saw duels and briefly housed the Texas Legation. A pocket of the 1700s off St James's."},{id:"brydges-place",n:"Brydges Place",a:"Covent Garden",pc:"WC2N",lat:51.51,lng:-.128,c:"alley",s:"London's narrowest alley",q:"Brydges Place narrowest alley London",w:"Running beside the Coliseum off St Martin's Lane, Brydges Place is claimed to be London's narrowest alley \u2014 barely shoulder-wide for much of its length, opening to a single hidden bar at the far end. Turn sideways and squeeze through."},{id:"crown-passage",n:"Crown Passage",a:"St James's",pc:"SW1Y",lat:51.506,lng:-.138,c:"alley",s:"Time-warp St James's lane",q:"Crown Passage St James's",w:"A narrow pedestrian lane between Pall Mall and King Street, lined with old-school shops, a sandwich bar and one of London's oldest pubs \u2014 a genuine time-warp slice of St James's the tourists walk straight past."},{id:"ely-place",n:"Ely Place & Ely Court",a:"Holborn",pc:"EC1N",lat:51.519,lng:-.108,c:"alley",s:"Private street, hidden chapel",q:"Ely Place Holborn St Etheldreda's",w:"A gated private street that was the London estate of the Bishops of Ely and was long treated as a legal piece of Cambridgeshire \u2014 hiding St Etheldreda's, a rare 13th-century chapel, and (via Ely Court) the snug Ye Olde Mitre. A curiosity inside a curiosity."},{id:"lovat-lane",n:"Lovat Lane",a:"City of London",pc:"EC3R",lat:51.509,lng:-.084,c:"alley",s:"Cobbled medieval City lane",q:"Lovat Lane City of London cobbles",w:"A steep, cobbled City lane with a central gutter \u2014 a rare survival of the medieval street pattern, curving between Eastcheap and the river past the spire of St Mary-at-Hill. Two minutes from the glass towers, six centuries away."},{id:"christchurch-gardens",n:"Christchurch Gardens",a:"Westminster",pc:"SW1E",lat:51.498,lng:-.137,c:"death",s:"1665 plague burials under a park",q:"Christchurch Gardens Victoria Street plague pit",w:"A pocket of green between Victoria Street and the buses, pressed into service as a plague burying ground in 1665 and later a churchyard \u2014 now lawns and benches where office workers eat lunch above the dead. A Suffragette memorial stands at its edge; the burials lie quietly beneath."},{id:"bedlam-burial-ground",n:"Bedlam Burial Ground",a:"Liverpool Street",pc:"EC2M",lat:51.5178,lng:-.0815,c:"death",s:"~25,000 dead beneath the Elizabeth line",q:"Bedlam burial ground Liverpool Street New Churchyard Crossrail",w:"The 'New Churchyard' beside Bethlem hospital took some 25,000 Londoners from the 1560s \u2014 plague dead, paupers and the odd executed radical \u2014 until Crossrail's diggers reached them in the 2010s. A small commemorative space near Liverpool Street now marks one of the city's great forgotten cemeteries."},{id:"east-smithfield-cemetery",n:"East Smithfield Black Death Cemetery",a:"Tower Hill",pc:"E1W",lat:51.508,lng:-.071,c:"death",s:"Emergency Black Death pit, 1348",q:"East Smithfield Black Death cemetery Royal Mint 1348",w:"When the Black Death overwhelmed London in 1348 the city opened an emergency cemetery here by the Tower \u2014 neat rows of plague victims later excavated beneath the old Royal Mint, their bones yielding the DNA that confirmed Yersinia pestis. Walk the pavement above one of the pandemic's best-studied graves."},{id:"isleworth-all-saints",n:"All Saints Isleworth Plague Pit",a:"Isleworth",pc:"TW7",lat:51.4745,lng:-.3215,c:"death",s:"Thames-side pit, marked by a yew",q:"All Saints Isleworth plague pit yew tree",w:"In the riverside churchyard of All Saints, a dark old yew is said to mark a pit where Isleworth buried its plague dead. A quiet Thames-path detour where the village's losses lie under the grass beside the water."},{id:"clerkenwell-detention",n:"Clerkenwell House of Detention",a:"Clerkenwell",pc:"EC1R",lat:51.524,lng:-.1078,c:"history",s:"Victorian prison vaults under a school",q:"Clerkenwell House of Detention catacombs",w:"Beneath a Clerkenwell school survive the brick vaults of a Victorian remand prison that once held nearly 300 at a time \u2014 damp, echoing tunnels locals call the Clerkenwell Catacombs. Rarely open, and a favourite film set, but you walk right above it on the green."},{id:"morpeth-arms",n:"The Morpeth Arms",a:"Millbank",pc:"SW1P",lat:51.4905,lng:-.1278,c:"pub",s:"Pub above Millbank prison cells",q:"Morpeth Arms Millbank prison cells ghost",w:"A handsome 1845 riverside pub built for the warders of the vast Millbank Penitentiary \u2014 whose holding cells still lurk in the cellar, complete with a resident ghost the staff swear by. Drink a pint by the Thames where convicts once waited for transportation to Australia."},{id:"viaduct-tavern",n:"The Viaduct Tavern",a:"Holborn",pc:"EC1A",lat:51.5163,lng:-.1018,c:"pub",s:"Gin palace over Newgate cells",q:"Viaduct Tavern Newgate prison cells gin palace",w:"London's last great Victorian gin palace, all etched glass and beaten copper, sitting opposite the Old Bailey \u2014 and, the landlords will tell you, atop cells salvaged from Newgate Prison in its cellar. Ask nicely and you might see them; either way, admire one of the City's most ornate interiors."},{id:"st-brides-charnel",n:"St Bride's Church & Charnel House",a:"Fleet Street",pc:"EC4Y",lat:51.5143,lng:-.1053,c:"death",s:"Wren's printing church, bones below",q:"St Bride's Fleet Street crypt charnel house bones",w:"Wren's tiered 'wedding-cake' spire (said to have inspired the cake itself) crowns the journalists' church off Fleet Street \u2014 but the Blitz that gutted it also opened a crypt packed with centuries of bones, now a quietly macabre charnel house and museum. Printing history above, the dead below."},{id:"order-of-st-john-crypt",n:"Museum of the Order of St John Crypt",a:"Clerkenwell",pc:"EC1M",lat:51.5228,lng:-.1018,c:"medieval",s:"12th-century Hospitaller crypt",q:"Museum Order of St John Clerkenwell crypt St John's Gate",w:"Behind St John's Gate, a rare survival: the 12th-century crypt of the Knights Hospitaller's English priory, thick-walled and solemn, holding medieval effigies and an alabaster Spanish knight. Crusader history hidden under quiet Clerkenwell, and free to visit."},{id:"garden-museum-crypt",n:"Garden Museum Crypt",a:"Lambeth",pc:"SE1",lat:51.4945,lng:-.1218,c:"death",s:"Tombs beside Lambeth Palace",q:"Garden Museum St Mary-at-Lambeth crypt Tradescant Bligh tomb",w:"The old church of St Mary-at-Lambeth, saved from demolition as the Garden Museum, hides a glass-floored crypt and a churchyard of remarkable tombs \u2014 the plant-hunter Tradescants and Captain Bligh of the Bounty among them. Horticulture, history and the dead, in the shadow of Lambeth Palace."},{id:"whitefriars-crypt",n:"Whitefriars Crypt",a:"Fleet Street",pc:"EC4Y",lat:51.5125,lng:-.1075,c:"medieval",s:"Carmelite vault under an office",q:"Whitefriars crypt Carmelite monastery Fleet Street Magpie Alley",w:"All that remains of a great Carmelite friary that once sprawled between Fleet Street and the river: a single medieval stone undercroft, now improbably preserved in the basement of a modern office off Magpie Alley. A 700-year-old secret beneath the glass."},{id:"greenwich-foot-tunnel",n:"Greenwich Foot Tunnel",a:"Cutty Sark Gardens",pc:"SE10",lat:51.4828,lng:-.0104,c:"oddity",s:"Subterranean Victorian walk",q:"Greenwich Foot Tunnel under Thames",w:"Opened in 1902 to replace the unreliable ferry for dock workers, this 370-metre cast-iron tunnel lets you walk directly beneath the Thames. Lined with 200,000 glazed white tiles, it is an echoing, surreal passage that feels completely detached from the city above \u2014 emerge on the Isle of Dogs for the classic Wren-framed view back at Greenwich."},{id:"tulip-stairs",n:"The Tulip Stairs",a:"Queen's House, Greenwich",pc:"SE10",lat:51.4811,lng:-.0037,c:"history",s:"Britain's first self-supporting spiral",q:"Tulip Stairs Queen's House Greenwich",w:"Tucked inside Inigo Jones's Queen's House is the first geometric, self-supporting spiral staircase in Britain, built in the 1630s \u2014 the wrought-iron flowers in the balustrade give it its name. An architectural marvel, and famously the site of the 1966 'Rev. R. W. Hardy' ghost photograph that still draws the curious. Free to visit."},{id:"asylum-chapel",n:"Asylum Chapel",a:"Caroline Gardens, Peckham",pc:"SE15",lat:51.4785,lng:-.0531,c:"history",s:"A cinematic ruin",q:"Asylum Chapel Caroline Gardens Peckham",w:"A Grade II listed chapel built in 1826 for retired pub landlords, bombed in the war and never fully restored. Today it stands as a beautifully weathered ruin \u2014 peeling paint, fractured stained glass, raw stone open to the light \u2014 and one of London's most photographed event spaces. Check listings; it opens for exhibitions and the odd ceremony."},{id:"abbey-mills",n:"Abbey Mills Pumping Station",a:"Abbey Lane, Stratford",pc:"E15",lat:51.5312,lng:3e-4,c:"oddity",s:"The Cathedral of Sewage",q:"Abbey Mills Pumping Station Bazalgette",w:"Bazalgette's 1868 'Cathedral of Sewage' \u2014 a Byzantine-style temple of public health built to lift London's effluent into the great Northern Outfall sewer. Absurdly grand: cruciform plan, jewel-bright ironwork, Moorish detailing on a building for pumping waste. The exterior alone, glimpsed from the Greenway, is one of the city's strangest sights."},{id:"aldwych-station",n:"Aldwych Underground Station",a:"Strand",pc:"WC2R",lat:51.5115,lng:-.1165,c:"history",s:"London's famous ghost station",q:"Aldwych ghost station Strand disused Underground",w:"Closed in 1994, this 'ghost station' sheltered Londoners during the Blitz and hid the British Museum's Elgin Marbles from the bombs. Now preserved in amber and a favourite film set (Atonement, Sherlock). Interior access needs a rare Transport Museum tour, but the original oxblood-tiled fa\xE7ade on the Strand is a monument to London legend in its own right."},{id:"handel-hendrix",n:"Handel & Hendrix",a:"Brook Street, Mayfair",pc:"W1K",lat:51.5129,lng:-.1462,c:"plaque",s:"Neighbours, 200 years apart",q:"Handel Hendrix House Brook Street",w:"Jimi Hendrix lived at No. 23 (1968-69) right next door to where Handel composed Messiah at No. 25 \u2014 two English Heritage blue plaques side by side, now a joint museum. Hendrix cheerfully admitted he'd 'never heard much of the fella's stuff.'"},{id:"freddie-feltham",n:"Freddie Mercury's Family Home",a:"Gladstone Avenue, Feltham",pc:"TW13",lat:51.4459,lng:-.4163,c:"plaque",s:"Where Zanzibar met Queen",q:"Freddie Mercury house 22 Gladstone Avenue Feltham",w:"The unassuming terrace where the Mercury family settled after fleeing Zanzibar in 1964; Freddie was living here when he met Brian May and Roger Taylor. The plaque was unveiled in 2016 by May and Freddie's sister \u2014 a true Queen-fan pilgrimage out west."},{id:"chaplin-brixton",n:"Charlie Chaplin's Flat",a:"Glenshaw Mansions, Brixton",pc:"SW9",lat:51.472,lng:-.113,c:"plaque",s:"A cherished haven",q:"Charlie Chaplin plaque Glenshaw Mansions Brixton Road",w:"The flat Chaplin shared with his brother Sydney (1908-10) at the very start of his career \u2014 a 'cherished haven' after one of the most brutal childhoods in Victorian London. Plaque unveiled by Paul Merton in 2017."},{id:"agatha-christie-home",n:"Agatha Christie's House",a:"Sheffield Terrace, Holland Park",pc:"W8",lat:51.5076,lng:-.1969,c:"plaque",s:"Murder she wrote here",q:"Agatha Christie 58 Sheffield Terrace plaque",w:"Where Christie wrote Murder on the Orient Express, Death on the Nile and The ABC Murders \u2014 three of the most-adapted mysteries ever written, all from one quiet house five minutes from Notting Hill Gate."},{id:"bacon-studio",n:"Francis Bacon's Studio",a:"Reece Mews, South Kensington",pc:"SW7",lat:51.4936,lng:-.174,c:"plaque",s:"Chaos as a studio",q:"Francis Bacon studio 7 Reece Mews",w:"The cramped mews where Bacon lived and painted for over 30 years until 1992, in a legendary chaos of slashed canvases and paint-smeared walls \u2014 the room that produced Three Studies for a Crucifixion (the studio itself was later moved, brick by brick, to Dublin)."},{id:"mary-seacole-soho",n:"Mary Seacole's Home",a:"Soho Square",pc:"W1D",lat:51.5155,lng:-.132,c:"plaque",s:"The other Crimean nurse",q:"Mary Seacole 14 Soho Square plaque",w:"The Jamaican-British heroine of the Crimean War \u2014 who funded her own passage to nurse soldiers when the War Office turned her away \u2014 lived here in the 1850s. Her only known surviving London home."},{id:"turing-maida-vale",n:"Alan Turing's Birthplace",a:"Warrington Crescent, Maida Vale",pc:"W9",lat:51.5239,lng:-.186,c:"plaque",s:"Born here, broke Enigma",q:"Alan Turing 2 Warrington Crescent plaque",w:"The birthplace of the codebreaker and father of computer science, whose Bletchley Park work is credited with shortening the war by years \u2014 and who was then hounded to his death by the state he saved."},{id:"napoleon-iii-plaque",n:"The Napoleon III Plaque",a:"King Street, St James's",pc:"SW1Y",lat:51.507,lng:-.137,c:"plaque",s:"The oldest plaque, 1867",q:"Napoleon III blue plaque King Street St James's",w:"The oldest surviving official London blue plaque, and the only one ever installed in its subject's own lifetime \u2014 it bears the imperial eagle and marks the exiled emperor's London lodgings."},{id:"douglas-adams-grave",n:"Douglas Adams' Grave",a:"Highgate Cemetery East",pc:"N6",lat:51.5666,lng:-.1455,c:"death",s:"Leave a pen",q:"Douglas Adams grave Highgate Cemetery East",w:"Fans leave pens and pencils in a pot before the plain dark headstone \u2014 a quiet running joke for the author of The Hitchhiker's Guide to the Galaxy. One of the cemetery's most-visited modern graves."},{id:"caulfield-dead",n:"Patrick Caulfield's 'DEAD' Grave",a:"Highgate Cemetery East",pc:"N6",lat:51.5665,lng:-.145,c:"death",s:"Says it like it is",q:"Patrick Caulfield DEAD gravestone Highgate",w:"The Pop artist secretly designed his own headstone: the single laser-cut word 'DEAD' pierced clean through the stone in his own Art Deco lettering. Asked what his epitaph should read, he reputedly replied: 'Dead, of course.'"},{id:"mclaren-grave",n:"Malcolm McLaren's Grave",a:"Highgate Cemetery East",pc:"N6",lat:51.5663,lng:-.1442,c:"death",s:"A spectacular failure",q:"Malcolm McLaren grave Highgate Cemetery",w:"The Sex Pistols' manager lies under a bronze death mask, about 100 yards from Karl Marx, beneath the epitaph 'Better a spectacular failure, than a benign success' \u2014 the words of his old art-school teacher."},{id:"george-michael-grave",n:"George Michael's Grave",a:"Highgate Cemetery West",pc:"N6",lat:51.5674,lng:-.1489,c:"death",s:"Beloved son and brother",q:"George Michael grave Highgate Cemetery West",w:"In the family plot beside his mother and sister, the monument bears his birth name, Georgios Kyriacos Panayiotou. The West side is ticketed and tributes are gently discouraged \u2014 visit quietly and with respect."},{id:"faraday-grave",n:"Michael Faraday's Grave",a:"Highgate Cemetery West",pc:"N6",lat:51.567,lng:-.148,c:"death",s:"The modest genius",q:"Michael Faraday grave Highgate Cemetery West",w:"A deliberately plain Sandemanian headstone for the self-taught giant of electromagnetism \u2014 who turned down a knighthood and burial in Westminster Abbey for exactly this kind of modesty."},{id:"wombwell-lion",n:"George Wombwell's Lion Tomb",a:"Highgate Cemetery West",pc:"N6",lat:51.5668,lng:-.1478,c:"death",s:"Nero sleeps on top",q:"George Wombwell lion tomb Highgate Cemetery",w:"The Victorian travelling-menagerie owner is buried beneath a stone sculpture of his star attraction \u2014 Nero, the lion so gentle he famously refused to fight the baiting dogs set on him."},{id:"cross-bones",n:"Cross Bones Graveyard",a:"Redcross Way, Southwark",pc:"SE1",lat:51.5036,lng:-.0922,c:"death",s:"The outcast dead",q:"Cross Bones Graveyard Redcross Way Southwark",w:"An unconsecrated pauper burial ground for the 'Winchester Geese' \u2014 the medieval Bankside sex-workers licensed by the Bishop. The red gates are festooned with ribbons and tokens, and a vigil is held at 7pm on the 23rd of every month."},{id:"bram-stoker-urn",n:"Bram Stoker's Urn",a:"Golders Green Crematorium",pc:"NW11",lat:51.579,lng:-.198,c:"death",s:"Dracula's ashes",q:"Bram Stoker ashes Golders Green Crematorium columbarium",w:"The author of Dracula rests as ashes in an urn in the columbarium \u2014 viewable only by staff escort, a small final touch of gothic inaccessibility for the man who gave the world the Count."},{id:"notting-hill-door",n:"The Notting Hill Blue Door",a:"Westbourne Park Road",pc:"W11",lat:51.518,lng:-.201,c:"film",s:"Whoops-a-daisy",q:"Notting Hill blue door 280 Westbourne Park Road",w:"The (now replica) blue door of William Thacker's flat from Notting Hill \u2014 the original was auctioned for charity after the film. Pure rom-com pilgrimage; mind the queue for a photo."},{id:"mr-gruber-portobello",n:"Mr Gruber's Shop",a:"Portobello Road",pc:"W11",lat:51.516,lng:-.205,c:"film",s:"Paddington's antique stop",q:"Alice's Antiques 86 Portobello Road Paddington",w:"The cluttered antiques shop that plays Mr Gruber's in the Paddington films \u2014 and it's a genuine Portobello institution, every bit as eccentric off screen as on."},{id:"brown-house-chalcot",n:"The Brown Family House",a:"Chalcot Crescent, Primrose Hill",pc:"NW1",lat:51.539,lng:-.154,c:"film",s:"Paddington's front door",q:"Chalcot Crescent Paddington Brown family house",w:"A pastel-fronted house on a perfect curve of Primrose Hill stuccoes plays the Browns' home in the Paddington films. The whole crescent is an Instagram set-piece in its own right."},{id:"savoy-court",n:"Savoy Court",a:"Strand",pc:"WC2R",lat:51.5101,lng:-.1205,c:"film",s:"Drive on the right",q:"Savoy Court Strand drive on the right",w:"The only stretch of public road in Britain where you legally drive on the right \u2014 and the art-deco hotel entrance at its end is the setting for the climactic scene of The Long Good Friday."},{id:"eaton-place-165",n:"165 Eaton Place",a:"Belgravia",pc:"SW1X",lat:51.4965,lng:-.153,c:"film",s:"Upstairs, downstairs",q:"165 Eaton Place Upstairs Downstairs Belgravia",w:"The real Belgravia townhouse used for the exterior shots of the classic series Upstairs, Downstairs \u2014 the front door behind which a whole world of Edwardian servants and masters was imagined."},{id:"clash-steps-camden",n:"The Clash Steps",a:"Stables Market, Camden",pc:"NW1",lat:51.5418,lng:-.147,c:"music",s:"Punk's photo op",q:"The Clash debut album steps Stables Market Camden",w:"The trolley ramp outside the old Rehearsal Rehearsals where The Clash were shot for their 1977 debut album cover. Punk pilgrims still line up to recreate the pose in the railway arches."},{id:"battersea-animals",n:"Battersea Power Station",a:"Battersea",pc:"SW11",lat:51.482,lng:-.144,c:"music",s:"Mind the flying pig",q:"Battersea Power Station Pink Floyd Animals pig",w:"The building on Pink Floyd's Animals sleeve \u2014 during the 1976 shoot the inflatable pig broke its moorings and drifted off over Kent, grounding flights at Heathrow. Now a vast redeveloped destination in its own right."},{id:"word-on-the-water",n:"Word on the Water",a:"Regent's Canal, King's Cross",pc:"N1C",lat:51.5343,lng:-.1257,c:"literary",s:"The floating bookshop",q:"Word on the Water canal bookshop King's Cross",w:"A 1920s Dutch barge moored on the canal, selling new and second-hand books from its decks with live jazz and poetry on the roof. One of the most photographed shops in London, and far lovelier than the photos."},{id:"hatchards",n:"Hatchards",a:"Piccadilly",pc:"W1J",lat:51.5085,lng:-.139,c:"literary",s:"London's oldest bookshop, 1797",q:"Hatchards Piccadilly bookshop",w:"Founded in 1797 and at 187 Piccadilly since 1810 \u2014 royal-warranted, arranged like a private townhouse over five creaking floors, and still the most civilised place in London to lose an afternoon."},{id:"gays-the-word",n:"Gay's the Word",a:"Bloomsbury",pc:"WC1N",lat:51.526,lng:-.125,c:"literary",s:"The UK's last queer bookshop",q:"Gay's the Word bookshop Bloomsbury",w:"Britain's first and only surviving dedicated LGBTQ+ bookshop (1979) \u2014 raided by Customs in the eighties, ransacked by protesters in 2018, and still standing as what Sarah Waters called 'the hub and affirmation of a whole community.'"},{id:"persephone-books",n:"Persephone Books",a:"Bloomsbury",pc:"WC1N",lat:51.524,lng:-.123,c:"literary",s:"Lost women writers",q:"Persephone Books Bloomsbury grey covers",w:"A publisher and shop reviving neglected (mostly women) writers of the 20th century, each reissued in the same elegant dove-grey cover with a patterned endpaper. A quietly radical act of literary rescue."},{id:"brick-lane-bookshop",n:"Brick Lane Bookshop",a:"Spitalfields",pc:"E1",lat:51.522,lng:-.072,c:"literary",s:"The East End's own",q:"Brick Lane Bookshop Spitalfields",w:"A fiercely independent shop specialising in London and East End writing, running its own short story prize. Small, opinionated, and exactly the kind of place algorithms can't replace."},{id:"libreria-shop",n:"Libreria",a:"Spitalfields",pc:"E1",lat:51.52,lng:-.072,c:"literary",s:"No phones, themed shelves",q:"Libreria bookshop Hanbury Street no phones",w:"A jewel-box shop by architects SelgasCano where books are shelved not by genre but by mood \u2014 'Wanderlust', 'Enchantment for the Disenchanted' \u2014 under a strict no-phones policy designed to make you actually read."},{id:"books-for-cooks",n:"Books for Cooks",a:"Notting Hill",pc:"W11",lat:51.517,lng:-.205,c:"literary",s:"Best-smelling shop in London",q:"Books for Cooks Notting Hill cookbook shop",w:"A cookbook specialist with a tiny test kitchen at the back, where staff cook recipes straight off the shelves and feed them to browsing customers. The smell alone is worth the trip."},{id:"stanfords",n:"Stanfords",a:"Covent Garden",pc:"WC2H",lat:51.5125,lng:-.126,c:"literary",s:"Maps since 1853",q:"Stanfords map travel bookshop Covent Garden Mercer Walk",w:"The legendary travel and map shop, founded 1853 and name-checked in The Hound of the Baskervilles \u2014 where explorers from Scott to Livingstone bought their charts. Now on Mercer Walk, floors of maps and guides intact."},{id:"new-beacon-books",n:"New Beacon Books",a:"Finsbury Park",pc:"N4",lat:51.564,lng:-.106,c:"literary",s:"UK's first Black publisher",q:"New Beacon Books Finsbury Park",w:"Founded in 1966 by poet John La Rose as Britain's first Black publisher and specialist bookshop \u2014 a cornerstone of Black British intellectual life and the Caribbean Artists Movement."},{id:"terroni-clerkenwell",n:"Terroni of Clerkenwell",a:"Clerkenwell",pc:"EC1R",lat:51.5226,lng:-.1075,c:"diaspora",s:"England's oldest deli, 1878",q:"Terroni of Clerkenwell Italian deli",w:"When Luigi Terroni opened here in 1878 it was, reputedly, the first delicatessen in all of England \u2014 set in old 'Little Italy' beside St Peter's Italian Church, and still slicing salami a century and a half on."},{id:"st-peters-italian",n:"St Peter's Italian Church",a:"Clerkenwell Road",pc:"EC1R",lat:51.523,lng:-.108,c:"diaspora",s:"Little Italy's basilica",q:"St Peter's Italian Church Clerkenwell",w:"The first Italian church built outside Italy (1863), modelled on a basilica in Rome's Trastevere \u2014 still the heart of Little Italy, with its huge July Procession of Our Lady of Mount Carmel through the streets of Clerkenwell."},{id:"sandys-row-synagogue",n:"Sandys Row Synagogue",a:"Spitalfields",pc:"E1",lat:51.518,lng:-.077,c:"diaspora",s:"Oldest Ashkenazi shul",q:"Sandys Row Synagogue Spitalfields",w:"London's oldest surviving Ashkenazi synagogue, founded in 1854 by fifty poor Dutch-Jewish families inside a 1766 ex-Huguenot chapel \u2014 a building that has sheltered two waves of immigrants under one roof."},{id:"bevis-marks",n:"Bevis Marks Synagogue",a:"City of London",pc:"EC3A",lat:51.515,lng:-.079,c:"diaspora",s:"Britain's oldest synagogue, 1701",q:"Bevis Marks Synagogue City of London",w:"Britain's oldest synagogue in continuous use, consecrated 1701 by London's Sephardi community \u2014 its candlelit interior, lit by hanging brass chandeliers, has barely changed in over three centuries."},{id:"windrush-square",n:"Windrush Square",a:"Brixton",pc:"SW2",lat:51.4625,lng:-.113,c:"diaspora",s:"Where Windrush is remembered",q:"Windrush Square Brixton Black Cultural Archives",w:"Renamed in 1998 for the 50th anniversary of the Empire Windrush, the square holds the UK's first African and Caribbean War Memorial and the Black Cultural Archives \u2014 the civic heart of Black Brixton."},{id:"fournier-street",n:"Fournier Street",a:"Spitalfields",pc:"E1",lat:51.519,lng:-.073,c:"diaspora",s:"Look up for weavers' lofts",q:"Fournier Street Spitalfields Huguenot houses",w:"The best-preserved early-Georgian street in Britain, built in the 1720s for Huguenot master silk-weavers \u2014 look up for the broad attic 'weavers' lights' that lit their looms, and for the lace-cuff hand door-knockers."},{id:"jamme-masjid",n:"London Jamme Masjid",a:"Brick Lane corner",pc:"E1",lat:51.5197,lng:-.0718,c:"diaspora",s:"Chapel, synagogue, mosque",q:"Brick Lane Jamme Masjid Fournier Street",w:"One building that has been, in turn, a 1743 Huguenot chapel, a Methodist mission, a synagogue and now a mosque \u2014 the whole story of immigrant Spitalfields in one set of walls, beneath a sundial reading 'Umbra sumus' (We are shadows)."},{id:"princelet-street-19",n:"19 Princelet Street",a:"Spitalfields",pc:"E1",lat:51.5195,lng:-.0725,c:"diaspora",s:"A hidden synagogue",q:"19 Princelet Street museum of immigration Spitalfields",w:"A fragile, unrestored Huguenot silk-merchant's house concealing a rare Victorian synagogue built over its garden \u2014 Britain's would-be museum of immigration, so delicate it opens only a handful of days a year."},{id:"gokyuzu-green-lanes",n:"G\xF6ky\xFCz\xFC",a:"Green Lanes, Harringay",pc:"N4",lat:51.579,lng:-.098,c:"food",s:"Mangal-mile landmark",q:"Gokyuzu Green Lanes Turkish restaurant",w:"The undisputed landmark of Green Lanes' Turkish 'mangal mile' \u2014 an ocakba\u015F\u0131 grill that once briefly topped TripAdvisor for all of London, where tables groan under mixed grills the size of small countries."},{id:"mangal-2-dalston",n:"Mangal 2",a:"Dalston",pc:"E8",lat:51.547,lng:-.075,c:"food",s:"Gilbert & George's canteen",q:"Mangal 2 Dalston ocakbasi",w:"The Dalston grill where artists Gilbert & George have famously dined almost nightly for decades \u2014 a charcoal ocakba\u015F\u0131 as known for its surreal social-media presence as for its lamb."},{id:"song-que-pho",n:"S\xF4ng Qu\xEA Caf\xE9",a:"Kingsland Road, Shoreditch",pc:"E2",lat:51.531,lng:-.077,c:"food",s:"The Pho Mile's green corner",q:"Song Que Cafe Kingsland Road pho",w:"The bright-green flagship of Kingsland Road's 'Pho Mile', drawing queues out the door since 2002. The bowl that taught a generation of Londoners what pho actually tastes like."},{id:"lisboa-patisserie",n:"Lisboa Patisserie",a:"South Lambeth",pc:"SW8",lat:51.479,lng:-.123,c:"bakery",s:"Past\xE9is in Little Portugal",q:"Lisboa Patisserie South Lambeth Road custard tart",w:"The custard-tart heart of London's Portuguese community on South Lambeth Road \u2014 strong bica, warm past\xE9is de nata, and a counter that has anchored Little Portugal for decades."},{id:"fish-wings-tings",n:"Fish, Wings & Tings",a:"Brixton Village",pc:"SW9",lat:51.4615,lng:-.115,c:"food",s:"Trinidadian institution",q:"Fish Wings and Tings Brixton Village",w:"A tiny, much-loved Caribbean kitchen in Brixton Village from a Trinidadian chef \u2014 tamarind-glazed jerk wings and curried goat that helped make Brixton's covered market a dining destination."},{id:"roa-crane",n:"ROA's Crane Mural",a:"Hanbury Street, Spitalfields",pc:"E1",lat:51.5205,lng:-.072,c:"streetart",s:"Brick Lane's giant bird",q:"ROA crane mural Hanbury Street Brick Lane",w:"A roughly 40-foot bird painted in 2010 by the Belgian artist ROA \u2014 originally a heron, changed to a crane at the request of local Bengali residents, and now one of Brick Lane's most enduring works."},{id:"banksy-guard-dog",n:"Banksy's 'Guard Dog'",a:"Rivington Street, Shoreditch",pc:"EC2A",lat:51.526,lng:-.08,c:"streetart",s:"Banksy under perspex",q:"Banksy Guard Dog Rivington Street Shoreditch",w:"A 2003 Banksy stencil of a security guard and his poodle, surviving behind perspex in the old Cargo courtyard alongside the HMV dog. Worth checking the courtyard is open before you make the trip."},{id:"banksy-royals",n:"Banksy's Royal Family Mural",a:"Stoke Newington",pc:"N16",lat:51.562,lng:-.078,c:"streetart",s:"Waving royals since 2001",q:"Banksy royal family mural Stoke Newington Church Street",w:"One of Banksy's best-preserved early works \u2014 a mock royal family that has waved cheerfully from a Stoke Newington wall since 2001, long before the auction-house millions."},{id:"hackney-peace-mural",n:"Hackney Peace Carnival Mural",a:"Dalston Lane",pc:"E8",lat:51.546,lng:-.074,c:"streetart",s:"1983's march, painted",q:"Hackney Peace Carnival Mural Dalston Lane Ray Walker",w:"Ray Walker's vivid 1985 mural of a multicultural anti-nuclear march down Dalston Lane \u2014 finished by his collaborators after his sudden death, and lovingly restored for its 40th anniversary."},{id:"velazquez-banksy",n:"The Vel\xE1zquez Banksy",a:"Portobello",pc:"W10",lat:51.521,lng:-.206,c:"streetart",s:"Old master meets stencil",q:"Banksy Velazquez Portobello Acklam Road",w:"A 2008 Banksy riff on a Spanish old master, restored to view on the corner of Portobello and Acklam Roads \u2014 a sly bit of art-history graffiti hiding in plain sight on the market's edge."},{id:"greenwich-wolfe-view",n:"General Wolfe Viewpoint",a:"Greenwich Park",pc:"SE10",lat:51.4769,lng:-.001,c:"view",s:"Protected by law",q:"General Wolfe statue Greenwich Park view",w:"From beside the Wolfe statue at the top of Greenwich Park, the sweep over the Old Royal Naval College to Canary Wharf and the City is so prized that the sightline is legally protected from obstruction."},{id:"viktor-wynd",n:"Viktor Wynd Museum of Curiosities",a:"Hackney",pc:"E2",lat:51.535,lng:-.061,c:"museum",s:"Two-headed lambs & oddments",q:"Viktor Wynd Museum of Curiosities Hackney",w:"A subterranean Wunderkabinett beneath The Last Tuesday Society bar \u2014 taxidermy, occult relics, dodo bones and infamous celebrity oddments, best explored with a cocktail in hand. London's strangest collection by some distance."},{id:"novelty-automation",n:"Novelty Automation",a:"Holborn",pc:"WC1N",lat:51.521,lng:-.118,c:"museum",s:"A satirical penny arcade",q:"Novelty Automation Holborn arcade Tim Hunkin",w:"Tim Hunkin's hand-built arcade of satirical coin-op machines \u2014 test your nerve against a nuclear reactor, take a 'instant holiday', or have your money laundered, literally. Joyful, anarchic and unlike anywhere else."},{id:"vagina-museum",n:"Vagina Museum",a:"Bethnal Green",pc:"E2",lat:51.527,lng:-.056,c:"museum",s:"The world's first",q:"Vagina Museum Bethnal Green",w:"The world's first bricks-and-mortar museum dedicated to the gynaecological \u2014 crowdfunded, pun-loving, trans-inclusive and quietly radical, with rotating exhibitions that are far more educational than the name suggests."},{id:"magic-circle-museum",n:"The Magic Circle Museum",a:"Euston",pc:"NW1",lat:51.529,lng:-.134,c:"museum",s:"Houdini's handcuffs",q:"Magic Circle Museum Euston Houdini",w:"The headquarters collection of the world's most famous society of magicians \u2014 including Houdini's own handcuffs \u2014 opened only for events and pre-booked tours behind a famously discreet door."},{id:"the-grapes-limehouse",n:"The Grapes",a:"Limehouse",pc:"E14",lat:51.5095,lng:-.0335,c:"pub",s:"Dickens's narrow tavern",q:"The Grapes Limehouse pub Narrow Street",w:"A sliver of an 18th-century riverside pub on Narrow Street \u2014 now co-owned by Ian McKellen \u2014 that Dickens put into Our Mutual Friend as the Six Jolly Fellowship Porters. Step out the back for the Thames at your feet."},{id:"hodge-the-cat",n:"Hodge the Cat",a:"Gough Square",pc:"EC4A",lat:51.5152,lng:-.108,c:"oddity",s:"A very fine cat indeed",q:"Hodge the Cat statue Gough Square Dr Johnson",w:"A bronze of Dr Johnson's cat, perched on a dictionary with two oyster shells at his paws, outside the great lexicographer's house \u2014 'a very fine cat indeed.' One of the city's 'Talking Statues.'"},{id:"sherlock-statue",n:"Sherlock Holmes Statue",a:"Baker Street",pc:"NW1",lat:51.5225,lng:-.157,c:"oddity",s:"Deerstalker on",q:"Sherlock Holmes statue Baker Street station",w:"The deerstalkered detective in bronze outside Baker Street station, pipe in hand \u2014 and the most-listened-to of London's 'Talking Statues', if you call the number on the plaque."},{id:"wollstonecraft-sculpture",n:"The Wollstonecraft Sculpture",a:"Newington Green",pc:"N16",lat:51.553,lng:-.083,c:"oddity",s:"The statue that sparked a row",q:"Mary Wollstonecraft sculpture Newington Green Maggi Hambling",w:"Maggi Hambl         *{box-sizing:border-box;}
        .root{min-height:100vh;background:#FFFFFF;color:#111;font-family:Arial,Helvetica,sans-serif;padding-bottom:56px;}
        .wrap{max-width:560px;margin:0 auto;padding:0 20px;}
        .mast{padding:18px 0 4px;display:flex;align-items:baseline;justify-content:space-between;}
        .mast h1{font-family:Georgia,'Iowan Old Style','Times New Roman',serif;font-size:23px;font-weight:600;font-style:italic;margin:0;letter-spacing:0;color:#161310;}
        .mast span{font-size:12px;color:#8A8A86;}
        .anchor{display:flex;align-items:center;gap:9px;border:1px solid #EEEEEA;border-radius:14px;padding:11px 13px;margin:14px 0 12px;}
        .anchor .t{flex:1;min-width:0;}
        .anchor .t b{display:block;font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
        .anchor .t i{font-style:normal;font-size:11px;color:#9A9A96;}
        .gps{display:flex;align-items:center;justify-content:center;width:38px;height:38px;border:1px solid #E9E9E6;border-radius:11px;background:#fff;cursor:pointer;color:#C8372D;flex:none;}
        .livepill{display:inline-flex;align-items:center;gap:5px;border:1px solid #E9E9E6;background:#fff;color:#9A9A96;border-radius:11px;padding:0 11px;height:38px;font-size:11px;font-weight:700;letter-spacing:.8px;cursor:pointer;font-family:inherit;flex:none;}
        .livepill .ldot{width:7px;height:7px;border-radius:50%;background:#C9C9C5;}
        .livepill.on{border-color:#C8372D;color:#C8372D;}
        .livepill.on .ldot{background:#C8372D;animation:pulse 1.2s ease infinite;}
        @keyframes pulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:.4;transform:scale(.75);}}
        .row{display:flex;gap:6px;overflow-x:auto;padding:2px 0 9px;scrollbar-width:none;}
        .row::-webkit-scrollbar{display:none;}
        .rowlbl{font-size:10px;font-weight:700;letter-spacing:1px;color:#B5B5B1;text-transform:uppercase;align-self:center;margin-right:2px;flex:none;}
        .chip{flex:none;border:1px solid #E9E9E6;background:#fff;color:#5A5A56;border-radius:99px;padding:7px 13px;font-size:12.5px;cursor:pointer;white-space:nowrap;font-family:inherit;}
        .chip.on{background:#111;border-color:#111;color:#fff;font-weight:700;}
        .chip.coll.on{background:#C8372D;border-color:#C8372D;}
        .seg{display:inline-flex;border:1px solid #E9E9E6;border-radius:99px;overflow:hidden;flex:none;}
        .seg button{border:none;background:#fff;color:#5A5A56;padding:7px 13px;font-size:12.5px;cursor:pointer;font-family:inherit;}
        .seg button.on{background:#111;color:#fff;font-weight:700;}
        .cust{display:flex;gap:6px;margin:0 0 10px;}
        .cust input{flex:1;border:1px solid #E9E9E6;border-radius:11px;padding:9px 12px;font-size:13px;font-family:inherit;color:#111;}
        .cust button{border:none;background:#111;color:#fff;border-radius:11px;padding:0 16px;font-weight:700;font-size:13px;cursor:pointer;font-family:inherit;}
        .note{font-size:12px;color:#9A9A96;margin:6px 0 10px;}
        .note.warn{color:#C8372D;}
        .viewbar{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:4px 0 8px;}
        .viewbar::-webkit-scrollbar{display:none;}
        .vb{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;border:1px solid #E9E9E6;background:#fff;color:#56564F;border-radius:13px;padding:13px 6px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;line-height:1;}
        .vb svg{opacity:.8;}
        .vb.on{background:#161310;border-color:#161310;color:#fff;}
