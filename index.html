y programming. A plush, grown-up antidote to the multiplex, hidden in plain sight near Holborn.",city:"london"},{id:"rough-trade-east",n:"Rough Trade East",a:"Spitalfields",pc:"E1",lat:51.52,lng:-0.072,c:"vinyl",s:"Brick Lane's gig-and-vinyl hub",q:"Rough Trade East Brick Lane",w:"The biggest of the Rough Trade shops, inside the Old Truman Brewery off Brick Lane — vast racks, in-store gigs, coffee and a wall of new vinyl. The flagship of the label that gave punk and post-punk a home.",city:"london"},{id:"sounds-of-the-universe",n:"Sounds of the Universe",a:"Soho",pc:"W1F",lat:51.514,lng:-0.134,c:"vinyl",s:"Soul Jazz label HQ",q:"Sounds of the Universe Soho records",w:"Born as a Camden market stall, now a Broadwick Street cornerstone and home of the brilliant Soul Jazz label — reggae, funk, house, library music and reissues for serious diggers. Soho's deepest record room.",city:"london"},{id:"reckless-records-soho",n:"Reckless Records",a:"Soho",pc:"W1F",lat:51.514,lng:-0.137,c:"vinyl",s:"On the Oasis album cover",q:"Reckless Records Berwick Street Soho",w:"A second-hand institution on Berwick Street since 1984 — and a slice of Britpop history, its shopfront immortalised on the cover of Oasis's Morning Glory. Browse the racks where the photo was shot.",city:"london"},{id:"flashback-islington",n:"Flashback Records",a:"Islington",pc:"N1",lat:51.538,lng:-0.098,c:"vinyl",s:"Essex Road crate-digging",q:"Flashback Records Islington Essex Road",w:"A North London institution since 1997, the Essex Road flagship hides a basement trove beneath a well-curated ground floor — secondhand and new across every genre, generously priced. A proper afternoon's dig.",city:"london"},{id:"casbah-greenwich",n:"Casbah Records",a:"Greenwich",pc:"SE10",lat:51.481,lng:-0.009,c:"vinyl",s:"Greenwich crate-digging cosy",q:"Casbah Records Greenwich",w:"A cosy Greenwich independent specialising in 60s and 70s pop, rock, soul, funk and cult soundtracks — the kind of small, knowledgeable shop where you go in for one record and leave with five.",city:"london"},{id:"princess-louise-holborn",n:"The Princess Louise",a:"Holborn",pc:"WC1V",lat:51.517,lng:-0.12,c:"pub",s:"Victorian gin-palace, snob screens",q:"Princess Louise Holborn Victorian interior",w:"Built in 1872 with a sumptuous 1891 interior, this Grade II*-listed High Holborn pub keeps its rare Victorian 'snob screens' and etched-glass snugs intact — drinking in a gin-palace that time forgot, at Sam Smith's prices.",city:"london"},{id:"cittie-of-yorke-holborn",n:"Cittie of Yorke",a:"Holborn",pc:"WC1V",lat:51.518,lng:-0.112,c:"pub",s:"Cathedral-like long bar",q:"Cittie of Yorke Holborn pub",w:"A High Holborn pub with one of the longest bars in Britain, soaring triangular roof trusses and a row of cosy wooden cubicles — a vast, cathedral-like hall on a site that's served drinkers since the 15th century.",city:"london"},{id:"the-grenadier-belgravia",n:"The Grenadier",a:"Belgravia",pc:"SW1X",lat:51.501,lng:-0.153,c:"pub",s:"Haunted duel pub, notes on the ceiling",q:"The Grenadier Belgravia ghost Wilton Row",w:"Hidden down a Belgravia mews on Wilton Row, this 1818 pub began as an officers' mess — sentry box still outside, ceiling papered with banknotes, and a famous (if unprovable) ghost. A duel-haunted bolt-hole behind the grand houses.",city:"london"},{id:"seven-stars-carey-street",n:"The Seven Stars",a:"Holborn",pc:"WC2A",lat:51.515,lng:-0.113,c:"pub",s:"1602 pub behind the law courts",q:"Seven Stars Carey Street Holborn",w:"Established in 1602 — fourteen years before Shakespeare died — this tiny pub behind the Royal Courts of Justice survived the Great Fire and still pulls in barristers and a famously well-dressed pub cat. Four centuries of legal gossip.",city:"london"},{id:"sky-garden",n:"Sky Garden",a:"City of London",pc:"EC3M",lat:51.511,lng:-0.083,c:"view",s:"Free 'Walkie-Talkie' garden",q:"Sky Garden Fenchurch Street free booking",w:"The free public garden atop the 'Walkie-Talkie' at 20 Fenchurch Street — three storeys of palms and lookout terraces on the 35th floor, with sweeping Thames views. Book a (free) slot ahead; arrive for sunset if you can.",city:"london"},{id:"horizon-22",n:"Horizon 22",a:"City of London",pc:"EC2N",lat:51.515,lng:-0.082,c:"view",s:"Europe's highest free viewpoint",q:"Horizon 22 Bishopsgate free viewing",w:"Opened in 2023 on the 58th floor of 22 Bishopsgate, Horizon 22 is Europe's highest free public viewing gallery — 254 metres up, looking down on the Shard and the whole City sprawl. Free, but book ahead.",city:"london"},{id:"garden-at-120",n:"The Garden at 120",a:"City of London",pc:"EC3M",lat:51.512,lng:-0.082,c:"view",s:"Free rooftop garden, no booking",q:"Garden at 120 Fen Court rooftop",w:"The City's largest public roof garden, on the 15th floor of Fen Court — wisteria walkways, a fountain and open-air views of the surrounding towers, with no booking and no charge. The easy, uncrowded rooftop.",city:"london"},{id:"one-new-change-roof",n:"One New Change Roof Terrace",a:"City of London",pc:"EC4M",lat:51.514,lng:-0.095,c:"view",s:"Framed St Paul's close-up",q:"One New Change roof terrace St Paul's",w:"A free sixth-floor roof terrace atop the One New Change centre, delivering an unusually intimate, eye-level view of St Paul's dome — close enough to count the stonework. The best free St Paul's photo in London.",city:"london"},{id:"parliament-hill",n:"Parliament Hill",a:"Hampstead Heath",pc:"NW5",lat:51.559,lng:-0.156,c:"view",s:"The classic free Heath panorama",q:"Parliament Hill view Hampstead Heath",w:"A protected viewpoint on Hampstead Heath whose sightline to St Paul's is shielded by law — kite-fliers, swimmers and the whole city laid out below. The classic, free, no-queue London panorama; bring a flask.",city:"london"},{id:"greenwich-wolfe-statue",n:"General Wolfe Statue Viewpoint",a:"Greenwich",pc:"SE10",lat:51.477,lng:-0.001,c:"view",s:"Maritime Greenwich to Canary Wharf",q:"General Wolfe statue Greenwich Park view",w:"The terrace by the General Wolfe statue at the top of Greenwich Park frames the Old Royal Naval College, the Thames and Canary Wharf in one sweep — Wren's baroque maritime London with the towers rising behind. Unforgettable at dusk.",city:"london"},{id:"severndroog-castle",n:"Severndroog Castle",a:"Oxleas Wood",pc:"SE18",lat:51.464,lng:0.064,c:"follies",s:"Gothic folly above the woods",q:"Severndroog Castle Oxleas Wood viewpoint",w:"A Gothic triangular folly built in 1784 in Oxleas Wood on Shooter's Hill, commemorating a colonial siege — and, on clear days, offering views over several counties from its tower. A genuinely secret South-East London lookout in the trees.",city:"london"},{id:"tooting-bec-lido",n:"Tooting Bec Lido",a:"Tooting",pc:"SW16",lat:51.429,lng:-0.159,c:"lido",s:"UK's largest freshwater pool, 1906",q:"Tooting Bec Lido history",w:"Opened in 1906, this is the UK's largest freshwater pool by surface area — a vast, cold, gloriously unheated expanse ringed by candy-coloured changing cubicles. South London's great democratic swim, beloved by hardy year-round bathers.",city:"london"},{id:"parliament-hill-lido",n:"Parliament Hill Lido",a:"Gospel Oak",pc:"NW5",lat:51.555,lng:-0.154,c:"lido",s:"Art Deco unheated steel, 1938",q:"Parliament Hill Lido Gospel Oak",w:"A Grade II-listed 1938 lido on the edge of Hampstead Heath, famous for its gleaming stainless-steel pool — bracingly unheated and open year-round. Art Deco municipal swimming at its most photogenic.",city:"london"},{id:"brockwell-lido",n:"Brockwell Lido",a:"Herne Hill",pc:"SE24",lat:51.453,lng:-0.105,c:"lido",s:"'Brixton Beach' Art Deco icon",q:"Brockwell Lido Herne Hill",w:"A 1937 Art Deco lido nicknamed 'Brixton Beach,' ringed by Grade II-listed redbrick — a sun-trap of a summer institution between Herne Hill and Brixton. (Its operator's status has wobbled lately; check before you go.)",city:"london"},{id:"hampstead-mixed-pond",n:"Hampstead Heath Mixed Bathing Pond",a:"Hampstead Heath",pc:"NW3",lat:51.564,lng:-0.161,c:"lido",s:"Wild swimming, three ponds",q:"Hampstead Heath bathing ponds swimming",w:"The Heath's spring-fed bathing ponds — Men's, Ladies' and Mixed — offer genuine wild swimming a few miles from the West End, among ducks and willow. Cold, clear and quietly addictive; lifeguarded in season.",city:"london"},{id:"london-fields-lido",n:"London Fields Lido",a:"London Fields",pc:"E8",lat:51.541,lng:-0.062,c:"lido",s:"Heated Olympic-size, floodlit",q:"London Fields Lido Hackney",w:"A 50-metre heated outdoor pool kept around 25°C year-round and floodlit at dawn — Hackney's beloved Olympic-size lido, busy in summer, blissfully steaming in winter. The rare London lido you can happily swim in come January.",city:"london"},{id:"serpentine-lido",n:"The Serpentine Lido",a:"Hyde Park",pc:"W2",lat:51.505,lng:-0.165,c:"lido",s:"Hyde Park's Peter Pan Cup",q:"Serpentine Lido Hyde Park swimming",w:"A roped-off swimming stretch of the Serpentine in Hyde Park, home to the Serpentine Swimming Club, who race for the Peter Pan Cup on Christmas morning. Open-water swimming in the very middle of the city.",city:"london"},{id:"brydges-place",n:"Brydges Place",a:"Covent Garden",pc:"WC2N",lat:51.51,lng:-0.128,c:"alley",s:"London's narrowest alley",q:"Brydges Place narrowest alley London",w:"Running beside the Coliseum off St Martin's Lane, Brydges Place is claimed to be London's narrowest alley — barely shoulder-wide for much of its length, opening to a single hidden bar at the far end. Turn sideways and squeeze through.",city:"london"},{id:"crown-passage",n:"Crown Passage",a:"St James's",pc:"SW1Y",lat:51.506,lng:-0.138,c:"alley",s:"Time-warp St James's lane",q:"Crown Passage St James's",w:"A narrow pedestrian lane between Pall Mall and King Street, lined with old-school shops, a sandwich bar and one of London's oldest pubs — a genuine time-warp slice of St James's the tourists walk straight past.",city:"london"},{id:"ely-place",n:"Ely Place & Ely Court",a:"Holborn",pc:"EC1N",lat:51.519,lng:-0.108,c:"alley",s:"Private street, hidden chapel",q:"Ely Place Holborn St Etheldreda's",w:"A gated private street that was the London estate of the Bishops of Ely and was long treated as a legal piece of Cambridgeshire — hiding St Etheldreda's, a rare 13th-century chapel, and (via Ely Court) the snug Ye Olde Mitre. A curiosity inside a curiosity.",city:"london"},{id:"lovat-lane",n:"Lovat Lane",a:"City of London",pc:"EC3R",lat:51.509,lng:-0.084,c:"alley",s:"Cobbled medieval City lane",q:"Lovat Lane City of London cobbles",w:"A steep, cobbled City lane with a central gutter — a rare survival of the medieval street pattern, curving between Eastcheap and the river past the spire of St Mary-at-Hill. Two minutes from the glass towers, six centuries away.",city:"london"},{id:"christchurch-gardens",n:"Christchurch Gardens",a:"Westminster",pc:"SW1E",lat:51.498,lng:-0.137,c:"death",s:"1665 plague burials under a park",q:"Christchurch Gardens Victoria Street plague pit",w:"A pocket of green between Victoria Street and the buses, pressed into service as a plague burying ground in 1665 and later a churchyard — now lawns and benches where office workers eat lunch above the dead. A Suffragette memorial stands at its edge; the burials lie quietly beneath.",city:"london"},{id:"bedlam-burial-ground",n:"Bedlam Burial Ground",a:"Liverpool Street",pc:"EC2M",lat:51.5178,lng:-0.0815,c:"death",s:"~25,000 dead beneath the Elizabeth line",q:"Bedlam burial ground Liverpool Street New Churchyard Crossrail",w:"The 'New Churchyard' beside Bethlem hospital took some 25,000 Londoners from the 1560s — plague dead, paupers and the odd executed radical — until Crossrail's diggers reached them in the 2010s. A small commemorative space near Liverpool Street now marks one of the city's great forgotten cemeteries.",city:"london"},{id:"east-smithfield-cemetery",n:"East Smithfield Black Death Cemetery",a:"Tower Hill",pc:"E1W",lat:51.508,lng:-0.071,c:"death",s:"Emergency Black Death pit, 1348",q:"East Smithfield Black Death cemetery Royal Mint 1348",w:"When the Black Death overwhelmed London in 1348 the city opened an emergency cemetery here by the Tower — neat rows of plague victims later excavated beneath the old Royal Mint, their bones yielding the DNA that confirmed Yersinia pestis. Walk the pavement above one of the pandemic's best-studied graves.",city:"london"},{id:"isleworth-all-saints",n:"All Saints Isleworth Plague Pit",a:"Isleworth",pc:"TW7",lat:51.4745,lng:-0.3215,c:"death",s:"Thames-side pit, marked by a yew",q:"All Saints Isleworth plague pit yew tree",w:"In the riverside churchyard of All Saints, a dark old yew is said to mark a pit where Isleworth buried its plague dead. A quiet Thames-path detour where the village's losses lie under the grass beside the water.",city:"london"},{id:"clerkenwell-detention",n:"Clerkenwell House of Detention",a:"Clerkenwell",pc:"EC1R",lat:51.524,lng:-0.1078,c:"history",s:"Victorian prison vaults under a school",q:"Clerkenwell House of Detention catacombs",w:"Beneath a Clerkenwell school survive the brick vaults of a Victorian remand prison that once held nearly 300 at a time — damp, echoing tunnels locals call the Clerkenwell Catacombs. Rarely open, and a favourite film set, but you walk right above it on the green.",city:"london"},{id:"morpeth-arms",n:"The Morpeth Arms",a:"Millbank",pc:"SW1P",lat:51.4905,lng:-0.1278,c:"pub",s:"Pub above Millbank prison cells",q:"Morpeth Arms Millbank prison cells ghost",w:"A handsome 1845 riverside pub built for the warders of the vast Millbank Penitentiary — whose holding cells still lurk in the cellar, complete with a resident ghost the staff swear by. Drink a pint by the Thames where convicts once waited for transportation to Australia.",city:"london"},{id:"viaduct-tavern",n:"The Viaduct Tavern",a:"Holborn",pc:"EC1A",lat:51.5163,lng:-0.1018,c:"pub",s:"Gin palace over Newgate cells",q:"Viaduct Tavern Newgate prison cells gin palace",w:"London's last great Victorian gin palace, all etched glass and beaten copper, sitting opposite the Old Bailey — and, the landlords will tell you, atop cells salvaged from Newgate Prison in its cellar. Ask nicely and you might see them; either way, admire one of the City's most ornate interiors.",city:"london"},{id:"st-brides-charnel",n:"St Bride's Church & Charnel House",a:"Fleet Street",pc:"EC4Y",lat:51.5143,lng:-0.1053,c:"death",s:"Wren's printing church, bones below",q:"St Bride's Fleet Street crypt charnel house bones",w:"Wren's tiered 'wedding-cake' spire (said to have inspired the cake itself) crowns the journalists' church off Fleet Street — but the Blitz that gutted it also opened a crypt packed with centuries of bones, now a quietly macabre charnel house and museum. Printing history above, the dead below.",city:"london"},{id:"order-of-st-john-crypt",n:"Museum of the Order of St John Crypt",a:"Clerkenwell",pc:"EC1M",lat:51.5228,lng:-0.1018,c:"medieval",s:"12th-century Hospitaller crypt",q:"Museum Order of St John Clerkenwell crypt St John's Gate",w:"Behind St John's Gate, a rare survival: the 12th-century crypt of the Knights Hospitaller's English priory, thick-walled and solemn, holding medieval effigies and an alabaster Spanish knight. Crusader history hidden under quiet Clerkenwell, and free to visit.",city:"london"},{id:"garden-museum-crypt",n:"Garden Museum Crypt",a:"Lambeth",pc:"SE1",lat:51.4945,lng:-0.1218,c:"death",s:"Tombs beside Lambeth Palace",q:"Garden Museum St Mary-at-Lambeth crypt Tradescant Bligh tomb",w:"The old church of St Mary-at-Lambeth, saved from demolition as the Garden Museum, hides a glass-floored crypt and a churchyard of remarkable tombs — the plant-hunter Tradescants and Captain Bligh of the Bounty among them. Horticulture, history and the dead, in the shadow of Lambeth Palace.",city:"london"},{id:"whitefriars-crypt",n:"Whitefriars Crypt",a:"Fleet Street",pc:"EC4Y",lat:51.5125,lng:-0.1075,c:"medieval",s:"Carmelite vault under an office",q:"Whitefriars crypt Carmelite monastery Fleet Street Magpie Alley",w:"All that remains of a great Carmelite friary that once sprawled between Fleet Street and the river: a single medieval stone undercroft, now improbably preserved in the basement of a modern office off Magpie Alley. A 700-year-old secret beneath the glass.",city:"london"},{id:"greenwich-foot-tunnel",n:"Greenwich Foot Tunnel",a:"Cutty Sark Gardens",pc:"SE10",lat:51.4828,lng:-0.0104,c:"oddity",s:"Subterranean Victorian walk",q:"Greenwich Foot Tunnel under Thames",w:"Opened in 1902 to replace the unreliable ferry for dock workers, this 370-metre cast-iron tunnel lets you walk directly beneath the Thames. Lined with 200,000 glazed white tiles, it is an echoing, surreal passage that feels completely detached from the city above — emerge on the Isle of Dogs for the classic Wren-framed view back at Greenwich.",city:"london"},{id:"tulip-stairs",n:"The Tulip Stairs",a:"Queen's House, Greenwich",pc:"SE10",lat:51.4811,lng:-0.0037,c:"history",s:"Britain's first self-supporting spiral",q:"Tulip Stairs Queen's House Greenwich",w:"Tucked inside Inigo Jones's Queen's House is the first geometric, self-supporting spiral staircase in Britain, built in the 1630s — the wrought-iron flowers in the balustrade give it its name. An architectural marvel, and famously the site of the 1966 'Rev. R. W. Hardy' ghost photograph that still draws the curious. Free to visit.",city:"london"},{id:"asylum-chapel",n:"Asylum Chapel",a:"Caroline Gardens, Peckham",pc:"SE15",lat:51.4785,lng:-0.0531,c:"history",s:"A cinematic ruin",q:"Asylum Chapel Caroline Gardens Peckham",w:"A Grade II listed chapel built in 1826 for retired pub landlords, bombed in the war and never fully restored. Today it stands as a beautifully weathered ruin — peeling paint, fractured stained glass, raw stone open to the light — and one of London's most photographed event spaces. Check listings; it opens for exhibitions and the odd ceremony.",city:"london"},{id:"abbey-mills",n:"Abbey Mills Pumping Station",a:"Abbey Lane, Stratford",pc:"E15",lat:51.5312,lng:0.0003,c:"oddity",s:"The Cathedral of Sewage",q:"Abbey Mills Pumping Station Bazalgette",w:"Bazalgette's 1868 'Cathedral of Sewage' — a Byzantine-style temple of public health built to lift London's effluent into the great Northern Outfall sewer. Absurdly grand: cruciform plan, jewel-bright ironwork, Moorish detailing on a building for pumping waste. The exterior alone, glimpsed from the Greenway, is one of the city's strangest sights.",city:"london"},{id:"aldwych-station",n:"Aldwych Underground Station",a:"Strand",pc:"WC2R",lat:51.5115,lng:-0.1165,c:"history",s:"London's famous ghost station",q:"Aldwych ghost station Strand disused Underground",w:"Closed in 1994, this 'ghost station' sheltered Londoners during the Blitz and hid the British Museum's Elgin Marbles from the bombs. Now preserved in amber and a favourite film set (Atonement, Sherlock). Interior access needs a rare Transport Museum tour, but the original oxblood-tiled façade on the Strand is a monument to London legend in its own right.",city:"london"},{id:"handel-hendrix",n:"Handel & Hendrix",a:"Brook Street, Mayfair",pc:"W1K",lat:51.5129,lng:-0.1462,c:"plaque",s:"Neighbours, 200 years apart",q:"Handel Hendrix House Brook Street",w:"Jimi Hendrix lived at No. 23 (1968-69) right next door to where Handel composed Messiah at No. 25 — two English Heritage blue plaques side by side, now a joint museum. Hendrix cheerfully admitted he'd 'never heard much of the fella's stuff.'",city:"london"},{id:"freddie-feltham",n:"Freddie Mercury's Family Home",a:"Gladstone Avenue, Feltham",pc:"TW13",lat:51.4459,lng:-0.4163,c:"plaque",s:"Where Zanzibar met Queen",q:"Freddie Mercury house 22 Gladstone Avenue Feltham",w:"The unassuming terrace where the Mercury family settled after fleeing Zanzibar in 1964; Freddie was living here when he met Brian May and Roger Taylor. The plaque was unveiled in 2016 by May and Freddie's sister — a true Queen-fan pilgrimage out west.",city:"london"},{id:"chaplin-brixton",n:"Charlie Chaplin's Flat",a:"Glenshaw Mansions, Brixton",pc:"SW9",lat:51.472,lng:-0.113,c:"plaque",s:"A cherished haven",q:"Charlie Chaplin plaque Glenshaw Mansions Brixton Road",w:"The flat Chaplin shared with his brother Sydney (1908-10) at the very start of his career — a 'cherished haven' after one of the most brutal childhoods in Victorian London. Plaque unveiled by Paul Merton in 2017.",city:"london"},{id:"agatha-christie-home",n:"Agatha Christie's House",a:"Sheffield Terrace, Holland Park",pc:"W8",lat:51.5076,lng:-0.1969,c:"plaque",s:"Murder she wrote here",q:"Agatha Christie 58 Sheffield Terrace plaque",w:"Where Christie wrote Murder on the Orient Express, Death on the Nile and The ABC Murders — three of the most-adapted mysteries ever written, all from one quiet house five minutes from Notting Hill Gate.",city:"london"},{id:"bacon-studio",n:"Francis Bacon's Studio",a:"Reece Mews, South Kensington",pc:"SW7",lat:51.4936,lng:-0.174,c:"plaque",s:"Chaos as a studio",q:"Francis Bacon studio 7 Reece Mews",w:"The cramped mews where Bacon lived and painted for over 30 years until 1992, in a legendary chaos of slashed canvases and paint-smeared walls — the room that produced Three Studies for a Crucifixion (the studio itself was later moved, brick by brick, to Dublin).",city:"london"},{id:"mary-seacole-soho",n:"Mary Seacole's Home",a:"Soho Square",pc:"W1D",lat:51.5155,lng:-0.132,c:"plaque",s:"The other Crimean nurse",q:"Mary Seacole 14 Soho Square plaque",w:"The Jamaican-British heroine of the Crimean War — who funded her own passage to nurse soldiers when the War Office turned her away — lived here in the 1850s. Her only known surviving London home.",city:"london"},{id:"turing-maida-vale",n:"Alan Turing's Birthplace",a:"Warrington Crescent, Maida Vale",pc:"W9",lat:51.5239,lng:-0.186,c:"plaque",s:"Born here, broke Enigma",q:"Alan Turing 2 Warrington Crescent plaque",w:"The birthplace of the codebreaker and father of computer science, whose Bletchley Park work is credited with shortening the war by years — and who was then hounded to his death by the state he saved.",city:"london"},{id:"napoleon-iii-plaque",n:"The Napoleon III Plaque",a:"King Street, St James's",pc:"SW1Y",lat:51.507,lng:-0.137,c:"plaque",s:"The oldest plaque, 1867",q:"Napoleon III blue plaque King Street St James's",w:"The oldest surviving official London blue plaque, and the only one ever installed in its subject's own lifetime — it bears the imperial eagle and marks the exiled emperor's London lodgings.",city:"london"},{id:"douglas-adams-grave",n:"Douglas Adams' Grave",a:"Highgate Cemetery East",pc:"N6",lat:51.5666,lng:-0.1455,c:"death",s:"Leave a pen",q:"Douglas Adams grave Highgate Cemetery East",w:"Fans leave pens and pencils in a pot before the plain dark headstone — a quiet running joke for the author of The Hitchhiker's Guide to the Galaxy. One of the cemetery's most-visited modern graves.",city:"london"},{id:"caulfield-dead",n:"Patrick Caulfield's 'DEAD' Grave",a:"Highgate Cemetery East",pc:"N6",lat:51.5665,lng:-0.145,c:"death",s:"Says it like it is",q:"Patrick Caulfield DEAD gravestone Highgate",w:"The Pop artist secretly designed his own headstone: the single laser-cut word 'DEAD' pierced clean through the stone in his own Art Deco lettering. Asked what his epitaph should read, he reputedly replied: 'Dead, of course.'",city:"london"},{id:"mclaren-grave",n:"Malcolm McLaren's Grave",a:"Highgate Cemetery East",pc:"N6",lat:51.5663,lng:-0.1442,c:"death",s:"A spectacular failure",q:"Malcolm McLaren grave Highgate Cemetery",w:"The Sex Pistols' manager lies under a bronze death mask, about 100 yards from Karl Marx, beneath the epitaph 'Better a spectacular failure, than a benign success' — the words of his old art-school teacher.",city:"london"},{id:"george-michael-grave",n:"George Michael's Grave",a:"Highgate Cemetery West",pc:"N6",lat:51.5674,lng:-0.1489,c:"death",s:"Beloved son and brother",q:"George Michael grave Highgate Cemetery West",w:"In the family plot beside his mother and sister, the monument bears his birth name, Georgios Kyriacos Panayiotou. The West side is ticketed and tributes are gently discouraged — visit quietly and with respect.",city:"london"},{id:"faraday-grave",n:"Michael Faraday's Grave",a:"Highgate Cemetery West",pc:"N6",lat:51.567,lng:-0.148,c:"death",s:"The modest genius",q:"Michael Faraday grave Highgate Cemetery West",w:"A deliberately plain Sandemanian headstone for the self-taught giant of electromagnetism — who turned down a knighthood and burial in Westminster Abbey for exactly this kind of modesty.",city:"london"},{id:"wombwell-lion",n:"George Wombwell's Lion Tomb",a:"Highgate Cemetery West",pc:"N6",lat:51.5668,lng:-0.1478,c:"death",s:"Nero sleeps on top",q:"George Wombwell lion tomb Highgate Cemetery",w:"The Victorian travelling-menagerie owner is buried beneath a stone sculpture of his star attraction — Nero, the lion so gentle he famously refused to fight the baiting dogs set on him.",city:"london"},{id:"bram-stoker-urn",n:"Bram Stoker's Urn",a:"Golders Green Crematorium",pc:"NW11",lat:51.579,lng:-0.198,c:"death",s:"Dracula's ashes",q:"Bram Stoker ashes Golders Green Crematorium columbarium",w:"The author of Dracula rests as ashes in an urn in the columbarium — viewable only by staff escort, a small final touch of gothic inaccessibility for the man who gave the world the Count.",city:"london"},{id:"notting-hill-door",n:"The Notting Hill Blue Door",a:"Westbourne Park Road",pc:"W11",lat:51.518,lng:-0.201,c:"film",s:"Whoops-a-daisy",q:"Notting Hill blue door 280 Westbourne Park Road",w:"The (now replica) blue door of William Thacker's flat from Notting Hill — the original was auctioned for charity after the film. Pure rom-com pilgrimage; mind the queue for a photo.",city:"london"},{id:"mr-gruber-portobello",n:"Mr Gruber's Shop",a:"Portobello Road",pc:"W11",lat:51.516,lng:-0.205,c:"film",s:"Paddington's antique stop",q:"Alice's Antiques 86 Portobello Road Paddington",w:"The cluttered antiques shop that plays Mr Gruber's in the Paddington films — and it's a genuine Portobello institution, every bit as eccentric off screen as on.",city:"london"},{id:"brown-house-chalcot",n:"The Brown Family House",a:"Chalcot Crescent, Primrose Hill",pc:"NW1",lat:51.539,lng:-0.154,c:"film",s:"Paddington's front door",q:"Chalcot Crescent Paddington Brown family house",w:"A pastel-fronted house on a perfect curve of Primrose Hill stuccoes plays the Browns' home in the Paddington films. The whole crescent is an Instagram set-piece in its own right.",city:"london"},{id:"eaton-place-165",n:"165 Eaton Place",a:"Belgravia",pc:"SW1X",lat:51.4965,lng:-0.153,c:"film",s:"Upstairs, downstairs",q:"165 Eaton Place Upstairs Downstairs Belgravia",w:"The real Belgravia townhouse used for the exterior shots of the classic series Upstairs, Downstairs — the front door behind which a whole world of Edwardian servants and masters was imagined.",city:"london"},{id:"clash-steps-camden",n:"The Clash Steps",a:"Stables Market, Camden",pc:"NW1",lat:51.5418,lng:-0.147,c:"music",s:"Punk's photo op",q:"The Clash debut album steps Stables Market Camden",w:"The trolley ramp outside the old Rehearsal Rehearsals where The Clash were shot for their 1977 debut album cover. Punk pilgrims still line up to recreate the pose in the railway arches.",city:"london"},{id:"battersea-animals",n:"Battersea Power Station",a:"Battersea",pc:"SW11",lat:51.482,lng:-0.144,c:"music",s:"Mind the flying pig",q:"Battersea Power Station Pink Floyd Animals pig",w:"The building on Pink Floyd's Animals sleeve — during the 1976 shoot the inflatable pig broke its moorings and drifted off over Kent, grounding flights at Heathrow. Now a vast redeveloped destination in its own right.",city:"london"},{id:"word-on-the-water",n:"Word on the Water",a:"Regent's Canal, King's Cross",pc:"N1C",lat:51.5343,lng:-0.1257,c:"bookshops",s:"The floating bookshop",q:"Word on the Water canal bookshop King's Cross",w:"A 1920s Dutch barge moored on the canal, selling new and second-hand books from its decks with live jazz and poetry on the roof. One of the most photographed shops in London, and far lovelier than the photos.",city:"london"},{id:"hatchards",n:"Hatchards",a:"Piccadilly",pc:"W1J",lat:51.5085,lng:-0.139,c:"bookshops",s:"London's oldest bookshop, 1797",q:"Hatchards Piccadilly bookshop",w:"Founded in 1797 and at 187 Piccadilly since 1810 — royal-warranted, arranged like a private townhouse over five creaking floors, and still the most civilised place in London to lose an afternoon.",city:"london"},{id:"persephone-books",n:"Persephone Books",a:"Bloomsbury",pc:"WC1N",lat:51.524,lng:-0.123,c:"literary",s:"Lost women writers",q:"Persephone Books Bloomsbury grey covers",w:"A publisher and shop reviving neglected (mostly women) writers of the 20th century, each reissued in the same elegant dove-grey cover with a patterned endpaper. A quietly radical act of literary rescue.",city:"london"},{id:"brick-lane-bookshop",n:"Brick Lane Bookshop",a:"Spitalfields",pc:"E1",lat:51.522,lng:-0.072,c:"literary",s:"The East End's own",q:"Brick Lane Bookshop Spitalfields",w:"A fiercely independent shop specialising in London and East End writing, running its own short story prize. Small, opinionated, and exactly the kind of place algorithms can't replace.",city:"london"},{id:"libreria-shop",n:"Libreria",a:"Spitalfields",pc:"E1",lat:51.52,lng:-0.072,c:"literary",s:"No phones, themed shelves",q:"Libreria bookshop Hanbury Street no phones",w:"A jewel-box shop by architects SelgasCano where books are shelved not by genre but by mood — 'Wanderlust', 'Enchantment for the Disenchanted' — under a strict no-phones policy designed to make you actually read.",city:"london"},{id:"stanfords",n:"Stanfords",a:"Covent Garden",pc:"WC2H",lat:51.5125,lng:-0.126,c:"literary",s:"Maps since 1853",q:"Stanfords map travel bookshop Covent Garden Mercer Walk",w:"The legendary travel and map shop, founded 1853 and name-checked in The Hound of the Baskervilles — where explorers from Scott to Livingstone bought their charts. Now on Mercer Walk, floors of maps and guides intact.",city:"london"},{id:"new-beacon-books",n:"New Beacon Books",a:"Finsbury Park",pc:"N4",lat:51.564,lng:-0.106,c:"literary",s:"UK's first Black publisher",q:"New Beacon Books Finsbury Park",w:"Founded in 1966 by poet John La Rose as Britain's first Black publisher and specialist bookshop — a cornerstone of Black British intellectual life and the Caribbean Artists Movement.",city:"london"},{id:"terroni-clerkenwell",n:"Terroni of Clerkenwell",a:"Clerkenwell",pc:"EC1R",lat:51.5226,lng:-0.1075,c:"diaspora",s:"England's oldest deli, 1878",q:"Terroni of Clerkenwell Italian deli",w:"When Luigi Terroni opened here in 1878 it was, reputedly, the first delicatessen in all of England — set in old 'Little Italy' beside St Peter's Italian Church, and still slicing salami a century and a half on.",city:"london"},{id:"st-peters-italian",n:"St Peter's Italian Church",a:"Clerkenwell Road",pc:"EC1R",lat:51.523,lng:-0.108,c:"diaspora",s:"Little Italy's basilica",q:"St Peter's Italian Church Clerkenwell",w:"The first Italian church built outside Italy (1863), modelled on a basilica in Rome's Trastevere — still the heart of Little Italy, with its huge July Procession of Our Lady of Mount Carmel through the streets of Clerkenwell.",city:"london"},{id:"sandys-row-synagogue",n:"Sandys Row Synagogue",a:"Spitalfields",pc:"E1",lat:51.518,lng:-0.077,c:"diaspora",s:"Oldest Ashkenazi shul",q:"Sandys Row Synagogue Spitalfields",w:"London's oldest surviving Ashkenazi synagogue, founded in 1854 by fifty poor Dutch-Jewish families inside a 1766 ex-Huguenot chapel — a building that has sheltered two waves of immigrants under one roof.",city:"london"},{id:"bevis-marks",n:"Bevis Marks Synagogue",a:"City of London",pc:"EC3A",lat:51.515,lng:-0.079,c:"diaspora",s:"Britain's oldest synagogue, 1701",q:"Bevis Marks Synagogue City of London",w:"Britain's oldest synagogue in continuous use, consecrated 1701 by London's Sephardi community — its candlelit interior, lit by hanging brass chandeliers, has barely changed in over three centuries.",city:"london"},{id:"windrush-square",n:"Windrush Square",a:"Brixton",pc:"SW2",lat:51.4625,lng:-0.113,c:"diaspora",s:"Where Windrush is remembered",q:"Windrush Square Brixton Black Cultural Archives",w:"Renamed in 1998 for the 50th anniversary of the Empire Windrush, the square holds the UK's first African and Caribbean War Memorial and the Black Cultural Archives — the civic heart of Black Brixton.",city:"london"},{id:"fournier-street",n:"Fournier Street",a:"Spitalfields",pc:"E1",lat:51.519,lng:-0.073,c:"diaspora",s:"Look up for weavers' lofts",q:"Fournier Street Spitalfields Huguenot houses",w:"The best-preserved early-Georgian street in Britain, built in the 1720s for Huguenot master silk-weavers — look up for the broad attic 'weavers' lights' that lit their looms, and for the lace-cuff hand door-knockers.",city:"london"},{id:"jamme-masjid",n:"London Jamme Masjid",a:"Brick Lane corner",pc:"E1",lat:51.5197,lng:-0.0718,c:"diaspora",s:"Chapel, synagogue, mosque",q:"Brick Lane Jamme Masjid Fournier Street",w:"One building that has been, in turn, a 1743 Huguenot chapel, a Methodist mission, a synagogue and now a mosque — the whole story of immigrant Spitalfields in one set of walls, beneath a sundial reading 'Umbra sumus' (We are shadows).",city:"london"},{id:"mangal-2-dalston",n:"Mangal 2",a:"Dalston",pc:"E8",lat:51.547,lng:-0.075,c:"food",s:"Gilbert & George's canteen",q:"Mangal 2 Dalston ocakbasi",w:"The Dalston grill where artists Gilbert & George have famously dined almost nightly for decades — a charcoal ocakbaşı as known for its surreal social-media presence as for its lamb.",city:"london"},{id:"song-que-pho",n:"Sông Quê Café",a:"Kingsland Road, Shoreditch",pc:"E2",lat:51.531,lng:-0.077,c:"food",s:"The Pho Mile's green corner",q:"Song Que Cafe Kingsland Road pho",w:"The bright-green flagship of Kingsland Road's 'Pho Mile', drawing queues out the door since 2002. The bowl that taught a generation of Londoners what pho actually tastes like.",city:"london"},{id:"lisboa-patisserie",n:"Lisboa Patisserie",a:"South Lambeth",pc:"SW8",lat:51.479,lng:-0.123,c:"bakery",s:"Pastéis in Little Portugal",q:"Lisboa Patisserie South Lambeth Road custard tart",w:"The custard-tart heart of London's Portuguese community on South Lambeth Road — strong bica, warm pastéis de nata, and a counter that has anchored Little Portugal for decades.",city:"london"},{id:"fish-wings-tings",n:"Fish, Wings & Tings",a:"Brixton Village",pc:"SW9",lat:51.4615,lng:-0.115,c:"food",s:"Trinidadian institution",q:"Fish Wings and Tings Brixton Village",w:"A tiny, much-loved Caribbean kitchen in Brixton Village from a Trinidadian chef — tamarind-glazed jerk wings and curried goat that helped make Brixton's covered market a dining destination.",city:"london"},{id:"roa-crane",n:"ROA's Crane Mural",a:"Hanbury Street, Spitalfields",pc:"E1",lat:51.5205,lng:-0.072,c:"streetart",s:"Brick Lane's giant bird",q:"ROA crane mural Hanbury Street Brick Lane",w:"A roughly 40-foot bird painted in 2010 by the Belgian artist ROA — originally a heron, changed to a crane at the request of local Bengali residents, and now one of Brick Lane's most enduring works.",city:"london"},{id:"banksy-guard-dog",n:"Banksy's 'Guard Dog'",a:"Rivington Street, Shoreditch",pc:"EC2A",lat:51.526,lng:-0.08,c:"streetart",s:"Banksy under perspex",q:"Banksy Guard Dog Rivington Street Shoreditch",w:"A 2003 Banksy stencil of a security guard and his poodle, surviving behind perspex in the old Cargo courtyard alongside the HMV dog. Worth checking the courtyard is open before you make the trip.",city:"london"},{id:"banksy-royals",n:"Banksy's Royal Family Mural",a:"Stoke Newington",pc:"N16",lat:51.562,lng:-0.078,c:"streetart",s:"Waving royals since 2001",q:"Banksy royal family mural Stoke Newington Church Street",w:"One of Banksy's best-preserved early works — a mock royal family that has waved cheerfully from a Stoke Newington wall since 2001, long before the auction-house millions.",city:"london"},{id:"hackney-peace-mural",n:"Hackney Peace Carnival Mural",a:"Dalston Lane",pc:"E8",lat:51.546,lng:-0.074,c:"streetart",s:"1983's march, painted",q:"Hackney Peace Carnival Mural Dalston Lane Ray Walker",w:"Ray Walker's vivid 1985 mural of a multicultural anti-nuclear march down Dalston Lane — finished by his collaborators after his sudden death, and lovingly restored for its 40th anniversary.",city:"london"},{id:"velazquez-banksy",n:"The Velázquez Banksy",a:"Portobello",pc:"W10",lat:51.521,lng:-0.206,c:"streetart",s:"Old master meets stencil",q:"Banksy Velazquez Portobello Acklam Road",w:"A 2008 Banksy riff on a Spanish old master, restored to view on the corner of Portobello and Acklam Roads — a sly bit of art-history graffiti hiding in plain sight on the market's edge.",city:"london"},{id:"greenwich-wolfe-view",n:"General Wolfe Viewpoint",a:"Greenwich Park",pc:"SE10",lat:51.4769,lng:-0.001,c:"view",s:"Protected by law",q:"General Wolfe statue Greenwich Park view",w:"From beside the Wolfe statue at the top of Greenwich Park, the sweep over the Old Royal Naval College to Canary Wharf and the City is so prized that the sightline is legally protected from obstruction.",city:"london"},{id:"viktor-wynd",n:"Viktor Wynd Museum of Curiosities",a:"Hackney",pc:"E2",lat:51.535,lng:-0.061,c:"museum",s:"Two-headed lambs & oddments",q:"Viktor Wynd Museum of Curiosities Hackney",w:"A subterranean Wunderkabinett beneath The Last Tuesday Society bar — taxidermy, occult relics, dodo bones and infamous celebrity oddments, best explored with a cocktail in hand. London's strangest collection by some distance.",city:"london"},{id:"novelty-automation",n:"Novelty Automation",a:"Holborn",pc:"WC1N",lat:51.521,lng:-0.118,c:"museum",s:"A satirical penny arcade",q:"Novelty Automation Holborn arcade Tim Hunkin",w:"Tim Hunkin's hand-built arcade of satirical coin-op machines — test your nerve against a nuclear reactor, take a 'instant holiday', or have your money laundered, literally. Joyful, anarchic and unlike anywhere else.",city:"london"},{id:"vagina-museum",n:"Vagina Museum",a:"Bethnal Green",pc:"E2",lat:51.527,lng:-0.056,c:"museum",s:"The world's first",q:"Vagina Museum Bethnal Green",w:"The world's first bricks-and-mortar museum dedicated to the gynaecological — crowdfunded, pun-loving, trans-inclusive and quietly radical, with rotating exhibitions that are far more educational than the name suggests.",city:"london"},{id:"magic-circle-museum",n:"The Magic Circle Museum",a:"Euston",pc:"NW1",lat:51.529,lng:-0.134,c:"museum",s:"Houdini's handcuffs",q:"Magic Circle Museum Euston Houdini",w:"The headquarters collection of the world's most famous society of magicians — including Houdini's own handcuffs — opened only for events and pre-booked tours behind a famously discreet door.",city:"london"},{id:"the-grapes-limehouse",n:"The Grapes",a:"Limehouse",pc:"E14",lat:51.5095,lng:-0.0335,c:"pub",s:"Dickens's narrow tavern",q:"The Grapes Limehouse pub Narrow Street",w:"A sliver of an 18th-century riverside pub on Narrow Street — now co-owned by Ian McKellen — that Dickens put into Our Mutual Friend as the Six Jolly Fellowship Porters. Step out the back for the Thames at your feet.",city:"london"},{id:"hodge-the-cat",n:"Hodge the Cat",a:"Gough Square",pc:"EC4A",lat:51.5152,lng:-0.108,c:"oddity",s:"A very fine cat indeed",q:"Hodge the Cat statue Gough Square Dr Johnson",w:"A bronze of Dr Johnson's cat, perched on a dictionary with two oyster shells at his paws, outside the great lexicographer's house — 'a very fine cat indeed.' One of the city's 'Talking Statues.'",city:"london"},{id:"sherlock-statue",n:"Sherlock Holmes Statue",a:"Baker Street",pc:"NW1",lat:51.5225,lng:-0.157,c:"oddity",s:"Deerstalker on",q:"Sherlock Holmes statue Baker Street station",w:"The deerstalkered detective in bronze outside Baker Street station, pipe in hand — and the most-listened-to of London's 'Talking Statues', if you call the number on the plaque.",city:"london"},{id:"wollstonecraft-sculpture",n:"The Wollstonecraft Sculpture",a:"Newington Green",pc:"N16",lat:51.553,lng:-0.083,c:"oddity",s:"The statue that sparked a row",q:"Mary Wollstonecraft sculpture Newington Green Maggi Hambling",w:"Maggi Hambling's 2020 silvered sculpture — a swirl of female forms topped by a tiny nude figure — on the green where the mother of feminism ran her school. Controversial from the moment it was unveiled, and still arguing its case.",city:"london"},{id:"vine-street-wall",n:"City Wall at Vine Street",a:"Aldgate",pc:"EC3N",lat:51.5135,lng:-0.076,c:"roman",s:"Roman wall, indoors, free",q:"City Wall at Vine Street Roman bastion exhibition",w:"A ten-metre stretch of London's Roman and medieval wall, complete with a bastion, preserved in a basement gallery and opened to the public — free, climate-controlled, and astonishingly intact (book ahead).",city:"london"},{id:"loftus-road",n:"Loftus Road",a:"Shepherd's Bush, W12",pc:"W12",lat:51.5093,lng:-0.2321,c:"stadium",s:"QPR's tight, roaring home ground",q:"Loftus Road Stadium W12",w:"Queens Park Rangers' home since 1917 — one of the smallest, steepest, loudest grounds in London football, hemmed in by terraced streets a few minutes from your front door. Officially the Kiyan Prince Foundation Stadium since 2019, renamed for a 15-year-old academy player killed outside his school in 2006, to keep his name alive.",city:"london"},{id:"stamford-bridge",n:"Stamford Bridge",a:"Fulham Road, SW6",pc:"SW6",lat:51.4816,lng:-0.191,c:"stadium",s:"Chelsea's home since 1905",q:"Stamford Bridge Chelsea SW6",w:"Chelsea have played here since the club was founded in 1905 — the ground actually predates the team, built first with a club invented to fill it. Once an athletics stadium with a vast banked terrace; the Shed End behind the goal gave the club its noisiest support.",city:"london"},{id:"emirates-stadium",n:"Emirates Stadium",a:"Holloway, N7",pc:"N7",lat:51.5549,lng:-0.1084,c:"stadium",s:"Arsenal's modern bowl",q:"Emirates Stadium Arsenal N7",w:"Arsenal's home since 2006, when they left nearby Highbury and its beloved Art Deco stands. A 60,000-seat bowl ringed with 'Arsenalisation' murals and the cannon crest; statues of Thierry Henry, Tony Adams and Dennis Bergkamp stand outside.",city:"london"},{id:"spurs-stadium",n:"Tottenham Hotspur Stadium",a:"Tottenham, N17",pc:"N17",lat:51.6043,lng:-0.0664,c:"stadium",s:"Spurs' high-tech arena",q:"Tottenham Hotspur Stadium N17",w:"Opened in 2019 on the site of White Hart Lane, with a single-tier South Stand — the largest in the country — built for a sheer wall of noise. A retractable pitch slides away to reveal an artificial NFL surface beneath, and there's a microbrewery under the stands.",city:"london"},{id:"london-stadium",n:"London Stadium",a:"Stratford, E20",pc:"E20",lat:51.5386,lng:-0.0166,c:"stadium",s:"West Ham's Olympic home",q:"London Stadium West Ham E20",w:"Built as the centrepiece of the 2012 Olympics — where Mo Farah and Jessica Ennis-Hill won gold — and now home to West Ham. The athletics track still rings the pitch, a sore point for fans who left the tight, fierce Upton Park in 2016.",city:"london"},{id:"gtech-stadium",n:"Gtech Community Stadium",a:"Brentford, TW8",pc:"TW8",lat:51.4906,lng:-0.2889,c:"stadium",s:"Brentford's compact new ground",q:"Gtech Community Stadium Brentford",w:"Brentford's home since 2020, wedged beside the Kew Bridge railway and the Thames, replacing beloved Griffin Park — famous as the only English ground with a pub on all four corners. The Bees' climb from League One to the Premier League was one of football's best recent stories.",city:"london"},{id:"wembley-stadium",n:"Wembley Stadium",a:"Wembley, HA9",pc:"HA9",lat:51.556,lng:-0.2796,c:"stadium",s:"the national stadium under the arch",q:"Wembley Stadium HA9",w:"England's home, crowned by a 134-metre steel arch visible right across the city. The 2007 rebuild replaced the old Twin Towers where England won the 1966 World Cup; today it hosts cup finals, internationals and the biggest concerts London can stage.",city:"london"},{id:"selhurst-park",n:"Selhurst Park",a:"South Norwood, SE25",pc:"SE25",lat:51.3983,lng:-0.0855,c:"stadium",s:"Crystal Palace's raucous ground",q:"Selhurst Park Crystal Palace SE25",w:"Crystal Palace's home since 1924 and one of the most atmospheric grounds in the league — the Holmesdale Road end runs an ultras-style drum-and-banner show. Recently famous worldwide as AFC Richmond's 'dog pound' in Ted Lasso.",city:"london"},{id:"the-den",n:"The Den",a:"Bermondsey, SE16",pc:"SE16",lat:51.4859,lng:-0.0507,c:"stadium",s:"Millwall's famously fierce home",q:"The Den Millwall SE16",w:"Home of Millwall, whose supporters wear their 'No one likes us, we don't care' chant as a badge of honour. The current Den opened in 1993 just up from the old one — a hard, proud South London club with deep dockland roots.",city:"london"},{id:"north-gower-sherlock",n:"Speedy's & North Gower Street",a:"Euston, NW1",pc:"NW1",lat:51.5266,lng:-0.1352,c:"film",s:"Sherlock's '221B Baker Street'",q:"Speedy's Cafe North Gower Street NW1",w:"The BBC's Sherlock barely touched Baker Street — 221B's front door is 187 North Gower Street, with Speedy's Sandwich Bar next door playing itself. The cafe still does a roaring trade in fans ordering the 'Sherlock wrap'.",city:"london"},{id:"platform-nine-three-quarters",n:"Platform 9 3/4",a:"King's Cross Station, N1C",pc:"N1C",lat:51.5319,lng:-0.124,c:"film",s:"the Harry Potter trolley in the wall",q:"Platform 9 3/4 King's Cross Station",w:"A luggage trolley vanishing into the brickwork, marking where Harry caught the Hogwarts Express. The photo-op and its shop sit in the King's Cross concourse — queue for a scarf and a wand-flick, mid-leap, for the camera.",city:"london"},{id:"st-lukes-mews",n:"St Luke's Mews",a:"Notting Hill, W11",pc:"W11",lat:51.5197,lng:-0.2003,c:"film",s:"the Love Actually cue-card doorstep",q:"St Luke's Mews Notting Hill W11",w:"A cobbled, pastel-painted mews where Mark (Andrew Lincoln) held up his silent cue cards to Juliet (Keira Knightley) in Love Actually. Number 27 is still pink; a sign asks a pound per camera for charity. Just off Portobello Road.",city:"london"},{id:"sis-building-mi6",n:"The SIS Building (MI6)",a:"Vauxhall, SE11",pc:"SE11",lat:51.4873,lng:-0.1247,c:"film",s:"Bond's HQ on the Thames",q:"SIS Building Vauxhall Cross London",w:"The real headquarters of the Secret Intelligence Service — the cream-and-green ziggurat on the river that Bond films love to blow up, most memorably in Skyfall and Spectre. Best seen from Vauxhall Bridge or the far bank.",city:"london"},{id:"rangers-house-bridgerton",n:"Ranger's House",a:"Greenwich, SE10",pc:"SE10",lat:51.4683,lng:0.001,c:"film",s:"the Bridgerton family home",q:"Ranger's House Greenwich SE10",w:"This red-brick Georgian villa on the edge of Greenwich Park is the exterior of Bridgerton House — though the wisteria-draped gates are pure TV magic. Inside is the Wernher Collection of medieval and Renaissance treasures; the park beyond stood in for Mayfair.",city:"london"},{id:"princes-head-ted-lasso",n:"The Prince's Head",a:"Richmond Green, TW9",pc:"TW9",lat:51.4615,lng:-0.3062,c:"film",s:"Ted Lasso's 'Crown & Anchor'",q:"The Prince's Head Richmond Green",w:"The 300-year-old pub on Richmond Green that plays the Crown & Anchor in Ted Lasso (the interior is a studio rebuild). Step out and down Paved Court to find Ted's front door at number 11a — '9 3/4' on screen.",city:"london"},{id:"globe-tavern-bridget",n:"The Globe Tavern",a:"Borough Market, SE1",pc:"SE1",lat:51.5055,lng:-0.0905,c:"film",s:"Bridget Jones's flat, above the pub",q:"The Globe Tavern Bedale Street Borough",w:"On the edge of Borough Market, this is the pub over which Bridget Jones supposedly kept her flat — the camera looks down on the market from her window. The opening 'All By Myself' singalong made the spot a fan favourite.",city:"london"},{id:"earls-court-tardis",n:"Earl's Court Police Box",a:"Earl's Court, SW5",pc:"SW5",lat:51.4915,lng:-0.1935,c:"film",s:"a real-life TARDIS on the street",q:"Earl's Court police box TARDIS",w:"A genuine 1996 Metropolitan Police call box stands outside Earl's Court Tube — the same blue Mark 2 design the BBC turned into Doctor Who's TARDIS. Whovians treat the unassuming corner as a quiet shrine.",city:"london"},{id:"isabellaplant",n:"Isabella Plantation",a:"Richmond Park",pc:"TW10",lat:51.4334,lng:-0.2774,c:"green",s:"azaleas · hidden woodland garden",q:"Isabella Plantation Richmond Park",w:"Deep in Richmond Park’s deer-cropped acres hides a 40-acre woodland garden that detonates into azalea fire every late April. Lord Sidmouth fenced it off two centuries ago to keep the deer out; now its streams and ponds glow with rhododendron and Kurume azaleas brought from Japan in the 1920s. Few bother to seek it — wander the paths and let the colour do its quiet violence.",city:"london"},{id:"fryingpanalley",n:"Frying Pan Alley",a:"Spitalfields",pc:"E1",lat:51.5175,lng:-0.0775,c:"alley",s:"ironmongers’ ghost · a whispering passage",q:"Frying Pan Alley Spitalfields London",w:"A narrow gullet off the old Petticoat Lane, named for the frying pans that ironmongers once hung above their doors as trade signs. Step in and the centuries press close — East End grit gone quiet. The sort of passage you crave on an afternoon when you want alleys that whisper instead of shout.",city:"london"},{id:"bowcreek",n:"Bow Creek Ecology Park",a:"Canning Town",pc:"E16",lat:51.5121,lng:0.0034,c:"green",s:"ironworks turned wild · a Lea peninsula",q:"Bow Creek Ecology Park",w:"On a peninsula where the River Lea coils toward the Thames, an 1846 ironworks and coal wharf has been reclaimed by reeds, ponds and birdsong. The DLR rattles overhead; tidal water laps below. A Green Flag wildlife haven hiding a thousand feet from Canning Town station — proof the city still grows wild at its edges.",city:"london"},{id:"wickwoodland",n:"Wick Woodland",a:"Hackney",pc:"E9",lat:51.5475,lng:-0.0295,c:"green",s:"saved from concrete · 30,000 trees",q:"Wick Woodland Hackney Marshes",w:"A triangular plot at the southern tip of Hackney Marshes, planted with 30,000 trees in 1996 when locals fought off the developers. Silver birches reach up with a faintly ghostly hush; plane trees lean in from the towpath. The busy road runs close, yet the wood swallows the noise. London still has wild edges worth defending.",city:"london"},{id:"littlebritain",n:"Little Britain",a:"Smithfield",pc:"EC1A",lat:51.5172,lng:-0.0985,c:"alley",s:"medieval echoes · by St Bart’s",q:"Little Britain street London Smithfield",w:"A crooked City street curling past St Bartholomew’s, named for the Dukes of Brittany who once kept houses here. The roar of the Square Mile fades to a whisper between the old walls; duck through toward Smithfield and half-expect a Dickens character to round the corner. Medieval London, still legible if you slow down.",city:"london"},{id:"waterlanerich",n:"Water Lane",a:"Richmond",pc:"TW9",lat:51.4612,lng:-0.3068,c:"alley",s:"cobbles down to the Thames",q:"Water Lane Richmond riverside",w:"A short cobbled descent from Richmond’s bustle down to the river, lined with the backs of old buildings. At the bottom the Thames opens out — boats, willows, evening light. An atmospheric little throat of a lane, the kind you take slowly with nowhere in particular to be.",city:"london"},{id:"suttonhouse",n:"Sutton House",a:"Hackney",pc:"E9",lat:51.5483,lng:-0.0503,c:"history",s:"Tudor survivor · a punk-squat past",q:"Sutton House Hackney National Trust",w:"A 1535 Tudor manor of warm red brick, marooned among modern Hackney — manor, then school, then in the 1980s a squatted punk den whose graffiti the National Trust chose to keep. Wander the panelled rooms and quiet courtyard and the centuries fold together: oak linenfold, Jacobean painted shields, and a rare survivor’s stubborn calm. A time machine off Homerton High Street.",city:"london"},{id:"carlyleshouse",n:"Carlyle’s House",a:"Chelsea",pc:"SW3",lat:51.4843,lng:-0.17,c:"literary",s:"a Victorian writer’s home · walled garden",q:"Carlyle’s House Cheyne Row Chelsea",w:"On a quiet Chelsea row built in 1708, the home of Thomas and Jane Carlyle survives almost unchanged — dim hallways, the decoupage screen Jane made in 1849, the small walled garden where the great Victorian wrote and fretted. Dickens, Tennyson and Ruskin all climbed these stairs. A modest house, thick with the texture of a literary life.",city:"london"},{id:"alburystreet",n:"Albury Street",a:"Deptford",pc:"SE8",lat:51.4806,lng:-0.0244,c:"history",s:"early-Georgian doorcases · 1706",q:"Albury Street Deptford Georgian",w:"A cobbled Deptford side street, laid out in 1706 for dockyard officers and shipwrights, that has somehow kept its early-Georgian terrace intact. Look up at the doorways — carved wooden canopies, each bracket a different design, cut by ship’s carpenters. Look down at the cobbles. At the far end, the spire of St Paul’s. London as it once imagined itself: orderly, durable, slow.",city:"london"},{id:"ronniescotts",n:"Ronnie Scott’s",a:"Soho",pc:"W1D",lat:51.5137,lng:-0.1314,c:"music",s:"Soho jazz since 1959",q:"Ronnie Scott’s Jazz Club Frith Street",w:"Down a Frith Street doorway glows the red sign of Britain’s most storied jazz club, open since 1959. Miles, Monk and Hendrix all played here — the last gig Hendrix ever performed was on this stage. Velvet dark, low-lit and reverent: the kind of room where you order a drink, stop talking, and let the music have the floor.",city:"london"},{id:"hackneyempire",n:"Hackney Empire",a:"Hackney",pc:"E8",lat:51.5453,lng:-0.0556,c:"music",s:"Edwardian music hall · 1901",q:"Hackney Empire theatre Mare Street",w:"Frank Matcham’s 1901 music hall on Mare Street, all gilt and terracotta swagger, where Marie Lloyd and Charlie Chaplin once worked the variety bill and stand-ups still do. The ornate auditorium still crackles with the ghosts of a thousand turns — a temple to performance that somehow dodged the wrecking ball. Magnificent, lit up at night.",city:"london"},{id:"ridleyroad",n:"Ridley Road Market",a:"Dalston",pc:"E8",lat:51.5476,lng:-0.0743,c:"food",s:"Dalston’s Afro-Caribbean market",q:"Ridley Road Market Dalston",w:"A century-old Dalston street market where the city’s appetites collide — yams and plantain, Turkish bread, Caribbean fish counters, bolts of fabric, gospel and the shouts of traders. Loud, cheap, gloriously alive and stubbornly itself amid the creeping cafes. Come hungry, wander slowly, and eat where the queue is longest.",city:"london"},{id:"ealingpolish",n:"Our Lady Mother of the Church Polish Church",a:"Ealing",pc:"W5",lat:51.5123,lng:-0.3018,c:"polish",s:"émigré canon",q:"Polish Church Ealing Our Lady Mother of the Church",w:"Former Ealing Broadway Methodist church (1868 Gothic Revival with tall spire) acquired by the Polish community in 1986. Part of the quiet westward drift of Polonia from Acton through Ealing Common. Now home to Polish Roman Catholic parish life — services, memory, community in a building that outlived its original congregation. A pilgrimage site for West London Poles.",city:"london"},{id:"rubens",n:"Rubens at the Palace (Polish Government-in-Exile HQ)",a:"Victoria",pc:"SW1",lat:51.4982,lng:-0.1421,c:"polish",s:"government in exile",q:"Rubens Hotel Buckingham Palace Road Polish exile",w:"During the war this hotel at 39 Buckingham Palace Road housed the Polish Government-in-Exile’s military headquarters. From here Sikorski and others coordinated the fight, intelligence and diplomacy while a state that refused to die operated from London. Plaques and memory remain — the paper trail of exile in plain sight near the palace gardens.",city:"london"},{id:"stclementdanespolish",n:"Polish Air Force Memorial, St Clement Danes",a:"Strand",pc:"WC2",lat:51.5126,lng:-0.117,c:"polish",s:"RAF Polish airmen",q:"Polish Air Force Memorial St Clement Danes London",w:"St Clement Danes, rebuilt after the Blitz as the Central Church of the Royal Air Force. The floor is inlaid with over a thousand hand-carved Welsh slate badges of RAF squadrons and units. Specific memorials honour the Polish Air Force — the men who flew with the RAF from British soil during the war, many never to return home. Ties directly into the wider story of Polish exile, contribution and memory.",city:"london"},{id:"thealbanydeptford",n:"The Albany",a:"Deptford",pc:"SE8",lat:51.478,lng:-0.026,c:"music",s:"radical community venue",q:"The Albany Deptford London",w:"A radical, community-run arts centre and theatre in Deptford with deep roots in 1970s–80s alternative culture, anti-racism work and local organising. Still going strong with a programme that mixes experimental performance, music and community projects. A living piece of South London’s grassroots cultural history in a former church hall.",city:"london"},{id:"hopeandanchor",n:"Hope & Anchor",a:"Islington",pc:"N1",lat:51.538,lng:-0.103,c:"music",s:"punk & new wave pub",q:"Hope & Anchor Islington London",w:"Legendary Islington pub that became one of the key venues of the late-1970s punk and new wave explosion. The Stranglers, The Damned, Joy Division and countless others played the tiny back room. Still a proper music pub with history you can feel in the walls. One of the last places where that raw, pre-corporate music scene feels tangible.",city:"london"},{id:"ealingstudios",n:"Ealing Studios",a:"Ealing",pc:"W5",lat:51.51,lng:-0.308,c:"film",s:"British comedy home",q:"Ealing Studios London",w:"The oldest continuously working film studio in the world and the spiritual home of the great Ealing Comedies (Kind Hearts and Coronets, The Lavender Hill Mob, Passport to Pimlico). The lot, stages and offices where Alec Guinness, Stanley Holloway and so many others created a very particular, very British kind of cinema. Still active, still full of ghosts.",city:"london"},{id:"tradescanttomb",n:"Tradescant Tomb",a:"Lambeth",pc:"SE1",lat:51.495,lng:-0.12,c:"oddity",s:"plant hunters’ grave",q:"Tradescant Tomb Lambeth London",w:"The extraordinary 17th-century tomb of John Tradescant the Elder and Younger — royal gardeners, plant hunters and collectors of curiosities — in the churchyard of St Mary-at-Lambeth. Carved with exotic plants, animals and the family crest. The men who brought the pineapple, the horse chestnut and countless other species to Britain. A strange, beautiful monument to curiosity and empire.",city:"london"},{id:"theflask",n:"The Flask",a:"Highgate",pc:"N6",lat:51.571,lng:-0.148,c:"pub",s:"village pub with ghosts",q:"The Flask Highgate London",w:"A proper old Highgate village pub with 17th-century origins and a long list of famous (and infamous) drinkers — from highwaymen to writers and actors. Low ceilings, wood panelling, and the feeling that the village that once stood here is still just outside the door. One of the last places where old Highgate survives.",city:"london"},{id:"rosetheatre",n:"The Rose Theatre remains",a:"Bankside",pc:"SE1",lat:51.507,lng:-0.093,c:"history",s:"Shakespeare’s rival",q:"Rose Theatre Bankside London",w:"The excavated remains of the Rose — the first purpose-built Elizabethan playhouse on Bankside and the main rival to the later Globe. Visible through a glass floor in the basement of a modern office building. The stage where Marlowe’s plays were first performed and where the very first Shakespeare productions happened. A genuine archaeological ghost of Elizabethan theatre.",city:"london"},{id:"rinkoffbakery",n:"Rinkoff Bakery",a:"Stepney",pc:"E1",lat:51.515,lng:-0.052,c:"bakery",s:"family bakery since 1911",q:"Rinkoff Bakery Commercial Road London",w:"Family bakery started in 1911 by Ukrainian refugee Hyman Rinkoff and his wife in Stepney. Passed through generations, still baking breads, cakes, pastries and legendary jam doughnuts from Eastern European recipes. A living piece of East End immigrant food history that has fed the community for over a century.",city:"london"},{id:"regencycafe",n:"The Regency Cafe",a:"Pimlico",pc:"SW1",lat:51.492,lng:-0.138,c:"caff",s:"art deco working man’s caff",q:"Regency Cafe Pimlico London",w:"Classic art deco working man’s café with Formica tables, chrome and proper strong tea. Big full English breakfasts and a no-nonsense atmosphere. Has appeared in films but remains a genuine local caff. One of the best-preserved mid-century working-class eating places in London.",city:"london"},{id:"fcookepieandmash",n:"F. Cooke Pie & Mash",a:"Dalston",pc:"E8",lat:51.546,lng:-0.075,c:"pieandmash",s:"traditional East London pie shop",q:"F Cooke pie and mash Dalston London",w:"A proper traditional pie and mash shop in Dalston that has been feeding generations of East Londoners. Stewed eels, liquor, mash and the classic tiled interior. A living working-class food institution that feels increasingly rare. Strong tea and no fuss — exactly as it should be.",city:"london"},{id:"rainbowbakery",n:"Rainbow Bakery",a:"Dalston",pc:"E8",lat:51.546,lng:-0.075,c:"bakery",s:"UK’s only St Lucian bakery",q:"Rainbow Bakery Dalston London",w:"The UK’s only St Lucian bakery in Dalston — family-run and carrying Caribbean recipes and traditions into East London. Fresh bakes, community warmth and the feeling of a neighbourhood institution that belongs to the people who live here. A beautiful, specific piece of London’s immigrant food story.",city:"london"},{id:"raabsbakers",n:"Raabs The Bakers",a:"Islington",pc:"N1",lat:51.536,lng:-0.103,c:"bakery",s:"est. 1948 old school bakery",q:"Raabs The Bakers Essex Road Islington",w:"Proper old-school London bakery on Essex Road since 1948. Fresh bread, crusty rolls, sweet and savoury bakes made the traditional way. The kind of place where quality has never been compromised and locals still queue for the real thing. A living piece of mid-century Islington food culture.",city:"london"},{id:"ivyscafe",n:"Ivy’s Cafe",a:"Poplar",pc:"E14",lat:51.511,lng:-0.015,c:"caff",s:"Chrisp Street caff, medieval roots",q:"Ivy's Cafe Chrisp Street Poplar London",w:"A proper East End market café on Chrisp Street that still serves pease pudding — a dish with medieval roots once common in working-class London eateries. Family-run, no fuss, and one of the last places keeping this specific piece of London food heritage alive.",city:"london"},{id:"hoopandgrapes",n:"Hoop and Grapes",a:"Aldgate",pc:"EC3",lat:51.514,lng:-0.077,c:"pub",s:"survived the Great Fire",q:"Hoop and Grapes Aldgate London",w:"One of the very few buildings in the City that survived the Great Fire of 1666. A timber-framed pub with centuries of history. The interior still carries the feeling of pre-Fire London. A quiet survivor in the shadow of the modern financial district.",city:"london"},{id:"thelamb",n:"The Lamb",a:"Bloomsbury",pc:"WC1",lat:51.522,lng:-0.124,c:"pub",s:"literary Bloomsbury pub",q:"The Lamb Bloomsbury London",w:"A beautiful tiled Victorian pub in the heart of Bloomsbury with a long association with writers, academics and the Bloomsbury Group. Etched glass snob screens and a peaceful back room. Still a proper local with deep cultural roots.",city:"london"},{id:"oldbelltavern",n:"The Old Bell Tavern",a:"Fleet Street",pc:"EC4",lat:51.514,lng:-0.106,c:"pub",s:"Wren’s builders’ pub",q:"Old Bell Tavern Fleet Street London",w:"Built for the workmen who constructed St Bride’s Church after the Great Fire. A proper old Fleet Street boozer with a long association with journalists and printers. Quiet, slightly hidden and full of the layered history of the street.",city:"london"},{id:"thealbioncafe",n:"The Albion Cafe",a:"Shoreditch",pc:"E1",lat:51.525,lng:-0.078,c:"caff",s:"neighbourhood survivor",q:"Albion Cafe Shoreditch London",w:"A proper Shoreditch caff that has held its corner through every wave of reinvention around it — strong tea, an unfussy plate and the easy regulars'-table feel that keeps a changing street human.",city:"london"},{id:"workmanscafe",n:"Workman's Cafe",a:"Archway",pc:"N19",lat:51.565,lng:-0.135,c:"caff",s:"old-school greasy spoon",q:"Workman's Cafe Archway London",w:"A genuine Archway working man's caff — pork sausage and bacon, bubble and squeak, mugs of strong tea and the unhurried local conversation that has kept places like this going while the chains came and went.",city:"london"},{id:"electriccafe",n:"The Electric Cafe",a:"West Norwood",pc:"SE27",lat:51.432,lng:-0.098,c:"caff",s:"beloved greasy spoon",q:"Electric Cafe West Norwood London",w:"A much-loved old greasy spoon between Tulse Hill and West Norwood — big breakfasts, proper tea and the unhurried calm of a real local that has quietly fed the area for years.",city:"london"},{id:"mappscafe",n:"Mapps Cafe",a:"Hackney Wick",pc:"E9",lat:51.542,lng:-0.025,c:"caff",s:"Hackney Wick anchor",q:"Mapps Cafe Hackney Wick London",w:"A friendly Hackney Wick local doing lentil soup, sandwiches and reliable home-style cooking — one of those small, steady anchors that holds a fast-changing neighbourhood together.",city:"london"},{id:"yeastbakery",n:"Yeast Bakery",a:"Hackney",pc:"E8",lat:51.546,lng:-0.055,c:"bakery",s:"family-run bakery",q:"Yeast Bakery Hackney London",w:"A family-run Hackney bakery turning out some of the best croissants and pastries in the area — daily, early and made with real care. The kind of unflashy local a street organises its mornings around.",city:"london"},{id:"electricavenue",n:"Electric Avenue",a:"Brixton",pc:"SW9",lat:51.4628,lng:-0.1148,c:"history",s:"first electric street",q:"Electric Avenue Brixton",w:"Built in 1888, this was the first market street in London lit by electricity — cast-iron canopies and incandescent bulbs that let traders work after dark while the rest of the city still squinted by gaslight. It gave Eddy Grant his 1983 anthem, written in the wake of the 1981 Brixton uprising, and still carries the African and Caribbean produce stalls at the heart of Brixton Market.",city:"london"},{id:"windmillpub",n:"The Windmill, Brixton",a:"Brixton",pc:"SW2",lat:51.454,lng:-0.1246,c:"music",s:"post-punk crucible",q:"The Windmill Brixton music venue",w:"A scruffy 1970s estate pub beside Windmill Gardens that became one of the most important small venues in the country. Through the late 2010s it incubated the South London guitar scene — Black Country, New Road, Squid, Fat White Family and black midi all cut their teeth on its tiny stage. Not to be confused with the heritage windmill a hundred metres away; this Windmill grinds something louder.",city:"london"},{id:"stnicholasdeptford",n:"St Nicholas Church, Deptford",a:"Deptford",pc:"SE8",lat:51.4824,lng:-0.0263,c:"literary",s:"Shakespeare’s rival",q:"St Nicholas Church Deptford Marlowe",w:"Christopher Marlowe — Shakespeare’s exact contemporary, rival, and probable government spy — was buried in an unmarked grave here on 1 June 1593, days after being stabbed through the eye in a Deptford lodging house, in a killing that still smells of the Walsingham intelligence network. The medieval tower survives; the rest was rebuilt in 1697. The carved skull-and-crossbones on the churchyard gateposts are said to have given the world the pirate’s Jolly Roger.",city:"london"},{id:"sayescourt",n:"Sayes Court Park (John Evelyn’s garden)",a:"Deptford",pc:"SE8",lat:51.4869,lng:-0.0283,c:"green",s:"tsar in the hedge",q:"Sayes Court Deptford John Evelyn",w:"The site of the most celebrated private garden in 17th-century England, laid out by the diarist John Evelyn from 1652 — French parterres and a legendary holly hedge. In 1698 Evelyn lent the house to Tsar Peter the Great, then in Deptford learning shipbuilding; the Tsar and his men wrecked the place, reportedly by barrowing one another through the hedge, and the Treasury paid out over £350 in damages. A quiet park and an ancient mulberry mark the spot — and it was very nearly the National Trust’s first-ever acquisition.",city:"london"},{id:"bonningtonsquare",n:"Bonnington Square Pleasure Garden",a:"Vauxhall",pc:"SW8",lat:51.4843,lng:-0.1233,c:"green",s:"squatters’ Eden",q:"Bonnington Square garden Vauxhall",w:"A lush pocket garden created by residents in 1990 on a WWII bomb site, named for the grand Vauxhall Pleasure Gardens that once lay just to the north. The 1870s railway-workers’ square was saved from demolition by 1980s squatters, who turned it into a housing co-op with a vegetarian café and a wholefood shop; designer Dan Pearson planted the garden, threading English borders through tropical exotics around a salvaged industrial waterwheel.",city:"london"},{id:"littleportugal",n:"Little Portugal, South Lambeth Road",a:"Stockwell",pc:"SW8",lat:51.4783,lng:-0.1228,c:"diaspora",s:"pastéis and saudade",q:"Little Portugal South Lambeth Road Stockwell",w:"The stretch of South Lambeth Road between Vauxhall and Stockwell is the heart of the UK’s largest Portuguese-speaking community — over nine thousand in Lambeth alone — many with roots in Madeira and arriving from the 1960s on. Red-and-green pastelarias like Lisboa and Estrela serve pastéis de nata, salt cod and bica strong enough to walk you home. London’s quietest, most delicious bit of saudade.",city:"london"},{id:"vauxhallcityfarm",n:"Vauxhall City Farm",a:"Vauxhall",pc:"SE11",lat:51.4866,lng:-0.1199,c:"oddity",s:"alpacas by MI6",q:"Vauxhall City Farm",w:"Founded in 1977 on demolition-scarred land, this is one of London’s oldest and most central city farms — pigs, sheep, goats and alpacas grazing barely a stone’s throw from the MI6 building on the river. On a sliver of inner-city acreage it runs youth and education programmes and a Riding for the Disabled centre. Espionage on one bank, alpacas on the other.",city:"london"},{id:"southlondongallery",n:"South London Gallery",a:"Camberwell",pc:"SE5",lat:51.4743,lng:-0.0806,c:"museum",s:"art for the people",q:"South London Gallery Camberwell",w:"A free contemporary-art gallery in a purpose-built hall that opened in 1891, founded by William Rossiter to bring art to the people of South London — with Frederic Leighton, Burne-Jones and Walter Crane among its early backers and Gladstone as first president. In 2018 it spread across the road into a Grade II-listed former fire station. Ambitious, unstuffy and still free, more than a century on.",city:"london"},{id:"limehousebasin",n:"Limehouse Basin",a:"Limehouse",pc:"E14",lat:51.5125,lng:-0.0395,c:"canals",s:"where canal meets river",q:"Limehouse Basin London",w:"The old Regent’s Canal Dock, opened in 1820 as the link between London’s canal network and the Thames — once a coal-and-timber port thick with barges and lighters, now a glassy yacht marina ringed by Docklands towers. From here the Limehouse Cut (1770), London’s oldest canal, strikes north to the Lea. Stand on the lock and you’re at the hinge between the inland canals and the tidal river.",city:"london"},{id:"threemills",n:"Three Mills (House Mill)",a:"Bromley-by-Bow",pc:"E3",lat:51.529,lng:-0.0103,c:"canals",s:"the great tidal mill",q:"Three Mills House Mill Bromley-by-Bow",w:"On an island in the River Lea stands the House Mill of 1776 — one of the largest tidal mills left in the world, Grade I listed. It worked the rise and fall of the Lea to grind grain for an adjacent gin distillery, the tide doing for free what steam later charged for. A startlingly rural survivor in the shadow of the Olympic Park.",city:"london"},{id:"trinitygreen",n:"Trinity Green Almshouses",a:"Mile End",pc:"E1",lat:51.5223,lng:-0.0524,c:"almshouses",s:"mariners’ refuge",q:"Trinity Green Almshouses Mile End",w:"Built in 1695 by Trinity House for ‘28 decay’d Masters & Commanders of Ships or ye Widows of such’, on land given by a Ratcliffe sea-captain. Two rows of cottages face a quiet green, model warships perched on the gable ends; C.R. Ashbee saved them from demolition in 1895. A pocket of the maritime 17th century stranded on the Mile End Road.",city:"london"},{id:"mordencollege",n:"Morden College",a:"Blackheath",pc:"SE3",lat:51.4695,lng:0.0195,c:"almshouses",s:"the ruined merchants’ haven",q:"Morden College Blackheath",w:"Founded around 1695 by the Levant Company merchant Sir John Morden for fellow traders ruined ‘by perils of the seas’ — a serene Baroque red-brick quadrangle long credited to Wren, though actually raised by his master mason Edward Strong. Still a working retirement community on the edge of Blackheath. Charity built on the risk of the sea, three centuries before bankruptcy law.",city:"london"},{id:"hoptonsalmshouses",n:"Hopton’s Almshouses",a:"Bankside",pc:"SE1",lat:51.5067,lng:-0.1015,c:"almshouses",s:"Georgian calm behind Tate Modern",q:"Hopton's Almshouses Bankside",w:"A trim Georgian courtyard of 1746–52, built under the will of the fishmonger Charles Hopton to house ‘poor decayed men’ of the parish — and now hidden directly behind the roar of Tate Modern. Twenty-six little brick houses around a lawn, almost absurdly peaceful given the Turbine Hall is a minute’s walk away.",city:"london"},{id:"museumofthehome",n:"Museum of the Home (Geffrye Almshouses)",a:"Hoxton",pc:"E2",lat:51.5331,lng:-0.0769,c:"almshouses",s:"ironmongers’ charity",q:"Museum of the Home Geffrye Hoxton",w:"Fourteen almshouses of 1714, built by the Ironmongers’ Company from the bequest of Sir Robert Geffrye — a merchant whose fortune was partly bound up in the transatlantic slave trade, a fact the museum now confronts head-on. Saved by the London County Council in 1911 and opened as a museum in 1914, it walks you through four centuries of the English living room, with a restored almshouse interior on select days.",city:"london"},{id:"trinityhospitalgreenwich",n:"Trinity Hospital, Greenwich",a:"Greenwich",pc:"SE10",lat:51.4853,lng:-0.002,c:"almshouses",s:"riverside Gothic almshouse",q:"Trinity Hospital Greenwich",w:"Founded in 1613 by Henry Howard, Earl of Northampton, for twenty poor men, and dressed up in toy-Gothic in 1812 — a tiny crenellated almshouse dwarfed by the old power station beside it on the Thames Path. It sits almost exactly on the Greenwich Meridian, run to this day by the Mercers’ Company. Easy to miss, impossible to forget.",city:"london"},{id:"crystalpalacesubway",n:"Crystal Palace Subway",a:"Crystal Palace",pc:"SE19",lat:51.4178,lng:-0.0723,c:"follies",s:"the cathedral underground",q:"Crystal Palace Subway",w:"A breathtaking vaulted brick subway of 1865 by Charles Barry Jr., built to carry first-class passengers beneath the road to the High Level station serving the relocated Crystal Palace — red and cream brick fanning overhead like a Byzantine crypt. The palace burned in 1936; this jewel of a passage survived underground, opened now only on occasional days.",city:"london"},{id:"cabmensshelter",n:"Cabmen’s Shelter, Russell Square",a:"Bloomsbury",pc:"WC1B",lat:51.523,lng:-0.1255,c:"follies",s:"the little green hut",q:"Cabmen's Shelter Russell Square",w:"One of just thirteen surviving green-painted Victorian cabmen’s shelters — of sixty-one built between 1875 and 1950 — each by law no larger than a horse and cart so as not to block the road. Inside, a tiny kitchen still serves tea and bacon to black-cab drivers, a members’ club the size of a garden shed. All thirteen are now listed.",city:"london"},{id:"londonreviewbookshop",n:"London Review Bookshop",a:"Bloomsbury",pc:"WC1A",lat:51.5183,lng:-0.1245,c:"bookshops",s:"the critics’ bookshop",q:"London Review Bookshop Bloomsbury",w:"The bookshop of the ‘London Review of Books’, opened in 2003 a step from the British Museum — densely, intelligently stocked, with an adjoining cake shop that regulars rate almost as highly as the shelves. The natural habitat of the Bloomsbury reader, and one of the best events programmes in the city.",city:"london"},{id:"housmans",n:"Housmans",a:"King’s Cross",pc:"N1",lat:51.5316,lng:-0.1206,c:"bookshops",s:"the radical bookshop",q:"Housmans Bookshop Kings Cross",w:"A radical and peace-movement bookshop founded in 1945 and named for the pacifist poet Laurence Housman, on the Caledonian Road near King’s Cross. Shelves of dissent, small-press politics and second-hand bargains in the basement; it has outlasted nearly every other bookshop of its kind in Britain.",city:"london"},{id:"watermenshall",n:"Watermen’s Hall",a:"City of London",pc:"EC3R",lat:51.5095,lng:-0.0833,c:"livery",s:"the only Georgian hall",q:"Watermen's Hall City of London",w:"The only original Georgian livery hall left in the City, built 1778–80 by William Blackburn for the Company of Watermen and Lightermen — the Thames boatmen who were London’s original cabbies. Uniquely it is a guild ‘without livery’, created and governed by Act of Parliament in 1555. A jewel-box of a hall down a lane near the river; interior by tour only.",city:"london"},{id:"apothecarieshall",n:"Apothecaries’ Hall",a:"Blackfriars",pc:"EC4V",lat:51.5125,lng:-0.1037,c:"livery",s:"the physic-garden founders",q:"Apothecaries' Hall Blackfriars",w:"The oldest surviving livery hall in the City, rebuilt by 1672 after the Great Fire on the site of a Dominican priory. The Society of Apothecaries founded the Chelsea Physic Garden in 1673 and made and sold drugs here into the 20th century; a young John Keats qualified to practise medicine within these walls in 1816. Glimpse the courtyard from Black Friars Lane.",city:"london"},{id:"goldsmithshall",n:"Goldsmiths’ Hall",a:"City of London",pc:"EC2V",lat:51.5151,lng:-0.0966,c:"livery",s:"where ‘hallmark’ was born",q:"Goldsmiths' Hall City of London",w:"The opulent 1835 hall of one of the City’s ‘Great Twelve’ companies, by Philip Hardwick — and the literal origin of the word ‘hallmark’, for here silver and gold have been assayed and marked since the 14th century. The annual Trial of the Pyx still tests the nation’s coinage under its roof.",city:"london"},{id:"mansionhouse",n:"Mansion House",a:"City of London",pc:"EC4N",lat:51.5128,lng:-0.0894,c:"livery",s:"the Lord Mayor’s palace",q:"Mansion House City of London",w:"The Palladian official residence of the Lord Mayor of London, built 1739–52 by George Dance the Elder — home to the barrel-vaulted Egyptian Hall and a world-class hoard of Dutch Golden Age paintings. The grandest civic house in the Square Mile, facing the Bank and the old Royal Exchange across the busiest junction in the City.",city:"london"},{id:"florincourt",n:"Florin Court",a:"Clerkenwell",pc:"EC1M",lat:51.5205,lng:-0.0975,c:"artdeco",s:"Poirot’s Art Deco home",q:"Florin Court Charterhouse Square",w:"A curved Streamline-Moderne block of 1936 on Charterhouse Square, with a roof garden and basement pool — and, to a generation of television viewers, Hercule Poirot’s ‘Whitehaven Mansions’. Its sleek sun-trap balconies wrap the corner like the prow of a liner run aground in Clerkenwell.",city:"london"},{id:"daimlerhiregarage",n:"Daimler Hire Garage",a:"Bloomsbury",pc:"WC1N",lat:51.5246,lng:-0.1255,c:"artdeco",s:"the spiral motor garage",q:"Daimler Hire Garage Herbrand Street",w:"A rare 1931 Art Deco multi-storey car garage on Herbrand Street, by Wallis, Gilbert & Partners — the same hand as the Hoover Building — its great curved corner of Crittall glazing wrapped around a sculptural internal spiral ramp. Built for the age of the chauffeured Daimler, now offices, still unmistakably itself.",city:"london"},{id:"hooverbuilding",n:"Hoover Building",a:"Perivale",pc:"UB6",lat:51.5258,lng:-0.3217,c:"artdeco",s:"the drive-by palace",q:"Hoover Building Perivale",w:"Wallis, Gilbert & Partners’ dazzling ‘Modern Palace of Industry’ of 1933 on the A40 — sunburst tiles, Egyptian and Aztec colour, a façade built to be admired at speed from a passing car. Betjeman called it ‘a sort of Art Deco Wentworth Woodhouse’; it’s flats now, with a supermarket behind, but the front still stops the traffic.",city:"london"},{id:"senatehouse",n:"Senate House",a:"Bloomsbury",pc:"WC1E",lat:51.5216,lng:-0.13,c:"artdeco",s:"Orwell’s Ministry of Truth"
