 girl next door, Fanny Brawne, then left for Rome to die at twenty-five. Romantic poetry's most poignant address."},{id:"bunhill",n:"Bunhill Fields",a:"Finsbury",pc:"EC1",lat:51.5232,lng:-.0878,c:"green",s:"Blake, Defoe & Bunyan",q:"Bunhill Fields burial ground City Road",w:"A walled nonconformist burial ground just beyond the old City wall, its name a corruption of 'Bone Hill'. William Blake, Daniel Defoe and John Bunyan all lie here among the plane trees; Blake's stone still draws pilgrims and fresh flowers. A startlingly peaceful pause off the City Road."},{id:"barbicancons",n:"Barbican Conservatory",a:"Barbican",pc:"EC2",lat:51.52,lng:-.0938,c:"green",s:"jungle in the concrete",q:"Barbican Conservatory",w:"Hidden inside the brutalist Barbican is a steamy tropical jungle \u2014 more than 1,500 species of plants and trees spilling over the concrete around fish ponds, the second-largest conservatory in London. It opens only on select days, so check ahead; palms against raw concrete is the entire point."},{id:"chelseaphysic",n:"Chelsea Physic Garden",a:"Chelsea",pc:"SW3",lat:51.4842,lng:-.164,c:"green",s:"since 1673 \xB7 walled",q:"Chelsea Physic Garden",w:"London's oldest botanic garden, founded by the Society of Apothecaries in 1673 to grow medicinal plants by the Thames. A walled four acres of rare and poisonous specimens, the country's oldest rock garden, and a microclimate mild enough for grapefruit to ripen outdoors. Paid entry, and worth it."},{id:"abbeyroad",n:"Abbey Road Crossing",a:"St John's Wood",pc:"NW8",lat:51.532,lng:-.1775,c:"music",s:"the Beatles crossing",q:"Abbey Road Studios zebra crossing",w:"The most photographed zebra crossing on earth, outside the studios where the Beatles recorded almost everything and shot that 1969 cover. Tourists still hold up St John's Wood traffic to recreate the stride, and the studio wall is a rolling autograph book. Mind the cars \u2014 it's a live road."},{id:"allypally",n:"Alexandra Palace",a:"Muswell Hill",pc:"N22",lat:51.5945,lng:-.13,c:"pop",s:"birthplace of TV \xB7 big views",q:"Alexandra Palace",w:"The Victorian 'People's Palace' on a north-London hilltop \u2014 and the birthplace of television: the BBC made the world's first regular high-definition broadcasts from here in 1936. The transmitter mast still crowns the ridge, and the terrace view back over the whole city is enormous."},{id:"templechurch",n:"Temple Church",a:"Temple",pc:"EC4",lat:51.5135,lng:-.1105,c:"history",s:"the Templars' round church",q:"Temple Church London",w:"A round church built by the Knights Templar and consecrated in 1185, buried in the lawyers' warren of the Inns of Court \u2014 stone effigies of medieval knights lie across the floor of the nave. Made famous again by 'The Da Vinci Code', genuinely atmospheric, and very easy to walk past."},{id:"greatstbarts",n:"St Bartholomew the Great",a:"Smithfield",pc:"EC1",lat:51.519,lng:-.0998,c:"history",s:"Norman, since 1123",q:"St Bartholomew the Great Smithfield",w:"London's oldest surviving parish church, founded in 1123 beside Smithfield \u2014 a dim, massive Norman interior that feels centuries older than anything around it. You'll recognise it from 'Four Weddings', 'Shakespeare in Love' and a dozen films. Enter under the Tudor gatehouse off the old meat market."},{id:"yeoldemitre",n:"Ye Olde Mitre",a:"Holborn",pc:"EC1",lat:51.5187,lng:-.1075,c:"food",s:"1546 \xB7 hidden up an alley",q:"Ye Olde Mitre Ely Court London",w:"A tavern founded in 1546 and so well hidden up Ely Court that even cabbies miss it \u2014 once legally part of Cambridgeshire, so City constables couldn't make arrests inside. A preserved cherry tree marks where Elizabeth I is said to have danced; the snug back rooms are all dark oak. Closed weekends."},{id:"trinitybuoy",n:"Trinity Buoy Wharf",a:"Leamouth",pc:"E14",lat:51.5085,lng:.0085,c:"oddity",s:"lighthouse \xB7 1,000-year song",q:"Trinity Buoy Wharf lighthouse London",w:"London's only lighthouse stands where the Lea meets the Thames, on a spot where Michael Faraday once ran lighthouse experiments. Inside it plays 'Longplayer' \u2014 a piece of music composed to run a thousand years without repeating, begun on New Year's 2000. Around it sits a quirky village of stacked shipping containers and an American diner."},{id:"the100club",n:"The 100 Club",a:"Soho",pc:"W1",lat:51.5163,lng:-.134,c:"music",s:"jazz to punk, since 1942",q:"100 Club Oxford Street London",w:"A scruffy Oxford Street basement that's been a music room since 1942 \u2014 wartime jazz, the Rolling Stones, and the cradle of British punk: the legendary two-night Punk Special in 1976 with the Sex Pistols, the Clash and the Buzzcocks. Still putting bands on under your feet while the shoppers stream past above."},{id:"marxlibrary",n:"Marx Memorial Library",a:"Clerkenwell",pc:"EC1",lat:51.5225,lng:-.106,c:"finance",s:"where Lenin worked",q:"Marx Memorial Library Clerkenwell Green",w:"On Clerkenwell Green, in a 1738 former charity school, sits a library of radical and labour history \u2014 and the small back room where Lenin edited the revolutionary paper 'Iskra' in 1902\u201303 before smuggling it into Tsarist Russia. The Green has been London's protest pitch for centuries; visits are by tour."},{id:"woodygrill",n:"Woody Grill",a:"Shepherd's Bush",pc:"W12",lat:51.5046,lng:-.2224,c:"food",s:"charcoal grill, open late",q:"Woody Grill 1 Uxbridge Road Shepherd's Bush",w:"A Shepherd's Bush charcoal-grill stalwart right on Uxbridge Road \u2014 Turkish and wider Middle Eastern, everything cooked over fire in the open kitchen and portions built for two. Lamb shish, kofte and a pile of bread; cheap, generous, open late, two minutes off the Green."},{id:"truthcafe",n:"Truth Cafe",a:"Hammersmith",pc:"W6",lat:51.4925,lng:-.2235,c:"brunch",s:"global brunch, Hammersmith",q:"Truth Cafe Hammersmith London",w:"A bright, easygoing Hammersmith brunch room that globe-trots its breakfasts \u2014 Mexican chipotle eggs Benedict, sweet-potato waffles, towering American pancakes, with gluten-free and vegan well covered. Dog-friendly, a few tables outside, minutes from the Tube."},{id:"vintagecafe",n:"Vintage Caf\xE9 Shoreditch",a:"Shoreditch",pc:"E2",lat:51.5236,lng:-.0718,c:"brunch",s:"all-day breakfast, off Brick Lane",q:"Vintage Cafe Shoreditch Cheshire Street",w:"A cosy, nostalgically furnished caf\xE9 on Cheshire Street just off Brick Lane \u2014 all-day breakfasts, Eggs Royal, smashed avocado on sourdough and a properly good iced coffee, run warmly and independently. The kind of unhurried Sunday spot the East End does so well."},{id:"burnt",n:"Burnt",a:"Shepherd's Bush",pc:"W12",lat:51.506,lng:-.239,c:"brunch",s:"brunch every day \xB7 Askew Rd",q:"Burnt 163 Askew Road London",w:"An Askew Road favourite that treats brunch as the main event, every day of the week \u2014 creative plates well beyond the avocado clich\xE9, a cult fried-chicken sandwich, Climpson & Sons coffee and Dusty Knuckle pastries given a house twist. Light, plant-filled, with a back garden for the sun."},{id:"orchardaskew",n:"Orchard",a:"Shepherd's Bush",pc:"W12",lat:51.5052,lng:-.2392,c:"food",s:"seasonal \xB7 Askew Rd",q:"Orchard 136 Askew Road London W12",w:"A quietly excellent neighbourhood caf\xE9-restaurant at the top of Askew Road, with a seasonal menu that shifts to whatever's actually good \u2014 relaxed weekend brunch, honest midweek dinners, the kind of place locals get territorial about. Book ahead on a sunny Saturday."},{id:"wildthyme",n:"Wild Thyme",a:"Shepherd's Bush",pc:"W12",lat:51.5042,lng:-.2268,c:"brunch",s:"local brunch favourite",q:"Wild Thyme cafe Shepherd's Bush London",w:"A long-running, much-recommended brunch spot tucked on a residential street off Uxbridge Road \u2014 French toast, the hearty Wild Thyme Breakfast and a roll-call of classics done properly. One of Shepherd's Bush's most reliable weekend tables."},{id:"climpsons",n:"Climpson & Sons",a:"Broadway Market",pc:"E8",lat:51.5378,lng:-.0608,c:"coffee",s:"the East London roaster",q:"Climpson and Sons Broadway Market",w:"A Broadway Market institution and one of London's defining roasters since 2005 \u2014 the espresso that fuels half of East London's caf\xE9s, poured at the source from a tiny, perpetually busy shopfront. Grab a cup and walk the market on a Saturday."},{id:"ozone",n:"Ozone Coffee Roasters",a:"Shoreditch",pc:"EC2A",lat:51.5258,lng:-.084,c:"coffee",s:"NZ roastery, Shoreditch",q:"Ozone Coffee Roasters Leonard Street London",w:"A New Zealand roastery-caf\xE9 on a Shoreditch corner \u2014 roasting downstairs, serving a big, buzzy all-day menu upstairs, and pouring some of the most consistent flat whites in the city. A cornerstone of London's antipodean coffee wave."},{id:"allpress",n:"Allpress Espresso",a:"Shoreditch",pc:"E2",lat:51.524,lng:-.0742,c:"coffee",s:"Redchurch St espresso",q:"Allpress Espresso Redchurch Street London",w:"The Kiwi roaster's Redchurch Street espresso bar \u2014 small, focused and excellent, the sort of place you queue at on the way to somewhere else. Beans roasted nearby; a flat white the obvious order."},{id:"origincoffee",n:"Origin Coffee",a:"Shoreditch",pc:"EC2A",lat:51.5258,lng:-.0795,c:"coffee",s:"Cornish roaster, Shoreditch",q:"Origin Coffee Charlotte Road London",w:"Cornwall's pioneering roaster brought to a sleek bar on Charlotte Road \u2014 single-origin filters and a flat white made with real care, in a calm, pared-back room. Quietly one of the best cups in Shoreditch."},{id:"watchhouse",n:"WatchHouse \u2014 Bermondsey",a:"Bermondsey",pc:"SE1",lat:51.4985,lng:-.0815,c:"coffee",s:"the Bermondsey hut",q:"WatchHouse Bermondsey Street London",w:"It began in a tiny Victorian watchman's hut on Bermondsey Street and grew into London's slickest specialty-coffee name \u2014 house-roasted beans, considered milk and a calm, design-led room. The original hut is still the one to seek out."},{id:"coffeeplant",n:"Coffeeplant",a:"Notting Hill",pc:"W11",lat:51.5175,lng:-.2058,c:"coffee",s:"Portobello roaster",q:"Coffee Plant Portobello Road London",w:"A Portobello Road veteran roasting organic, fair-trade beans since the 1990s \u2014 no-frills and properly strong, in the middle of the market throng. A west-London antidote to the polished chains, and a fine fuel stop on a Portobello wander."},{id:"barbican-estate",n:"Barbican Estate",a:"City",pc:"EC2Y",lat:51.52,lng:-.0937,c:"history",s:"the concrete city-within-a-city",q:"Barbican Centre London",w:"The largest brutalist complex in Britain and a self-contained 'city within a city' on a 35-acre WWII bombsite \u2014 2,000 flats stacked above an arts centre, a lake, schools and the famous conservatory, laced together by elevated highwalks. Chamberlin, Powell & Bon's concrete masterwork, finished in 1976; follow the yellow line and get pleasurably lost."},{id:"trellick",n:"Trellick Tower",a:"Kensal Town",pc:"W10",lat:51.5215,lng:-.2055,c:"history",s:"Goldfinger's concrete icon",q:"Trellick Tower Golborne Road London",w:"Ern\u0151 Goldfinger's 31-storey brutalist landmark over Kensal Town, finished in 1972, with its slender slab and that detached, slot-windowed service tower. Once dubbed the 'Tower of Terror', now Grade II*-listed and one of London's most beloved concrete silhouettes \u2014 and barely a ten-minute walk from home."},{id:"balfron",n:"Balfron Tower",a:"Poplar",pc:"E14",lat:51.5155,lng:-.0105,c:"history",s:"Trellick's Poplar prototype",q:"Balfron Tower Poplar London",w:"Trellick's older East End sibling \u2014 Goldfinger's 26-storey 1967 brutalist prototype, same dramatic detached lift tower, same raw concrete conviction. Goldfinger briefly moved into the top floor to prove it was liveable; since regenerated into private flats, controversially so. Best admired from the street."},{id:"nationaltheatre",n:"National Theatre",a:"South Bank",pc:"SE1",lat:51.507,lng:-.114,c:"history",s:"Lasdun's concrete strata",q:"National Theatre South Bank London",w:"Denys Lasdun's 1976 brutalist masterpiece on the South Bank \u2014 board-marked concrete terraces stacked like geological strata, which Prince Charles likened to a nuclear power station and almost everyone else now adores. Catch a play, or just a drink on the riverside terrace at dusk."},{id:"southbank-bru",n:"Hayward Gallery & Southbank Centre",a:"South Bank",pc:"SE1",lat:51.506,lng:-.116,c:"history",s:"Hayward & the concrete undercroft",q:"Hayward Gallery Southbank Centre London",w:"The Southbank Centre's brutalist heart \u2014 the Hayward Gallery, Queen Elizabeth Hall and the walkways around them, all raw concrete, ramps and pyramidal rooflights from the 1960s. Skateboarders own the undercroft; the Hayward's exhibitions are among London's best."},{id:"alexandraroad",n:"Alexandra Road Estate (Rowley Way)",a:"South Hampstead",pc:"NW8",lat:51.5405,lng:-.177,c:"history",s:"Rowley Way's concrete ziggurat",q:"Alexandra Road Estate Rowley Way London",w:"Better known as Rowley Way, Neave Brown's 1978 ziggurat of pale concrete terraces steps down along a Camden railway cutting \u2014 a utopian, Grade II*-listed answer to the tower block, and a cult film location. One of the most humane things brutalism ever built."},{id:"brunswick",n:"Brunswick Centre",a:"Bloomsbury",pc:"WC1N",lat:51.524,lng:-.1235,c:"history",s:"Bloomsbury's stepped megastructure",q:"Brunswick Centre Bloomsbury London",w:"Patrick Hodgkinson's 1972 Bloomsbury megastructure \u2014 a low, stepped 'A-frame' of cream concrete terraces wrapped around a sunken shopping street, equal parts housing and piazza. Brutalism at its most sociable; grab a coffee and watch it work."},{id:"spacehouse",n:"Space House (One Kemble Street)",a:"Holborn",pc:"WC2B",lat:51.5145,lng:-.119,c:"history",s:"Seifert's concrete drum",q:"Space House One Kemble Street London",w:"Richard Seifert's 1968 'Space House' \u2014 a startling circular tower of pre-cast concrete Y-frames near Holborn, recently scrubbed back to life. Seifert also gave London Centre Point; this is his most sci-fi moment, a concrete drum hiding in plain sight."},{id:"centrepoint",n:"Centre Point",a:"West End",pc:"WC1A",lat:51.5163,lng:-.1295,c:"history",s:"the honeycomb tower",q:"Centre Point Tottenham Court Road London",w:"Seifert's 1966 tower at the top of Charing Cross Road \u2014 34 storeys of pre-cast concrete honeycomb that stood notoriously empty for years and became a byword for property speculation. Now flats; still one of the West End's most distinctive brutalist silhouettes."},{id:"vaeast",n:"V&A East Storehouse",a:"Stratford",pc:"E20",lat:51.5465,lng:-.0205,c:"history",s:"the salvaged Robin Hood Gardens fa\xE7ade",q:"V&A East Storehouse Stratford London",w:"When the brutalist Robin Hood Gardens estate was demolished, the V&A saved a three-storey chunk of its concrete fa\xE7ade \u2014 and you can now stand beneath it inside the free V&A East Storehouse, a working collection store you wander through like backstage at a museum. Brutalism preserved as a relic, opened 2025."},{id:"admiralduncan",n:"The Admiral Duncan",a:"Soho",pc:"W1D",lat:51.5135,lng:-.1303,c:"history",s:"Soho's defiant LGBTQ+ landmark",q:"Admiral Duncan Old Compton Street London",w:"One of Soho's oldest gay pubs, trading on Old Compton Street since the 1830s and an LGBTQ+ landmark since the '80s \u2014 among the first London venues to host drag. In 1999 a neo-Nazi nail bomb killed three people here; the pub reopened in defiance, and its memorial still anchors the street. Glittery, narrow, nightly cabaret."},{id:"rvt",n:"Royal Vauxhall Tavern",a:"Vauxhall",pc:"SE11",lat:51.4855,lng:-.1235,c:"history",s:"the listed queer institution",q:"Royal Vauxhall Tavern London",w:"A Grade II-listed gin-palace that's one of the world's oldest surviving LGBTQ+ venues, going since the 1860s and home to the gloriously camp, political Saturday institution that is Duckie \u2014 the first building in Britain listed specifically for its queer history."},{id:"heaven",n:"Heaven",a:"Charing Cross",pc:"WC2N",lat:51.5076,lng:-.1241,c:"music",s:"the gay superclub under the arches",q:"Heaven nightclub Villiers Street London",w:"London's great gay superclub, under the railway arches by Charing Cross since 1979 \u2014 cavernous, multi-room, home of G-A-Y and the official Pride after-party, a stage where everyone from Madonna to Gaga has played. The cathedral of queer clubbing."},{id:"comptons",n:"Comptons of Soho",a:"Soho",pc:"W1D",lat:51.5134,lng:-.1307,c:"history",s:"Old Compton Street's grande dame",q:"Comptons of Soho London",w:"The grande dame of Old Compton Street \u2014 a handsome two-floor traditional boozer that's anchored Soho's gay scene for decades: warm, unpretentious and reliably busy. The pub you start the night in."},{id:"shesoho",n:"She Soho",a:"Soho",pc:"W1D",lat:51.5133,lng:-.13,c:"history",s:"central London's sapphic home",q:"She Soho Old Compton Street London",w:"London's best-known bar for queer women and non-binary people \u2014 an intimate basement on Old Compton Street with cabaret, DJs and a rare, fiercely-loved lesbian home in the centre of town. Small, and all the better for it."},{id:"dalstonsuperstore",n:"Dalston Superstore",a:"Dalston",pc:"E8",lat:51.547,lng:-.0755,c:"music",s:"East London's queer hub",q:"Dalston Superstore Kingsland High Street London",w:"East London's queer heartbeat on Kingsland High Street \u2014 club, caf\xE9, gallery and cabaret stage all at once, from day-drinking to dawn-dancing. The hub of a Dalston\u2013Haggerston scene that's edgier and more experimental than Soho."},{id:"gaystheword",n:"Gay's the Word",a:"Bloomsbury",pc:"WC1N",lat:51.5253,lng:-.1255,c:"history",s:"the UK's oldest LGBTQ+ bookshop",q:"Gay's the Word bookshop Marchmont Street London",w:"Britain's oldest LGBTQ+ bookshop, on Marchmont Street since 1979 and the real-life meeting place behind the film 'Pride' \u2014 it's where Lesbians and Gays Support the Miners was born. It survived a 1984 Customs raid and remains a tiny, vital community cornerstone."},{id:"oscarwilde",n:"A Conversation with Oscar Wilde",a:"Charing Cross",pc:"WC2N",lat:51.5092,lng:-.1255,c:"oddity",s:"Wilde rising from the granite",q:"A Conversation with Oscar Wilde Adelaide Street London",w:"Maggi Hambling's 1998 granite sarcophagus-bench near Charing Cross, the writer's head rising from it cigarette in hand, inviting you to sit and talk. A memorial to Britain's most famous queer martyr, hiding on a traffic island off the Strand."},{id:"queerbritain",n:"Queer Britain",a:"King's Cross",pc:"N1C",lat:51.5352,lng:-.1255,c:"history",s:"the UK's first LGBTQ+ museum",q:"Queer Britain museum Granary Square London",w:"The UK's first dedicated LGBTQ+ museum, opened free in King's Cross in 2022 \u2014 compact galleries tracing queer life, protest and joy across British history, from Wolfenden to the present. A long-overdue home for the community's own story."},{id:"eaglehmd",n:"Eagle London",a:"Vauxhall",pc:"SE11",lat:51.4845,lng:-.123,c:"music",s:"home of Horse Meat Disco",q:"Eagle London Kennington Lane London",w:"A Vauxhall institution and the spiritual home of Horse Meat Disco, the legendary queer Sunday party where disco, leather and everyone in between collides till the small hours. Unfussy, sweaty and joyous \u2014 Vauxhall's circuit at its best."},{id:"kyotogarden",n:"Kyoto Garden",a:"Holland Park",pc:"W8",lat:51.5018,lng:-.203,c:"green",s:"the Japanese garden with peacocks",q:"Kyoto Garden Holland Park London",w:"A pocket of Japan in the middle of Holland Park \u2014 a kaiy\u016B-shiki stroll garden of tiered waterfalls, a koi pond and stone lanterns, gifted by Kyoto in 1991. Peacocks patrol the paths; in autumn the Japanese acers turn to flame. Five minutes from home and endlessly calming."},{id:"stdunstaneast",n:"St Dunstan-in-the-East",a:"City",pc:"EC3R",lat:51.5095,lng:-.082,c:"green",s:"a ruined church reclaimed by nature",q:"St Dunstan in the East garden London",w:"A ruined church turned secret garden in the City \u2014 St Dunstan-in-the-East was gutted in the 1941 Blitz, its tower left standing, and the roofless shell now wears climbing vines, palms and a quiet fountain. The most cinematic green corner in London; go early and have the churchyard to yourself."},{id:"phoenixgarden",n:"The Phoenix Garden",a:"Soho",pc:"WC2H",lat:51.5145,lng:-.1285,c:"green",s:"Soho's wild community garden",q:"Phoenix Garden Stacey Street London",w:"A scrap of wild calm behind the theatres between Soho and Covent Garden \u2014 the last of the area's 1980s community gardens, run by volunteers and left deliberately untidy for frogs, bees and birds. Bring a sandwich and disappear from the West End."},{id:"stjohnslodge",n:"St John's Lodge Garden",a:"Regent's Park",pc:"NW1",lat:51.5275,lng:-.153,c:"green",s:"Regent's Park's hidden garden",q:"St John's Lodge Garden Regent's Park London",w:"Regent's Park's secret garden \u2014 slip through an unmarked gate off the Inner Circle into a chain of hedged 'rooms' designed in 1889 to be 'fit for meditation', with a pergola, fountains and white wisteria. Almost nobody realises it's open to the public."},{id:"camleystreet",n:"Camley Street Natural Park",a:"King's Cross",pc:"N1C",lat:51.536,lng:-.128,c:"green",s:"a canalside wild garden",q:"Camley Street Natural Park London",w:"A two-acre wild garden and nature reserve hidden beside the canal at King's Cross \u2014 reedbeds, woodland and a floating platform that bobs on the water, all a minute from Coal Drops Yard. Proof the city can rewild itself."},{id:"easterncurve",n:"Dalston Eastern Curve Garden",a:"Dalston",pc:"E8",lat:51.546,lng:-.0755,c:"green",s:"a garden on an old railway",q:"Dalston Eastern Curve Garden London",w:"A much-loved community garden built along a disused railway curve in Dalston \u2014 a timber 'pineapple house', wildflowers, cake and gentle events, carved out of the East End by locals. The friendliest green space in Hackney."},{id:"redcrossgarden",n:"Red Cross Garden",a:"Southwark",pc:"SE1",lat:51.5025,lng:-.0925,c:"green",s:"a Victorian op         *{box-sizing:border-box;}
        .root{min-height:100vh;background:#FFFFFF;color:#111;font-family:Arial,Helvetica,sans-serif;padding-bottom:56px;}
        .wrap{max-width:560px;margin:0 auto;padding:0 16px;}
        .mast{padding:18px 0 4px;display:flex;align-items:baseline;justify-content:space-between;}
        .mast h1{font-family:Georgia,'Iowan Old Style','Times New Roman',serif;font-size:23px;font-weight:600;font-style:italic;margin:0;letter-spacing:0;color:#161310;}
        .mast span{font-size:12px;color:#8A8A86;}
        .anchor{display:flex;align-items:center;gap:9px;border:1px solid #E9E9E6;border-radius:14px;padding:10px 12px;margin:12px 0 10px;}
        .anchor .t{flex:1;min-width:0;}
        .anchor .t b{display:block;font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
        .anchor .t i{font-style:normal;font-size:11px;color:#9A9A96;}
        .gps{display:flex;align-items:center;justify-content:center;width:38px;height:38px;border:1px solid #E9E9E6;border-radius:11px;background:#fff;cursor:pointer;color:#C8372D;flex:none;}
        .livepill{display:inline-flex;align-items:center;gap:5px;border:1px solid #E9E9E6;background:#fff;color:#9A9A96;border-radius:11px;padding:0 11px;height:38px;font-size:11px;font-weight:700;letter-spacing:.8px;cursor:pointer;font-family:inherit;flex:none;}
        .livepill .ldot{width:7px;height:7px;border-radius:50%;background:#C9C9C5;}
        .livepill.on{border-color:#C8372D;color:#C8372D;}
        .livepill.on .ldot{background:#C8372D;animation:pulse 1.2s ease infinite;}
        @keyframes pulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:.4;transform:scale(.75);}}
        .row{display:flex;gap:6px;overflow-x:auto;padding:2px 0 9px;scrollbar-width:none;}
        .row::-webkit-scrollbar{display:none;}
        .rowlbl{font-size:10px;font-weight:700;letter-spacing:1px;color:#B5B5B1;text-transform:uppercase;align-self:center;margin-right:2px;flex:none;}
        .chip{flex:none;border:1px solid #E9E9E6;background:#fff;color:#5A5A56;border-radius:99px;padding:7px 13px;font-size:12.5px;cursor:pointer;white-space:nowrap;font-family:inherit;}
        .chip.on{background:#111;border-color:#111;color:#fff;font-weight:700;}
        .chip.coll.on{background:#C8372D;border-color:#C8372D;}
        .seg{display:inline-flex;border:1px solid #E9E9E6;border-radius:99px;overflow:hidden;flex:none;}
        .seg button{border:none;background:#fff;color:#5A5A56;padding:7px 13px;font-size:12.5px;cursor:pointer;font-family:inherit;}
        .seg button.on{background:#111;color:#fff;font-weight:700;}
        .cust{display:flex;gap:6px;margin:0 0 10px;}
        .cust input{flex:1;border:1px solid #E9E9E6;border-radius:11px;padding:9px 12px;font-size:13px;font-family:inherit;color:#111;}
        .cust button{border:none;background:#111;color:#fff;border-radius:11px;padding:0 16px;font-weight:700;font-size:13px;cursor:pointer;font-family:inherit;}
        .note{font-size:12px;color:#9A9A96;margin:6px 0 10px;}
        .note.warn{color:#C8372D;}
        .viewbar{display:flex;gap:6px;overflow-x:auto;padding:4px 0 10px;scrollbar-width:none;align-items:center;}
        .viewbar::-webkit-scrollbar{display:none;}
        .vb{flex:none;display:inline-flex;align-items:center;gap:6px;border:1px solid #E9E9E6;background:#fff;color:#5A5A56;border-radius:10px;padding:8px 11px;font-size:12.5px;cursor:pointer;font-family:inherit;}
        .vb.on{background:#111;border-color:#111;color:#fff;font-weight:700;}
        .vb.acc{border-color:#C8372D;color:#C8372D;font-weight:700;}
        .vb:disabled{opacity:.5;}
        .vbsep{width:1px;height:24px;background:#ECECE9;flex:none;margin:0 2px;}
        .tabs{display:flex;gap:18px;border-bottom:1px solid #EFEFEC;margin:2px 0 0;}
        .tabs .tb{border:none;background:none;font-family:inherit;font-size:13.5px;color:#9A9A96;padding:8px 2px 10px;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;}
        .tabs .tb.on{color:#111;font-weight:700;border-bottom-color:#111;}
        .count{font-size:11.5px;color:#9A9A96;margin:12px 0 6px;}
        /* photo tiles */
        .tile{width:70px;height:70px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:27px;flex:none;overflow:hidden;}
