,q:"Senate House University of London",w:"Charles Holden’s monumental stone tower of 1937 for the University of London — stripped-classical, faintly sinister, and the acknowledged model for the Ministry of Truth in Orwell’s ‘Nineteen Eighty-Four’ (the wartime Ministry of Information really was based here). London’s first true skyscraper in spirit if not in height.",city:"london"},{id:"troxy",n:"Troxy",a:"Stepney",pc:"E1",lat:51.5125,lng:-0.0432,c:"artdeco",s:"the East End super-cinema",q:"Troxy Commercial Road Stepney",w:"A vast Art Deco super-cinema of 1933 by George Coles on the Commercial Road — 3,500 seats, a Wurlitzer and a ceiling like a sunset. Later a Mecca bingo hall and, improbably, the Royal Opera House’s rehearsal studio; now a restored events palace, the grandest surviving picture-house of the East End.",city:"london"},{id:"chislehurstcaves",n:"Chislehurst Caves",a:"Chislehurst",pc:"BR7 6LB",lat:51.4115,lng:0.0555,c:"oddity",s:"Bowie, Hendrix, Pink Floyd underground",q:"Chislehurst Caves",w:"Twenty-two miles of man-made chalk and flint tunnels beneath Kent's edge — a WWI munitions store, a 1920s mushroom farm, then London's largest deep air-raid shelter, sheltering 15,000 with a chapel and a hospital during the Blitz. The only child born down here was christened Rose Cavena Wakeman. In the 50s and 60s it turned music venue: Bowie played four times, plus Hendrix, Pink Floyd and the Yardbirds. Guided tours only.",city:"london"},{id:"whitgiftalmshouses",n:"Whitgift Almshouses",a:"Croydon",pc:"CR0 1NX",lat:51.3735,lng:-0.0985,c:"almshouses",s:"Tudor bricks in the shopping street",q:"Whitgift Almshouses Croydon North End",w:"Built in 1596 by Archbishop John Whitgift as a hospital for the elderly, and still a working almshouse for around a dozen residents — a knot of Tudor brick hiding in plain sight amid the glass shopfronts of Croydon's commercial heart. The courtyard opens to the public during Open House; the rest of the year you simply walk past four centuries without noticing.",city:"london"},{id:"honeywoodmuseum",n:"Honeywood Museum",a:"Carshalton",pc:"SM5 3NX",lat:51.366,lng:-0.1665,c:"museum",s:"the house over the springs",q:"Honeywood Museum Carshalton Ponds",w:"A 17th-century chalk-and-flint chequer house beside Carshalton Ponds, possibly built as a commercial cold-bath house over the spring outflows. Now Sutton's local-history museum, with an Edwardian billiard room and a room devoted to vanished Nonsuch Palace. The water still rises where it always did, under the floor.",city:"london"},{id:"littlehollandhouse",n:"Little Holland House",a:"Carshalton Beeches",pc:"SM5 3LW",lat:51.3565,lng:-0.1655,c:"history",s:"the ultimate DIY house",q:"Little Holland House Frank Dickinson Carshalton",w:"Self-built between 1902 and 1904 by Frank Dickinson, a working-class disciple of Ruskin and Morris, who made the house and almost everything in it by hand — the furniture, the paintings, the metalwork, the carvings. An entire Arts and Crafts philosophy executed by one man on a suburban plot. Grade II; open first Sundays.",city:"london"},{id:"bowiebandstand",n:"The Bowie Bandstand",a:"Beckenham",pc:"BR3",lat:51.4135,lng:-0.0285,c:"music",s:"Memory of a Free Festival",q:"Bowie Bandstand Croydon Road Recreation Ground Beckenham",w:"A Grade II-listed cast-iron bandstand of 1905, believed the only surviving example by McCallum & Hope of Glasgow. On 16 August 1969 David Bowie compered and played the Beckenham Arts Lab free festival here, five days after burying his father; it became 'Memory of a Free Festival'. The Arts Lab had started in the back room of the Three Tuns up the High Street — now a Zizzi.",city:"london"},{id:"cahchi",n:"Cah Chi",a:"New Malden",pc:"KT3",lat:51.4055,lng:-0.254,c:"food",s:"Europe's Little Korea",q:"Cah Chi New Malden Korean barbecue",w:"New Malden holds an estimated 10,000 ethnic Koreans — and, per CNN, some hundreds of North Korean defectors, the largest such community in Europe, seeded in the 1970s when the South Korean ambassador and Samsung's HQ settled nearby. Cah Chi is the long-running family barbecue institution at its heart: charcoal-grilled meat, soju, and the kind of cooking the diaspora actually eats.",city:"london"},{id:"koreanartscentre",n:"Korean Culture & Arts Centre",a:"New Malden",pc:"KT3",lat:51.406,lng:-0.2545,c:"diaspora",s:"the community hub behind the café",q:"Korean Culture and Arts Centre New Malden High Street",w:"A modest community hub and function room behind a white-walled café on the High Street — the cultural engine room of New Malden's Korean diaspora, where the events, classes and gatherings happen that the restaurants only hint at. The unglamorous heart of Europe's Little Korea.",city:"london"},{id:"stpeterspetersham",n:"St Peter's Church, Petersham",a:"Petersham",pc:"TW10 7AB",lat:51.4445,lng:-0.3015,c:"history",s:"the explorer's pre-Victorian box pews",q:"St Peter's Church Petersham Vancouver grave",w:"A church of Saxon origin, in Domesday, that Pevsner loved for an interior the Victorians never touched: Georgian box pews and a two-decker pulpit, frozen before the great refit. Captain George Vancouver — who charted the Pacific Northwest and gave his name to the city — lies in the churchyard, a long way from the coast he mapped.",city:"london"},{id:"hamhouse",n:"Ham House",a:"Ham",pc:"TW10 7RS",lat:51.4465,lng:-0.3115,c:"history",s:"the dog that wasn't there",q:"Ham House ghost spaniel Duchess of Lauderdale",w:"A 1610 Stuart mansion famous for its cantilevered Great Staircase and the Duchess of Lauderdale's private 'bathing roome'. Her ghostly King Charles spaniel is still said to pad the halls — a visitor once complained about a dog she'd seen indoors, and was told no real dog is ever allowed in. One of the least-altered seventeenth-century houses in the country.",city:"london"},{id:"southallgurdwara",n:"Gurdwara Sri Guru Singh Sabha",a:"Southall",pc:"UB2 5AA",lat:51.5055,lng:-0.379,c:"faith",s:"the largest gurdwara outside India",q:"Gurdwara Sri Guru Singh Sabha Southall",w:"London's largest Sikh temple, opened in March 2003 at a cost of £17.5m raised entirely from the local Sikh community, and visited by the then-Prince Charles that June. Marble prayer halls, gold and white, and free langar served all day to anyone who walks in, regardless of faith. The civic heart of Southall.",city:"london"},{id:"ambalasweet",n:"Ambala Sweet Centre",a:"Southall",pc:"UB1 1LN",lat:51.5095,lng:-0.3775,c:"food",s:"Britain's first mithai counter",q:"Ambala Sweet Centre Southall Broadway",w:"Founded in 1965 by Mohammed Ali Khan and named for his Haryana birthplace — the first shop opened in Drummond Street, among the very first South Asian confectioners in Britain. Trays of barfi, jalebi and laddoo glow under the lights. Khan died in 2023; in 2025 the chain was bought out, 22 stores strong, but the original counters still pull the Diwali queues.",city:"london"},{id:"watersteammuseum",n:"London Museum of Water & Steam",a:"Brentford",pc:"TW8 0EN",lat:51.488,lng:-0.289,c:"museum",s:"the monster beam engine",q:"London Museum of Water and Steam Kew Bridge",w:"The former Kew Bridge Pumping Station, home to the world's largest collection of Cornish beam engines. The Grand Junction 90-inch was once the largest working beam engine on earth — Dickens called it 'a monster' — and the 100-inch is the biggest single-cylinder beam engine left anywhere. On steaming days the great beams still rock overhead, slow as breathing.",city:"london"},{id:"musicalmuseum",n:"The Musical Museum",a:"Brentford",pc:"TW8 0DU",lat:51.4875,lng:-0.29,c:"museum",s:"the self-playing Wurlitzer",q:"Musical Museum Brentford High Street",w:"A few doors from the steam museum, a building full of machines that play themselves — a theremin, self-playing pianos, orchestrions, and a mighty Wurlitzer that once rose on its lift to soundtrack a west London cinema and still does, for visitors. Music made by ghosts and gears.",city:"london"},{id:"pitzhanger",n:"Pitzhanger Manor",a:"Ealing",pc:"W5 5EQ",lat:51.512,lng:-0.307,c:"history",s:"Soane's failed dynasty house",q:"Pitzhanger Manor Walpole Park Ealing",w:"Sir John Soane designed and built this Regency villa between 1800 and 1804 as a country retreat and a school for the architectural dynasty his sons flatly refused to become. He added mock-Roman ruins to the grounds and fished the ponds with a young J.M.W. Turner. The dream died; the house, beautifully restored, did not.",city:"london"},{id:"bobbunker",n:"Battle of Britain Bunker",a:"Uxbridge",pc:"UB10 0GG",lat:51.5475,lng:-0.4205,c:"history",s:"76 steps down to 1940",q:"Battle of Britain Bunker Uxbridge No 11 Group",w:"The Grade I-listed underground operations room of No. 11 Group Fighter Command, sixty feet down, from which the Battle of Britain and later the D-Day air cover were directed. Churchill visited in September 1940 and, on the way out, reputedly first said the line about so much being owed by so many to so few. Tours only; the map table is still set.",city:"london"},{id:"bobhouseruins",n:"Battle of Britain House Ruins",a:"Ruislip",pc:"HA4",lat:51.5825,lng:-0.431,c:"history",s:"the spy-school in the woods",q:"Battle of Britain House ruins Ruislip Woods",w:"Overgrown garden steps and concrete foundations in Ruislip Woods are all that survive of a mansion, burned in 1984, reputedly used to train clandestine agents for occupied France. Nature is quietly reclaiming the formal terraces. You can walk straight past the place where people were taught to disappear.",city:"london"},{id:"grimsdyke",n:"Grim's Dyke",a:"Harrow Weald",pc:"HA3",lat:51.6155,lng:-0.349,c:"history",s:"Boudica's rampart (probably not)",q:"Grim's Dyke earthwork Harrow Weald",w:"An ancient linear earthwork running some six miles from Cuckoo Hill to Pear Wood, still up to two metres high, wrapped in unproven legends of Boudica's last stand and a 'Boadicea's Grave' on Stanmore Common. The Grim's Dyke estate beside it housed the eccentric W.S. Gilbert and his menagerie of lemurs, monkeys and a lynx.",city:"london"},{id:"caesarspond",n:"Caesar's Pond",a:"Stanmore",pc:"HA7",lat:51.6195,lng:-0.312,c:"history",s:"where Caesar supposedly drank",q:"Caesar's Pond Stanmore Little Common",w:"A pond on Stanmore's Little Common, near the site of the Roman station Sulloniacae, where local myth insists Julius Caesar tasted the water during his conquest. He almost certainly didn't — but the name has stuck for centuries, which is its own kind of truth.",city:"london"},{id:"pinnerchalkmines",n:"Pinner Wood Chalk Mines",a:"Pinner",pc:"HA5",lat:51.6035,lng:-0.3915,c:"history",s:"the tunnels under the school",q:"Pinner Wood chalk mines sinkhole 2017",w:"A forgotten network of Victorian chalk-mining tunnels, up to twenty metres deep, that announced itself in 2017 when a sinkhole opened at Pinner Wood School, shutting it for nine months while engineers grouted the voids. Generations of children had been taught directly over the dark.",city:"london"},{id:"southgatetube",n:"Southgate Tube Station",a:"Southgate",pc:"N14 6BP",lat:51.6325,lng:-0.128,c:"artdeco",s:"the flying saucer that landed in 1933",q:"Southgate Underground station Charles Holden",w:"Charles Holden's streamline-moderne masterpiece — Googie before Googie existed — a circular building whose flat roof seems to float on a band of windows, crowned by a 'Tesla coil' finial that local lore (apocryphally) says inspired the Daleks. Grade II*; the original Art Deco clock opposite was restored in 2023.",city:"london"},{id:"fortyhall",n:"Forty Hall & Elsyng Palace",a:"Enfield",pc:"EN2 9HA",lat:51.6745,lng:-0.0735,c:"history",s:"the lost Tudor palace next door",q:"Forty Hall Elsyng Palace Enfield",w:"A Grade I Jacobean manor built around 1630 for Lord Mayor Sir Nicholas Rainton, who was jailed in the Tower in 1640 for defying Charles I. In the grounds lie the buried, scheduled remains of Elsyng Palace, where the future Edward VI and Elizabeth I were reportedly told of Henry VIII's death in 1547 — excavated most years, and shown on Digging for Britain.",city:"london"},{id:"myddeltonhouse",n:"Myddelton House Gardens",a:"Enfield",pc:"EN2 9HG",lat:51.681,lng:-0.068,c:"green",s:"the Crocus King's Lunatic Asylum",q:"Myddelton House Gardens E A Bowles Enfield",w:"The lifelong garden of plantsman E.A. 'Gussie' Bowles, who coined the word galanthophile. His 'Lunatic Asylum' is a bed of deliberately deformed plants — corkscrew hazel, contorted forms, botanical misfits. The New River once cut through here, filled in the late 1960s with spoil from the Victoria line dig, its 1832 footbridge left stranded under a wisteria Bowles grew from seed in 1903.",city:"london"},{id:"trentpark",n:"Trent Park",a:"Cockfosters",pc:"EN4",lat:51.651,lng:-0.149,c:"history",s:"the bugged generals' country club",q:"Trent Park M Room German generals MI6",w:"A WWII secret-listening site where 59 captured German generals were held in luxury — Harrods trips, fine dining, a fake aristocrat to flatter them — while microphones hidden in the walls, fireplaces and garden benches fed three basement 'M Rooms', staffed by German-speaking Jewish refugees under MI6's Colonel Kendrick. The transcripts captured some of the earliest evidence of the Holocaust. A museum has been announced — check before you go.",city:"london"},{id:"wansteadgrotto",n:"Wanstead Park Grotto",a:"Wanstead",pc:"E11 2LT",lat:51.568,lng:0.0455,c:"follies",s:"the £2,000 shell grotto",q:"Wanstead Park Grotto ruin",w:"The fossil-, crystal- and shell-lined ruin of an eighteenth-century grotto-boathouse, built in the 1760s for two thousand pounds — the last grand survival of vanished Wanstead House, once one of England's grandest Palladian mansions. Gutted by fire in 1884 when the lake had been drained for cleaning, it now stands fenced, on the Heritage at Risk register.",city:"london"},{id:"championsstatue",n:"The Champions Statue",a:"Upton Park",pc:"E13 9AB",lat:51.5345,lng:0.026,c:"pop",s:"1966, in bronze",q:"The Champions statue Bobby Moore Green Street West Ham",w:"Bobby Moore, Geoff Hurst and Martin Peters hoisting the Jules Rimet trophy in bronze at 'Morley's Corner' — the West Ham trio at the heart of England's 1966 World Cup win, frozen mid-celebration. Beside the Boleyn Tavern, where Gandhi reputedly drank cream soda and talked football in 1931.",city:"london"},{id:"greenstreetmarket",n:"Green Street & Queens Market",a:"Upton Park",pc:"E13",lat:51.535,lng:0.025,c:"diaspora",s:"Little India of the East End",q:"Green Street Queens Market Upton Park saris",w:"A South Asian retail corridor of saris, gold and fabric, anchored by the covered Queens Market — and the historic boundary between East and West Ham. The lost Green Street House nearby, 'Boleyn Castle', wrapped in Anne Boleyn legend, gave West Ham the castle on their crest.",city:"london"},{id:"cityoflondoncem",n:"City of London Cemetery",a:"Manor Park",pc:"E12 5DQ",lat:51.5535,lng:0.042,c:"death",s:"Haywood's sunken catacombs",q:"City of London Cemetery Manor Park catacomb valley",w:"A vast Grade I-registered Victorian cemetery, laid out in the 1850s by William Haywood on the former Aldersbrook estate — serpentine drives, a formally planted sunken Catacomb Valley, and the quiet grandeur of a place built to bury a whole city. One of the largest municipal cemeteries in Europe, and still working.",city:"london"},{id:"dialarch",n:"The Dial Arch & Royal Brass Foundry",a:"Woolwich",pc:"SE18 6GH",lat:51.492,lng:0.0695,c:"history",s:"where Arsenal FC was born",q:"Dial Arch Royal Arsenal Woolwich Arsenal FC",w:"The Royal Arsenal — once a 1,300-acre 'Secret City' employing some 80,000 in the First World War — survives as twenty-odd listed buildings. Engineers at the Dial Arch, now a pub, founded Dial Square FC in 1886; it became Arsenal. The 1717 Royal Brass Foundry, where the empire's cannon were cast, still stands nearby.",city:"london"},{id:"woolwichferry",n:"Woolwich Free Ferry",a:"Woolwich",pc:"SE18",lat:51.497,lng:0.0625,c:"maritime",s:"free since 1889",q:"Woolwich Free Ferry Thames",w:"A roll-on, roll-off ferry across the Thames, free of all tolls by an Act of 1885 and running since 1889 — one of the last places you cross the river for nothing, cars and foot passengers together. A 2018 vessel is named for Ben Woollacott, a nineteen-year-old crewman who died on the job in 2011.",city:"london"},{id:"lesnesabbey",n:"Lesnes Abbey & Fossil Pit",a:"Abbey Wood",pc:"SE2 0LR",lat:51.487,lng:0.131,c:"history",s:"dig for shark teeth by the ruins",q:"Lesnes Abbey fossil pit Abbey Wood",w:"The ruins of a twelfth-century Augustinian abbey, founded in 1178 by Richard de Lucy — possibly in penance for the murder of Becket — beside a Site of Special Scientific Interest where the public may dig for fifty-five-million-year-old shark teeth and Eocene fossils. A mulberry planted around 1620 still fruits among the stones.",city:"london"},{id:"thediver",n:"The Diver: Regeneration",a:"Rainham",pc:"RM13",lat:51.4974,lng:0.1824,c:"oddity",s:"the man standing in the Thames",q:"The Diver Regeneration John Kaufman Rainham riverside",w:"John Kaufman's 'The Diver: Regeneration' stands fifteen feet tall in the river itself — built from some 300 metres of galvanised steel banding and three thousand bolts, weighing three tons, and believed the only sculpture standing in the Thames. It honours his grandfather, a clearance diver in the London Docks around 1900, and is submerged at every high tide. Kaufman died in 2002, soon after finishing it.",city:"london"},{id:"concretebarges",n:"The Concrete Barges",a:"Rainham",pc:"RM13",lat:51.4955,lng:0.2055,c:"oddity",s:"not the D-Day barges everyone thinks",q:"Concrete barges Coldharbour Point Rainham",w:"Around sixteen WWII ferro-concrete barges lie half-sunk in the Thames mud as 1953 flood defences. The on-site plaque's story — Mulberry harbour pieces towed back from Normandy — is a myth: these were 1940 petrol barges that never crossed to France. Wintering pipits roost on them now. Cross the deep silt only in sturdy boots.",city:"london"},{id:"rainhammarshes",n:"RSPB Rainham Marshes",a:"Rainham",pc:"RM19 1SZ",lat:51.4895,lng:0.221,c:"green",s:"the rifle range turned wetland",q:"RSPB Rainham Marshes Purfleet",w:"Medieval grazing marsh used as a military firing range for nearly a century before the RSPB reopened it in 2006. Brick stop-butts still pocked with .303 bullet holes survive among the reeds, with wide skies and a clean view to Canary Wharf across the water. The visitor centre's future has been reported under review.",city:"london"},{id:"erithpier",n:"Erith Pier",a:"Erith",pc:"DA8 1QA",lat:51.4825,lng:0.1775,c:"oddity",s:"London's longest Thames pier",q:"Erith Pier",w:"A boomerang-shaped concrete pier, around 360 metres of it, built in the 1950s as a cargo wharf, abandoned, then reopened to walkers in 1999 — London's longest pier on the Thames. Erith's brief 1840s career as a riverside resort was killed by the railway, then finished off by Crossness sewage flowing upstream from 1865.",city:"london"},{id:"crossnessnr",n:"Crossness Nature Reserve",a:"Belvedere",pc:"DA17",lat:51.5085,lng:0.1335,c:"green",s:"marsh wilderness beside the Great Stink's cure",q:"Crossness Nature Reserve Erith Marshes",w:"A 25-hectare reserve of grazing marsh and Bexley's largest reedbeds — water voles, the rare shrill carder bee, big estuary skies — sitting right beside the eastern terminus of Bazalgette's Southern Outfall Sewer, opened in 1865 to cure the Great Stink. Wilderness engineered out of a city's effluent.",city:"london"},{id:"apollobananaleaf",n:"Apollo Banana Leaf",a:"Tooting",pc:"SW17 0SF",lat:51.4258,lng:-0.1689,c:"food",s:"Tooting, we have a problem",q:"Apollo Banana Leaf Tooting Sri Lankan",w:"A no-frills, BYOB family Sri Lankan and South Indian curry house beloved of London's Tamil community — squid curry, mutton kothu, lurid-green Sri Lankan cream soda, mains for a few pounds, cash only. The name riffs on the NASA missions; the pilgrimage is real, with food bloggers and r/london regulars in the same queue.",city:"london"},{id:"lahorekarahi",n:"Lahore Karahi",a:"Tooting",pc:"SW17 0SN",lat:51.4276,lng:-0.168,c:"food",s:"Sadiq Khan's local",q:"Lahore Karahi Tooting High Street",w:"A local-legend Pakistani BYOB grill running since the mid-1990s — the first venue at the south end of Tooting's curry corridor — turning out charcoal skewers and meat karahi. Publicly a favourite of Tooting's most famous son, the Mayor of London.",city:"london"},{id:"dosanchutny",n:"Dosa n Chutny",a:"Tooting",pc:"SW17 0RN",lat:51.4272,lng:-0.1681,c:"food",s:"best dosa in London",q:"Dosa n Chutny Tooting",w:"A canteen-bright Chennai-style café, widely rated for the best dosas in London, with Tamil films running on the flatscreen and idly going two-for-not-very-much. Time Out called it close to a perfect dosa; the regulars never doubted it.",city:"london"},{id:"jaffnahouse",n:"Jaffna House",a:"Tooting",pc:"SW17 0RN",lat:51.4268,lng:-0.1683,c:"food",s:"short eats and watalappam",q:"Jaffna House Tooting Sri Lankan Tamil",w:"A Jaffna Tamil institution on the curry corridor for cheap mutton rolls, fish cutlets, chicken kotthu and palm-sugar watalappam custard — the snacks and sweets a Sri Lankan diaspora actually grew up on, served without ceremony.",city:"london"},{id:"tootingmarket",n:"Tooting Market",a:"Tooting",pc:"SW17 0SN",lat:51.4274,lng:-0.1682,c:"food",s:"we are Tooting",q:"Tooting Market covered market",w:"South London's original covered indoor market, founded in 1930 — a multicultural warren of Jamaican, Mauritian and Guyanese traders, with blue plaques over the entrances reading 'A community of all, for all. We are Tooting.' Lonely Planet once named the area among the coolest places on earth; the market is why.",city:"london"},{id:"ocantinho",n:"O Cantinho de Portugal",a:"Stockwell",pc:"SW9 9TN",lat:51.4647,lng:-0.1135,c:"food",s:"Madeira in Lambeth",q:"O Cantinho de Portugal Stockwell Little Portugal",w:"A family-run Portuguese restaurant in Lambeth's Little Portugal — London's largest, mostly Madeiran, Portuguese-speaking community — split Lisbon-style with the football on Portuguese TV. Bacalhau com natas, moelas, grilled sardines, and a room that feels imported wholesale from the Atlantic.",city:"london"},{id:"madeirapatisserie",n:"Madeira Patisserie",a:"Vauxhall",pc:"SW8 1RL",lat:51.4838,lng:-0.124,c:"bakery",s:"the nation's custard tart",q:"Madeira Patisserie South Lambeth Road pastel de nata",w:"Opened in 1988, the wholesale powerhouse behind a startling share of the UK's pastéis de nata — blasted at 300 degrees until the custard scorches and the pastry shatters. Time Out has called these among London's best pastries; half the city has eaten one without knowing it came from a South Lambeth Road counter.",city:"london"},{id:"cranewandsworth",n:"The Crane",a:"Wandsworth",pc:"SW18",lat:51.4607,lng:-0.1934,c:"pub",s:"boy in knickerbockers",q:"The Crane Wandsworth oldest pub haunted",w:"Wandsworth's oldest pub, once called the most haunted building in the borough — reputedly walked by a boy in short trousers in the bar and a woman who passes straight through the attic wall. Reported closed of late; verify the trading status before you cross town for a pint with a ghost.",city:"london"},{id:"tootingghostsigns",n:"Tooting Ghost Signs",a:"Tooting",pc:"SW17",lat:51.427,lng:-0.1685,c:"ghostsign",s:"gowns and grooves",q:"Tooting ghost signs Mitcham Road 20th Century Gowns",w:"A pair of ghost signs revealed when a billboard came down on Mitcham Road: '20th Century Gowns' painted over 'Dallas Star Tested Band Instruments', a 1920s HMV dealership. Two vanished trades, one wall, surfacing together after decades in the dark.",city:"london"},{id:"rvpb",n:"Royal Victoria Patriotic Building",a:"Wandsworth Common",pc:"SW18 3SX",lat:51.4546,lng:-0.1696,c:"history",s:"Crimean asylum, spy school",q:"Royal Victoria Patriotic Building Le Gothique Wandsworth",w:"A vast 1859 Gothic pile, built as an asylum for the orphans of the Crimean War, later a WWII MI5 and MI6 interrogation centre where arrivals to Britain were screened for spies. It now houses the Le Gothique restaurant, complete with a resident ghost named Charlotte and turrets that don't quite belong to any century you can name.",city:"london"},{id:"crossnesspumping",n:"Crossness Pumping Station",a:"Abbey Wood",pc:"SE2 9AQ",lat:51.506,lng:0.136,c:"oddity",s:"the Cathedral of Sewage",q:"Crossness Pumping Station Bazalgette beam engines",w:"Bazalgette and Charles Driver's 1865 Romanesque temple of polychrome cast iron — home to the largest remaining rotative beam engines in the world, with 52-ton flywheels named Victoria, Prince Consort, Albert Edward and Alexandra. Grade I-listed, opened to the public in 2016, with volunteer steaming days and a narrow-gauge 'Excrement Express'. A cathedral built to move a city's filth.",city:"london"},{id:"charltonhouse",n:"Charlton House",a:"Charlton",pc:"SE7 8RE",lat:51.4856,lng:0.0345,c:"history",s:"uglier faces going up",q:"Charlton House Jacobean mansion",w:"One of London's finest surviving Jacobean mansions, built 1607–12 for Prince Henry's tutor Sir Adam Newton. The carved faces on the bannister get uglier as you climb — the evil spirits, it was held, worsened the higher you went. A 1607 mulberry from James I's doomed silk scheme survives, and a summerhouse that ended its days as a 1930s public toilet.",city:"london"},{id:"persepolis",n:"Persepolis",a:"Peckham",pc:"SE15 5DT",lat:51.4738,lng:-0.068,c:"food",s:"Persia in Peckham",q:"Persepolis Snackistan Peckham Sally Butcher",w:"A bright-yellow Persian emporium-cum-café opened around 1995 by Sally Butcher and her Iranian husband Jamshid — once 'the only Iranian shop south of the river'. Cult sweets, BYOB vegetarian food, shelves of rosewater and dried limes, and Sally's best-selling cookbooks written from behind the till.",city:"london"},{id:"phohanoi",n:"Pho Hanoi",a:"Deptford",pc:"SE8 3NT",lat:51.477,lng:-0.0262,c:"food",s:"boat-people pho",q:"Pho Hanoi Deptford Vietnamese High Street",w:"A modest, authentic Vietnamese spot on Deptford High Street, part of a community descended from the late-1970s refugees who settled around Evelyn Street. Pho, bún bò Huế, chả lá lốt — the cooking of a boat-people diaspora that quietly made this stretch of south-east London its own.",city:"london"},{id:"mmanzedeptford",n:"M. Manze, Deptford",a:"Deptford",pc:"SE8 3PR",lat:51.4775,lng:-0.0265,c:"pieandmash",s:"the secret recipe",q:"M Manze Deptford High Street pie and mash",w:"A Grade II-listed eel, pie and mash shop opened in 1914 by Pantaleone Manze of the Anglo-Italian Manze dynasty — original terrazzo, marble tables and a black-glass shopfront, all unchanged. Distinct from the Manze shops at Tower Bridge: same Ravello-immigrant root, separate enterprise. Reported closing on its owner's retirement, but the listed interior endures.",city:"london"},{id:"mangal1",n:"Mangal 1 (Ocakbaşı)",a:"Dalston",pc:"E8 2DJ",lat:51.5478,lng:-0.076,c:"food",s:"London's first grill",q:"Mangal 1 Ocakbasi Arcola Street Dalston",w:"The first ocakbaşı in London, opened in the late 1980s — a poky BYOB whose entrance grill smokes halfway down Arcola Street and whose chefs wear 'simply the best' t-shirts. The original that an entire Turkish grill scene grew out of; Mangal 2 around the corner is the offspring, not the source.",city:"london"},{id:"nunheadmunicipal",n:"Nunhead & District Municipal Museum",a:"Telegraph Hill",pc:"SE14",lat:51.473,lng:-0.056,c:"oddity",s:"the museum that never was",q:"Nunhead District Municipal Museum Telegraph Hill Festival",w:"A house transformed each Telegraph Hill Festival into a fake municipal museum — complete with an invented Victorian industrialist, George Gellatly, a lost post-punk band called The Nunhead Cemeteries, and fictional blue plaques scattered across the neighbourhood. A whole local history, entirely made up, and lovingly believed. Festival-only.",city:"london"},{id:"sprigganparkland",n:"The Spriggan of Parkland Walk",a:"Crouch End",pc:"N8",lat:51.579,lng:-0.123,c:"oddity",s:"the goat-man's guardian",q:"Spriggan Parkland Walk Crouch End sculpture",w:"Marilyn Collins's 1993 Cornish spriggan crawls out of a railway arch on the disused Finsbury Park–Alexandra Palace line, inspired by a local legend of a ghostly 'goat-man'. Often linked to Stephen King's story 'Crouch End', though the tale predates the sculpture by a decade — so the spriggan can't have inspired King, only the walk might have. Either way, it watches you pass.",city:"london"},{id:"markfieldbeam",n:"Markfield Beam Engine & Museum",a:"South Tottenham",pc:"N15 4RB",lat:51.579,lng:-0.068,c:"museum",s:"1886 steam, still turning",q:"Markfield Beam Engine Museum Tottenham",w:"A Grade II-listed 1886 Wood Bros. beam engine in a former sewage pumping station in Markfield Park, where the buried River Moselle meets the Lea. On steam days the great beam still turns over, exactly as it did when it was lifting north London's waste — Victorian engineering kept alive by volunteers.",city:"london"},{id:"brucecastle",n:"Bruce Castle",a:"Tottenham",pc:"N17 8NU",lat:51.602,lng:-0.072,c:"history",s:"the mystery round tower",q:"Bruce Castle Tottenham museum",w:"A Grade I sixteenth-century manor with an enigmatic Tudor round tower whose purpose is still argued over — dovecote, hawk mews, nobody is sure. Now Haringey's local museum, it holds the Rowland Hill collection charting the postal reform that gave the world the penny stamp. Tudor brick marooned in modern Tottenham.",city:"london"},{id:"newingtongreenchurch",n:"Newington Green Unitarian Church",a:"Newington Green",pc:"N16 9PR",lat:51.553,lng:-0.087,c:"history",s:"the birthplace of feminism",q:"Newington Green Unitarian Church Mary Wollstonecraft",w:"London's oldest Nonconformist place of worship still in use, from 1708. Richard Price preached radical sermons here; Mary Wollstonecraft had her political awakening in the congregation. The terrace opposite, of 1658, is London's oldest surviving brick row, and Maggi Hambling's contested Wollstonecraft sculpture stands on the green outside.",city:"london"},{id:"churchstudios",n:"Church Studios",a:"Crouch End",pc:"N8",lat:51.58,lng:-0.121,c:"music",s:"Dave Stewart's church",q:"Church Studios Crouch Hill Dave Stewart",w:"A nineteenth-century church converted into a recording studio by Eurythmics' Dave Stewart in the 1980s, and since used by Adele, Radiohead, Bowie and Massive Attack. Local legend has Bob Dylan knocking on the wrong door and ending up taking tea with a startled Crouch End resident. A working studio — admire it from the street.",city:"london"},{id:"gokyuzu",n:"Gökyüzü",a:"Harringay",pc:"N4 1LG",lat:51.58,lng:-0.096,c:"food",s:"the full platter",q:"Gokyuzu Green Lanes Harringay Turkish grill",w:"Opened in 1999 by the Yavuz family, the slickest of Green Lanes' big-four charcoal-grill houses — famous for mixed-grill sharing platters the size of small countries, and queues that build after half past eight. The flagship of Harringay's 'Little Turkey'.",city:"london"},{id:"antepliler",n:"Antepliler",a:"Harringay",pc:"N4 1AG",lat:51.581,lng:-0.0958,c:"food",s:"first baklava in London",q:"Antepliler Green Lanes Harringay baklava",w:"Begun in 1993 as a Green Lanes baklava producer — reputedly London's first authentic baklava maker, from Gaziantep, a UNESCO city of gastronomy. Now a mini-empire of grill, döner and künefe shops, but the trays of pistachio baklava in the window are still the point.",city:"london"},{id:"notedeelpie",n:"Noted Eel & Pie House",a:"Leytonstone",pc:"E11 4JU",lat:51.564,lng:0.008,c:"pieandmash",s:"the last live eels",q:"Noted Eel and Pie House Leytonstone Hak family",w:"Run by the Hak family, descendants of Dutch eel-fishing schuyts — started in Bow in 1926, moved to Leytonstone in the 1970s, and one of the only shops still keeping live eels out the back. It was renamed 'Noted' in the war so the German-looking old sign wouldn't draw suspicion. Now, improbably, a TikTok pilgrimage for the eel-curious.",city:"london"},{id:"lmanze",n:"L. Manze",a:"Walthamstow",pc:"E17 7LD",lat:51.5835,lng:-0.021,c:"pieandmash",s:"the listed Art Deco pie shop",q:"L Manze Walthamstow High Street pie mash Art Deco",w:"East London's oldest surviving pie-and-mash building, from 1929, Grade II-listed in 2013 for its complete Art Deco interior — tilework, mirrors, marble. The pie counter itself was reported closed in 2022, but the listing protects one of the most beautiful eel-and-liquor rooms ever built.",city:"london"},{id:"walthamstowmarket",n:"Walthamstow Market",a:"Walthamstow",pc:"E17 7LD",lat:51.584,lng:-0.0205,c:"food",s:"Europe's longest street market",q:"Walthamstow Market High Street",w:"Established in 1885 and running the length of the High Street — reputed to be a mile, though it actually measures about a kilometre — with some five hundred stalls. Officially the longest outdoor market in Europe, fully alive six days a week, with L. Manze's Art Deco frontage watching over one end.",city:"london"},{id:"bryantmay",n:"Bryant & May / Bow Quarter",a:"Bow",pc:"E3 2SE",lat:51.5295,lng:-0.0235,c:"history",s:"the matchgirls struck here",q:"Bryant and May matchgirls strike Bow Quarter",w:"The 1888 matchgirls' strike against phossy-jaw conditions and brutal fines began at this Bryant & May factory — now the gated, gentrified Bow Quarter. Led by women and girls and backed by Annie Besant, it was a hinge moment for the British labour movement. Strike leader Sarah Chapman is commemorated nearby.",city:"london"},{id:"minnielansbury",n:"Minnie Lansbury Memorial Clock",a:"Bow",pc:"E3 4LL",lat:51.5275,lng:-0.0185,c:"history",s:"the rebel councillor's clock",q:"Minnie Lansbury memorial clock Bow Road",w:"A green memorial clock on Bow Road to the suffragette and Poplar councillor Minnie Lansbury, jailed in 1921 for refusing to over-charge her poorest constituents during the Poplar Rates Rebellion. She died soon after her release. The clock keeps her time on the high street she fought for.",city:"london"},{id:"eastburymanor",n:"Eastbury Manor House",a:"Barking",pc:"IG11 9SN",lat:51.532,lng:0.089,c:"history",s:"the Hampton Court of the East",q:"Eastbury Manor House Barking Gunpowder Plot",w:"A Grade I Elizabethan brick manor of the 1570s, marooned amid a council estate on former Barking Abbey land. Defoe spread the debunked legend that the Gunpowder Plot was hatched here, and resident ghosts are duly reported. A complete Tudor merchant's house, improbably surviving in the far East End.",city:"london"},{id:"valencehouse",n:"Valence House Museum",a:"Dagenham",pc:"RM8 3HT",lat:51.556,lng:0.137,c:"museum",s:"the moated survivor",q:"Valence House Museum Dagenham",w:"Dagenham's only surviving manor house, medieval-moated, named for Agnes de Valence. Now a museum with a gloriously eccentric collection — Egyptian ushabti figures, a fragment of Queen Victoria's wedding cake, and the Tsarina Alexandra's walking stick — sitting in green calm where Ford's vast plant once roared nearby.",city:"london"},{id:"barkingabbey",n:"Barking Abbey",a:"Barking",pc:"IG11 8AS",lat:51.536,lng:0.081,c:"history",s:"founded 666 AD",q:"Barking Abbey Curfew Tower St Margaret's Captain Cook",w:"The ruins of one of England's most important medieval royal nunneries, founded around 666 AD. The surviving Curfew Tower and St Margaret's Church remain — where Captain Cook married in 1762, before he sailed off the edge of the known map. Lawns and low walls now, but for a thousand years this was real power.",city:"london"},{id:"eelpieisland",n:"Eel Pie Island",a:"Twickenham",pc:"TW1 3DY",lat:51.447,lng:-0.327,c:"music",s:"Stones on the sprung floor",q:"Eel Pie Island Twickenham Rolling Stones hotel",w:"A tiny Thames island whose vanished hotel hosted the Rolling Stones' five-month 1963 residency — nearly every Wednesday, just before fame — plus the Who, Bowie and the Bluesbreakers. Later it became the UK's largest hippie commune, until a 1971 fire. Now artists' studios, reachable on foot only on twice-yearly open weekends.",city:"london"},{id:"eelpiemuseum",n:"Eel Pie Island Museum",a:"Twickenham",pc:"TW1 3AB",lat:51.4465,lng:-0.329,c:"museum",s:"Charlie Watts's drumsticks",q:"Eel Pie Island Museum Twickenham Trevor Baylis",w:"A tiny museum to the island's rock-and-roll decade and to its inventor-islander Trevor Baylis, who gave the world the wind-up radio. You can sit in his thinking chair. A whole scene's worth of memory packed into a couple of rooms on the Twickenham bank.",city:"london"},{id:"rcp",n:"Royal College of Physicians",a:"Regent's Park",pc:"NW1 4LE",lat:51.5258,lng:-0.1494,c:"history",s:"a modernist box full of skulls",q:"Royal College of Physicians Regent's Park Lasdun museum",w:"Denys Lasdun's 1964 white modernist building on the edge of Regent's Park — Grade I-listed, all floating planes and a sweeping staircase — hides a museum of medical curiosities, a 'spit-and-polish' collection of anatomical relics, and a medicinal garden of plants that can cure or kill. Free, and far stranger inside than the cool exterior admits.",city:"london"},{id:"svevo",n:"Italo Svevo's Charlton Home",a:"Charlton",pc:"SE7 7AB",lat:51.488,lng:0.033,c:"literary",s:"the Trieste novelist in SE7",q:"Italo Svevo Charlton home plaque",w:"For years the Italian modernist Italo Svevo — author of 'Confessions of Zeno', friend and English pupil of James Joyce — spent long stretches in Charlton, running the family marine-paint business. A quiet south-east London footnote to one of the strangest careers in European literature: a Trieste novelist commuting to the Thames.",city:"london"},{id:"buddhapadipa",n:"Buddhapadipa Temple",a:"Wimbledon",pc:"SW19 5HJ",lat:51.4316,lng:-0.2137,c:"faith",s:"a Thai temple behind the tennis",q:"Buddhapadipa Temple Wimbledon",w:"The first Thai Buddhist temple built in the UK — a golden-roofed wat set in four acres of Wimbledon garden, with a lake, ornamental trees and an interior of vivid murals painted by Thai artists. A few streets from the tennis, and a complete transplant of another country's sacred architecture into suburban SW19.",city:"london"},{id:"peacepagoda",n:"London Peace Pagoda",a:"Battersea Park",pc:"SW11 4NJ",lat:51.4818,lng:-0.1665,c:"faith",s:"Buddhist monks by the river",q:"London Peace Pagoda Battersea Park",w:"A double-roofed Buddhist peace pagoda raised in Battersea Park in 1985 by the monks and nuns of Nipponzan-Myōhōji, its gilded Buddhas facing out across the Thames. A resident monk tended it for decades. A startling note of stillness between the power station and the river.",city:"london"},{id:"grimaldi",n:"Joseph Grimaldi Park",a:"Pentonville",pc:"N1 9RP",lat:51.532,lng:-0.1175,c:"death",s:"dance on the clown's grave",q:"Joseph Grimaldi Park Pentonville musical tomb",w:"A former churchyard turned park around the grave of Joseph Grimaldi, the father of modern clowning, who died in 1837. An artist's installation set bronze coffin-shaped tiles into the ground that chime musical notes when you dance across them — so you can, quite literally, play a tune on the clown's tomb.",city:"london"},{id:"henrysmound",n:"King Henry's Mound",a:"Richmond Park",pc:"TW10 5HX",lat:51.4445,lng:-0.273,c:"view",s:"the protected ten-mile sightline",q:"King Henry's Mound Richmond Park St Paul's view",w:"A prehistoric mound in Richmond Park where, through a gap in the trees and a fixed telescope, you can see St Paul's Cathedral ten miles away — a sightline protected by law from any building that would block it. Legend says Henry VIII stood here to watch for the rocket signalling Anne Boleyn's execution; the dates don't quite work, but the view does.",city:"london"},{id:"onetreehill",n:"One Tree Hill",a:"Honor Oak",pc:"SE23 3QA",lat:51.454,lng:-0.056,c:"view",s:"ringed by the dead",q:"One Tree Hill Honor Oak Oak of Honor view",w:"A wooded south London ridge crowned by the Oak of Honor, where Elizabeth I supposedly picnicked, with a sudden view to the City from the top. The whole area is uniquely encircled by cemeteries — Nunhead, Camberwell Old and New — which has fed a persistent, treat-it-as-folklore local rumour of satanic worship on the hill after dark.",city:"london"},{id:"thepoint",n:"The Point, Greenwich",a:"Greenwich",pc:"SE10 8QY",lat:51.472,lng:-0.0075,c:"view",s:"the locals' Greenwich panorama",q:"The Point Greenwich Hyde Vale viewpoint",w:"A small, half-hidden promontory above Greenwich, off the beaten path the tourists take to the Observatory — a sudden grandstand view over the Thames, the towers and the spread of the city. The viewpoint Greenwich locals send you to instead of the queue.",city:"london"},{id:"richmonddeer",n:"Richmond Park Deer",a:"Richmond",pc:"TW10 5HS",lat:51.4425,lng:-0.273,c:"green",s:"700 wild deer, ten minutes from the Tube",q:"Richmond Park red fallow deer",w:"Around 600 red and fallow deer roam Richmond Park freely, as they have since Charles I enclosed it for hunting in 1637 — the largest of London's Royal Parks and a National Nature Reserve. In the autumn rut the stags bellow and clash; year-round, keep your distance, especially in birthing season. Genuinely wild, barely zone 4.",city:"london"},{id:"bushydeer",n:"Bushy Park Deer",a:"Hampton",pc:"TW11 0EQ",lat:51.4115,lng:-0.345,c:"green",s:"Hampton Court's deer-cropped wilderness",q:"Bushy Park deer Hampton",w:"The second-largest Royal Park, beside Hampton Court — herds of red and fallow deer grazing among the grasslands and the Chestnut Avenue that Wren laid out as a grand approach. Quieter and wilder than its famous neighbour, with the deer wandering close enough to remind you the place was made for the chase.",city:"london"},{id:"wwtbarnes",n:"WWT London Wetland Centre",a:"Barnes",pc:"SW13 9WT",lat:51.476,lng:-0.235,c:"green",s:"reservoirs turned bird city",q:"WWT London Wetland Centre Barnes",w:"Forty-odd hectares of lakes, reedbed and marsh created on four redundant Victorian reservoirs in Barnes — opened in 2000 and now one of the best urban birdwatching sites in Europe, with bitterns, sand martins and wintering wildfowl a short bus ride from Hammersmith. A working argument that cities can manufacture wilderness.",city:"london"},{id:"walthamstowwetlands",n:"Walthamstow Wetlands",a:"Walthamstow",pc:"N17 9NH",lat:51.587,lng:-0.06,c:"green",s:"Europe's largest urban wetland reserve",q:"Walthamstow Wetlands Thames Water reservoirs",w:"Ten working Thames Water reservoirs, opened to the public in 2017 as Europe's largest urban wetland nature reserve — 211 hectares of water and reedbed on the Lea, with herons, peregrines on the old engine-house chimney, and the city skyline floating beyond. Still supplying London's taps while the birds move in.",city:"london"},{id:"eppingforest",n:"Epping Forest",a:"Loughton",pc:"IG10 4AF",lat:51.658,lng:0.033,c:"green",s:"London's ancient hunting wood",q:"Epping Forest Loughton ancient woodland",w:"Six thousand acres of ancient woodland and heath straddling the city's north-east edge — a former royal hunting forest saved for the public by the Corporation of London in 1878, after locals fought the enclosures. Iron Age earthworks, veteran pollarded hornbeams, and the highwayman Dick Turpin's old country, all within a Central line ride.",city:"london"},{id:"unionchapel",n:"Union Chapel",a:"Islington",pc:"N1 2UN",lat:51.5478,lng:-0.1027,c:"music",s:"gigs in a working church",q:"Union Chapel Islington venue",w:"A soaring Gothic Congregational chapel of 1877 on Upper Street — still a working church and a homeless drop-in, and one of the most atmospheric music venues in Britain, where the audience sits in the pews under the great rose window. Everyone from Björk to Amy Winehouse has played the room; the acoustics do half the work.",city:"london"},{id:"cartandhorses",n:"The Cart & Horses",a:"Stratford",pc:"E15 1EL",lat:51.5462,lng:0.0019,c:"music",s:"the birthplace of Iron Maiden",q:"Cart and Horses Stratford Iron Maiden",w:"A Stratford pub that bills itself the birthplace of Iron Maiden — Steve Harris's band cut their teeth on its tiny stage in the mid-1970s, and the heavy-metal pilgrimage has never really stopped. Loud, unpretentious, and proud of a noise that went on to fill stadiums.",city:"london"},{id:"sadlerswells",n:"Sadler's Wells",a:"Clerkenwell",pc:"EC1R 4TN",lat:51.5295,lng:-0.1063,c:"music",s:"dance on a holy well",q:"Sadler's Wells Theatre Clerkenwell",w:"Britain's leading dance house, on a Clerkenwell site that has held a theatre since 1683 — named for Richard Sadler and the medieval holy well found in his grounds. The present building is the sixth on the spot; the well itself still survives under the stalls, beneath the world's contemporary choreography.",city:"london"},{id:"maltbystreet",n:"Maltby Street Market",a:"Bermondsey",pc:"SE1 3PA",lat:51.4985,lng:-0.0735,c:"food",s:"the railway-arch food run",q:"Maltby Street Market Bermondsey Ropewalk",w:"A weekend food market strung along the Ropewalk under the Bermondsey railway arches — born when traders spilled out of Borough, scrappier and better for it. St John doughnuts, gin from a working distillery, cheese toasties and natural wine, eaten standing as the trains rumble overhead.",city:"london"},{id:"leatherlane",n:"Leather Lane Market",a:"Clerkenwell",pc:"EC1N 7TJ",lat:51.5205,lng:-0.109,c:"food",s:"the lunchtime street market",q:"Leather Lane Market Clerkenwell",w:"A street market running since at least the seventeenth century, now the weekday lunch engine of Clerkenwell — a long line of stalls slinging everything from Ethiopian wraps to grilled cheese, with the white-collar queue stretching down the lane by half past twelve. Trade, not heritage, but five hundred years of it.",city:"london"},{id:"mercatomayfair",n:"Mercato Mayfair",a:"Mayfair",pc:"W1K 6ZA",lat:51.5128,lng:-0.1525,c:"food",s:"a food hall in a Pugin church",q:"Mercato Mayfair St Mark's North Audley Street",w:"A sustainable food hall built inside St Mark's, a deconsecrated Grade I Mayfair church partly by Pugin's circle — traders and a wine bar arranged beneath the nave, the organ pipes and stained glass still overhead. Communion replaced by carbonara, in one of the more surreal reuses of sacred space in London.",city:"london"},{id:"rochellecanteen",n:"Rochelle Canteen",a:"Shoreditch",pc:"E2 7ES",lat:51.5258,lng:-0.0758,c:"food",s:"lunch in the old bike shed",q:"Rochelle Canteen Arnold Circus Shoreditch",w:"Hidden behind a blue door in the wall of a former Victorian school off Arnold Circus, in what was the bicycle shed — Margot Henderson's spare, brilliant British canteen, with a short daily-changing menu and tables in the old playground. You have to know it's there, which is rather the point.",city:"london"},{id:"churchillarms",n:"The Churchill Arms",a:"Kensington",pc:"W8 7LN",lat:51.5072,lng:-0.1944,c:"pub",s:"the pub that vanishes under flowers",q:"Churchill Arms Kensington flowers Thai",w:"A Kensington corner pub buried under a cascade of flowers — hundreds of baskets and a few hundred pounds a month in blooms — with a Christmas display of nearly a hundred trees. Inside, Churchilliana, butterflies and bric-a-brac, and one of London's first pub Thai kitchens, going since the late 1980s in the conservatory out back.",city:"london"},{id:"wcclapham",n:"WC Clapham",a:"Clapham",pc:"SW4 0AA",lat:51.4628,lng:-0.1378,c:"wine",s:"wine and cheese in the gents",q:"WC Clapham wine bar Victorian toilets",w:"A wine-and-charcuterie bar built into a disused Victorian underground public lavatory on Clapham Common — hence the name, 'Wine & Charcuterie', and the joke. Original tiling, cisterns repurposed, and a list of low-intervention bottles served below pavement level, where Londoners once did something altogether less convivial.",city:"london"},{id:"sketch",n:"Sketch",a:"Mayfair",pc:"W1S 2XG",lat:51.5125,lng:-0.141,c:"food",s:"the pink room and the egg pods",q:"Sketch Mayfair Gallery David Shrigley",w:"A Mayfair townhouse turned surrealist playground — the blush-pink Gallery hung with David Shrigley's drawings, and a set of pod-shaped, egg-like toilet capsules under a stained-glass dome that have launched a million photos. Tea, art and theatre, deliberately too much of everything. Go for the rooms as much as the food.",city:"london"},{id:"feministlibrary",n:"The Feminist Library",a:"Peckham",pc:"SE15 6JL",lat:51.473,lng:-0.064,c:"archive",s:"fifty years of the movement, shelved",q:"Feminist Library Peckham",w:"A community-run archive founded in 1975, holding tens of thousands of books, periodicals and the paper records of the Women's Liberation Movement — pamphlets, badges, banners, the ephemera that institutions threw away. After years of precarious moves it found a Peckham home; a living memory of a revolution, kept by volunteers.",city:"london"},{id:"conwayhall",n:"Conway Hall",a:"Holborn",pc:"WC1R 4RL",lat:51.518,lng:-0.118,c:"archive",s:"the home of free thought",q:"Conway Hall Red Lion Square humanism library",w:"Opened in 1929 and run by the Conway Hall Ethical Society, the oldest free-thought organisation in the world — a Holborn hall that has hosted radicals, humanists and protest since before the war, with a Humanist Library and a Sunday concert series stretching back over a century. Reason and dissent, with good acoustics.",city:"london"},{id:"mollondocklands",n:"Museum of London Docklands",a:"West India Quay",pc:"E14 4AL",lat:51.5075,lng:-0.0235,c:"museum",s:"the sugar warehouse of empire",q:"Museum of London Docklands West India Quay",w:"Inside a Grade I Georgian sugar warehouse on West India Quay — a free museum of the river, the port and the trade that built London, including 'London, Sugar & Slavery', a permanent gallery confronting the city's role in the transatlantic slave economy. The building itself is the exhibit: brick, beams, and a very uncomfortable history.",city:"london"},{id:"bgwmc",n:"Bethnal Green Working Men's Club",a:"Bethnal Green",pc:"E2 6HG",lat:51.5285,lng:-0.0625,c:"music",s:"cabaret in a 1950s social club",q:"Bethnal Green Working Men's Club cabaret",w:"A genuine 1953 working men's club that became one of East London's great cabaret and club nights — flock wallpaper, a sprung dance floor, glitter and drag and swing under the old members' photos. The committee-room formality and the chaos of the night sit on top of each other, and somehow it works.",city:"london"},{id:"raggedschool",n:"Ragged School Museum",a:"Mile End",pc:"E3 4RR",lat:51.5216,lng:-0.033,c:"museum",s:"Barnardo's biggest classroom",q:"Ragged School Museum Mile End Copperfield Road",w:"Canalside warehouses that once held Dr Barnardo's largest 'ragged school', educating the poorest East End children for free between 1877 and 1908. The museum recreates a Victorian classroom — slates, cane, hard benches — and a 1900 East End kitchen, in a building that was the closest thing thousands of children got to a chance.",city:"london"},{id:"drjohnson",n:"Dr Johnson's House",a:"Gough Square",pc:"EC4A 3DE",lat:51.5151,lng:-0.1086,c:"literary",s:"where the Dictionary was written",q:"Dr Johnson's House Gough Square",w:"A rare surviving Georgian townhouse in a hidden City square, where Samuel Johnson compiled his great Dictionary of the English Language in the attic between 1748 and 1755, with six clerks at long tables. The garret survives, the books survive, and outside sits Hodge, his cat, in bronze — 'a very fine cat indeed'.",city:"london"},{id:"twotempleplace",n:"Two Temple Place",a:"Embankment",pc:"WC2R 3BD",lat:51.5113,lng:-0.113,c:"history",s:"Astor's neo-Gothic jewel box",q:"Two Temple Place Embankment Astor",w:"Built in the 1890s as the estate office of William Waldorf Astor, then the richest man in the world — a small neo-Gothic mansion stuffed with carved oak, stained glass, silver-gilt and characters from Dumas and Arthurian legend, money turned into fantasy. Free to enter during its winter exhibitions, and almost unknown.",city:"london"},{id:"middletemple",n:"Middle Temple Hall",a:"Temple",pc:"EC4Y 9AT",lat:51.5119,lng:-0.1107,c:"history",s:"Twelfth Night's first night",q:"Middle Temple Hall Elizabethan Twelfth Night",w:"A magnificent Elizabethan hall of 1573 in the lawyers' warren of the Inns of Court, under a double hammer-beam roof, with a serving table said to be made from the timbers of Drake's Golden Hinde. Shakespeare's 'Twelfth Night' had what may be its premiere here in 1602 — performed for the barristers in the very room that still stands.",city:"london"},{id:"georgetavern",n:"The George Tavern",a:"Stepney",pc:"E1 0LA",lat:51.5128,lng:-0.0445,c:"pub",s:"the gig pub that fought the wreckers",q:"George Tavern Stepney Commercial Road",w:"A battered, beautiful old coaching inn on Commercial Road that became a fierce little music and arts venue — and then spent years fighting off developers whose flats next door would have killed its noise. Shot by photographers and bands for its peeling grandeur; saved, for now, by the people who love it.",city:"london"},{id:"novocemetery",n:"Novo Cemetery",a:"Mile End",pc:"E1 4NS",lat:51.5235,lng:-0.04,c:"death",s:"a Sephardic field inside a university",q:"Novo Cemetery Queen Mary Mile End Sephardic",w:"A Sephardic Jewish burial ground from 1733, the resting place of London's Spanish and Portuguese community — now improbably surrounded by the campus of Queen Mary University, students crossing between worn flat ledger-stones laid in the old Iberian style. A piece of the seventeenth-century diaspora preserved among the lecture halls.",city:"london"},{id:"fleetgrating",n:"The Fleet Beneath Ray Street",a:"Clerkenwell",pc:"EC1R 3DJ",lat:51.5238,lng:-0.108,c:"oddity",s:"press your ear to a lost river",q:"Fleet River Ray Street grating Clerkenwell",w:"London's largest buried river, the Fleet, runs in a sewer beneath the streets — and on Ray Street in Clerkenwell there is a grating in the road where, if you stop and listen over the traffic, you can actually hear it rushing below. A whole river, demoted to a drain, still audible if you know where to stand.",city:"london"},{id:"floralears",n:"The Floral Street Ears",a:"Covent Garden",pc:"WC2E 9DJ",lat:51.5132,lng:-0.122,c:"oddity",s:"two ears on a Covent Garden wall",q:"Floral Street ears sculpture Tim Fishlock",w:"High on a wall in a Covent Garden alley, two small sculpted ears — cast by the artist Tim Fishlock and left to eavesdrop on the passing street. Most people walk under them for years without ever looking up. The building has been listening the whole time.",city:"london"},{id:"parakeets",n:"Kensington Gardens Parakeets",a:"Bayswater",pc:"W2",lat:51.506,lng:-0.179,c:"green",s:"feral parrots in the royal park",q:"Kensington Gardens ring-necked parakeets",w:"Flocks of bright green ring-necked parakeets — escaped or released, and now thoroughly Londoner — swirl through Kensington Gardens and Hyde Park, where they'll land on an outstretched hand for seed near the Italian Gardens. A tropical absurdity gone fully native, screeching through the planes above the joggers.",city:"london"},{id:"oasispool",n:"Oasis Sports Centre Pool",a:"Holborn",pc:"WC2H 9AG",lat:51.5165,lng:-0.125,c:"lido",s:"an open-air pool in the West End",q:"Oasis Sports Centre heated outdoor pool Holborn",w:"A heated outdoor swimming pool in the middle of Holborn, hiding behind Covent Garden — you swim lengths under the open sky with office towers leaning in on every side. Improbable, slightly surreal, and beloved by Londoners who like to do their morning crawl with the city watching.",city:"london"},{id:"fabric",n:"Fabric",a:"Farringdon",pc:"EC1M 3HN",lat:51.5198,lng:-0.102,c:"music",s:"the bodysonic dancefloor",q:"Fabric nightclub Farringdon Smithfield",w:"London's most storied nightclub, open since 1999 in a former Smithfield cold store — home of Room One's 'bodysonic' floor, wired so the bass comes up through your feet. It was briefly shut down in 2016 and saved by a global outcry; the all-night crowd files in past the meat market still.",city:"london"},{id:"mothclub",n:"Moth Club",a:"Hackney",pc:"E9 6DA",lat:51.5448,lng:-0.0535,c:"music",s:"gigs under a gold-glitter ceiling",q:"Moth Club Hackney Valette Street",w:"An old Memorial Working Men's Club in Hackney, its ceiling drowned in gold tinsel, that doubles as one of East London's best small gig and club rooms — sweaty, sticky-floored and gloriously incongruous, with veterans' photos on the walls and a guitar band roaring under the glitter.",city:"london"},{id:"broadwaymarket",n:"Broadway Market",a:"Hackney",pc:"E8 4QJ",lat:51.538,lng:-0.0617,c:"food",s:"the Saturday market by the canal",q:"Broadway Market Hackney London Fields",w:"A market street between London Fields and the Regent's Canal, trading since the nineteenth century and reborn as Hackney's Saturday ritual — cheese, oysters, flat whites and flowers, the towpath busy with bikes. Gentrified, certainly, but built on a genuinely old line of trade from the fields to the city.",city:"london"},{id:"bca",n:"Black Cultural Archives",a:"Brixton",pc:"SW9 8EN",lat:51.4628,lng:-0.113,c:"archive",s:"the home of Black British history",q:"Black Cultural Archives Windrush Square Brixton",w:"The only national archive dedicated to the history of African and Caribbean people in Britain — founded in 1981 out of the Brixton uprisings, and since 2014 housed in a restored Georgian building on Windrush Square. Records, photographs and papers that no mainstream institution was keeping; a community insisting on its own memory.",city:"london"},{id:"bishopsgate",n:"Bishopsgate Institute",a:"Liverpool Street",pc:"EC2M 4QH",lat:51.517,lng:-0.0795,c:"archive",s:"London's radical memory bank",q:"Bishopsgate Institute library archives",w:"A free cultural institute and library opened in 1895 beside Liverpool Street — home to extraordinary collections the establishment overlooked: protest, the co-operative movement, LGBTQ+ history, London's own ephemera. An ornate Arts and Crafts reading room, an open door, and a quiet insistence that ordinary people's records matter.",city:"london"},{id:"kelvedonhatchbunker",n:"Kelvedon Hatch Secret Nuclear Bunker",a:"Brentwood, Essex",pc:"CM15 0LA",lat:51.6718,lng:0.2566,c:"oddity",s:"Behind an ordinary bungalow, a staircase drops 125ft into a three-storey cold-war bunker built to run Britain after a nuclear strike",q:"Kelvedon Hatch Secret Nuclear Bunker",w:"",city:"london"},{id:"pinnervillage",n:"Pinner Village & Pinner Fair",a:"Pinner, Harrow",pc:"HA5 5PJ",lat:51.593,lng:-0.381,c:"history",s:"A medieval hamlet swallowed by Metro-land that still holds a royally chartered street fair, granted in 1336",q:"Pinner village Pinner Fair charter",w:"",city:"london"},{id:"peterloomemorial",n:"Peterloo Massacre Memorial",a:"City Centre",pc:"M2 3GX",lat:53.4769,lng:-2.2466,c:"history",s:"A stepped memorial on the field where cavalry charged a peaceful 60,000-strong reform rally in 1819, killing eighteen",q:"Peterloo Massacre memorial St Peter's Field Manchester",w:"",city:"manchester"},{id:"ancoatslittleitaly",n:"Ancoats Little Italy",a:"Ancoats",pc:"M4 5HW",lat:53.4845,lng:-2.227,c:"diaspora",s:"A mill district that became Manchester's Little Italy, whose vendors gave Britain the ice-cream cone — patented locally in 1901",q:"Ancoats Little Italy Manchester ice cream cone",w:"",city:"manchester"},{id:"salfordladsclub",n:"Salford Lads Club",a:"Ordsall, Salford",pc:"M5 3RX",lat:53.473,lng:-2.271,c:"music",s:"A 1903 youth club immortalised on the inner sleeve of The Smiths' The Queen Is Dead",q:"Salford Lads Club Smiths",w:"",city:"manchester"},{id:"haciendasite",n:"The Haçienda (FAC51) — Site",a:"City Centre",pc:"M1 5WW",lat:53.4745,lng:-2.249,c:"music",s:"The Factory Records club that birthed Madchester and acid house, lost money on nearly every clubber, then was demolished for flats that took its name",q:"Hacienda FAC51 Manchester Factory Records",w:"",city:"manchester"},{id:"manchesterbaby",n:"The Manchester Baby Plaque",a:"University of Manchester",pc:"M13 9PL",lat:53.467,lng:-2.233,c:"history",s:"Where a machine of war-surplus parts ran the world's first stored program in 1948 — the literal birth of software",q:"Manchester Baby Small-Scale Experimental Machine plaque",w:"",city:"manchester"},{id:"guardianexchange",n:"Guardian Underground Telephone Exchange",a:"Chinatown",pc:"M1 4DH",lat:53.4778,lng:-2.2414,c:"oddity",s:"112ft beneath Chinatown, a nuclear-hardened cold-war telephone bunker with its own bar, piano and fake painted windows",q:"Guardian Underground Telephone Exchange Manchester GUTE",w:"",city:"manchester"},{id:"rochdalepioneers",n:"Rochdale Pioneers Museum",a:"Rochdale",pc:"OL12 0NU",lat:53.619,lng:-2.1565,c:"history",s:"The former warehouse where 1844 weavers opened a shop on a plank-and-barrel counter, launching the global co-operative movement",q:"Rochdale Pioneers Museum Toad Lane",w:"",city:"manchester"},{id:"victoriabaths",n:"Victoria Baths",a:"Chorlton-on-Medlock",pc:"M13 0FE",lat:53.4599,lng:-2.2149,c:"lido",s:"A 1906 water palace of stained glass and mosaic, saved from dereliction when it won the BBC's first Restoration series",q:"Victoria Baths Manchester",w:"",city:"manchester"},{id:"chethamslibrary",n:"Chetham's Library",a:"Medieval Quarter",pc:"M3 1SB",lat:53.4857,lng:-2.243,c:"medieval",s:"The English-speaking world's oldest free public library (1653), in a 1421 complex, where Marx and Engels read together in a window alcove",q:"Chetham's Library Long Millgate Manchester",w:"",city:"manchester"},{id:"bandonthewall",n:"Band on the Wall",a:"Northern Quarter",pc:"M4 5JZ",lat:53.4855,lng:-2.235,c:"music",s:"A market boozer named for a Depression-era landlord who built the stage halfway up the back wall to cram more drinkers below",q:"Band on the Wall Swan Street Manchester",w:"",city:"manchester"},{id:"peverilofthepeak",n:"Peveril of the Peak",a:"City Centre",pc:"M1 5JQ",lat:53.4753,lng:-2.2416,c:"pub",s:"A green-tiled Victorian island marooned among glass towers",q:"Peveril of the Peak pub Manchester",w:"",city:"manchester"},{id:"rivertibtrapdoor",n:"River Tib Trapdoor (Lock 89)",a:"Rochdale Canal",pc:"M1 5JW",lat:53.4744,lng:-2.2436,c:"canals",s:"An arrow on the quayside marks a 215-year-old trapdoor draining the canal into a buried Roman-era river",q:"River Tib trapdoor Lock 89 Rochdale Canal Manchester",w:"",city:"manchester"},{id:"corbieres",n:"Corbières Wine Cavern",a:"City Centre",pc:"M2 7AQ",lat:53.4815,lng:-2.2447,c:"wine",s:"A vaulted underground wine bar with a cult jukebox, hidden off St Ann's Square",q:"Corbieres Wine Cavern Half Moon Street Manchester",w:"",city:"manchester"},{id:"overheadrailway",n:"Liverpool Overhead Railway Remnants",a:"Dockland Waterfront",pc:"L3 1DP",lat:53.4084,lng:-2.9916,c:"history",s:"The world's first electric elevated railway ran 60 years above the docks as the Dockers' Umbrella, then was scrapped so completely barely a column survives",q:"Liverpool Overhead Railway Dockers Umbrella",w:"",city:"liverpool"},{id:"williamsontunnels",n:"Williamson Tunnels",a:"Edge Hill",pc:"L7 3HA",lat:53.404,lng:-2.956,c:"oddity",s:"A reclusive tobacco merchant had gangs dig a labyrinth of grand brick tunnels under Edge Hill for no recorded reason",q:"Williamson Tunnels Edge Hill Liverpool",w:"",city:"liverpool"},{id:"casbahcoffeeclub",n:"Casbah Coffee Club",a:"West Derby",pc:"L12 7JG",lat:53.431,lng:-2.907,c:"music",s:"The real birthplace of the Beatles' live career was a suburban coal cellar, its ceilings still hand-painted by the band",q:"Casbah Coffee Club West Derby Liverpool",w:"",city:"liverpool"},{id:"philharmonicpub",n:"The Philharmonic Dining Rooms",a:"Georgian Quarter",pc:"L1 9BX",lat:53.4029,lng:-2.9694,c:"pub",s:"The only purpose-built Victorian pub listed Grade I — its rose-marble gents' toilets are a sightseeing attraction",q:"Philharmonic Dining Rooms Hope Street Liverpool",w:"",city:"liverpool"},{id:"princesroadsynagogue",n:"Princes Road Synagogue",a:"Toxteth",pc:"L8 1TG",lat:53.3935,lng:-2.962,c:"faith",s:"Behind a plain brick exterior hides the finest Moorish-Revival synagogue in Britain",q:"Princes Road Synagogue Liverpool",w:"",city:"liverpool"},{id:"stjamescemetery",n:"St James's Cemetery & Huskisson Monument",a:"Georgian Quarter",pc:"L1 7AZ",lat:53.3975,lng:-2.973,c:"death",s:"A sunken cemetery carved from a quarry below the cathedral, with rock-cut catacombs and the domed tomb of the first man killed by a train",q:"St James's Cemetery Gardens Liverpool Huskisson",w:"",city:"liverpool"},{id:"granbyfourstreets",n:"Granby Four Streets",a:"Toxteth",pc:"L8 2TJ",lat:53.387,lng:-2.956,c:"history",s:"Four near-derelict terraces saved by residents who painted and planted them through decades of managed decline — winning Assemble the 2015 Turner Prize",q:"Granby Four Streets Toxteth Assemble Turner Prize",w:"",city:"liverpool"},{id:"stlukeschurch",n:"St Luke's Bombed Out Church",a:"Ropewalks",pc:"L1 2TR",lat:53.402,lng:-2.976,c:"history",s:"A roofless Gothic shell kept exactly as the May 1941 Blitz left it — Liverpool's last surviving bomb site",q:"St Luke's Bombed Out Church Liverpool",w:"",city:"liverpool"},{id:"balticfleet",n:"The Baltic Fleet",a:"Wapping",pc:"L1 8DQ",lat:53.3977,lng:-2.9871,c:"pub",s:"The last freestanding pub of the old dock road",q:"Baltic Fleet pub Wapping Liverpool",w:"",city:"liverpool"},{id:"seftonpalmhouse",n:"Sefton Park Palm House",a:"Sefton Park",pc:"L17 1AP",lat:53.3805,lng:-2.9466,c:"green",s:"A domed Victorian glasshouse in Liverpool's grandest park",q:"Sefton Park Palm House Liverpool",w:"",city:"liverpool"},{id:"barrowlandballroom",n:"Barrowland Ballroom & the Barras",a:"Calton",pc:"G4 0TT",lat:55.854,lng:-4.236,c:"music",s:"A dance hall built on stilts above a barrow-market, crowned by one of the UK's first animated neon signs — and shadowed by the unsolved Bible John murders",q:"Barrowland Ballroom Barras Glasgow",w:"",city:"glasgow"},{id:"scotlandstreetschool",n:"Scotland Street School Museum",a:"Tradeston",pc:"G5 8QB",lat:55.
