        *{box-sizing:border-box;}
        :root{--bg:#FAF8F3;--surface:#FFFFFF;--surface2:#F4EFE6;--ink:#2C2522;--ink2:#5C524A;--ink3:#736A5E;--line:#E8E2D9;--red:#C8372D;--redb:#A82C24;--redbg:#FCF4F3;--redline:#E5ADA6;--ok:#1F9E5A;--okbg:#EAF6EE;--okline:#A6D4B7;--gold:#B8860B;--raise:#1A1712;--shadow:rgba(40,30,20,.08);}
        [data-theme="dark"]{--bg:#1C1A17;--surface:#252320;--surface2:#2F2C27;--ink:#EDE8E0;--ink2:#A89F94;--ink3:#7A7166;--line:#3A3630;--red:#C8372D;--redb:#E8584D;--redbg:#2E211E;--redline:#5A332E;--ok:#2FAE6A;--okbg:#16271D;--okline:#2A4636;--gold:#D4A017;--raise:#34302A;--shadow:rgba(0,0,0,.45);}
        .root{min-height:100vh;background:var(--bg);color:var(--ink);font-family:Arial,Helvetica,sans-serif;padding-bottom:74px;transition:background .25s ease,color .25s ease;}
        .wrap{max-width:560px;margin:0 auto;padding:0 20px;}
        .mast{padding:18px 0 4px;display:flex;align-items:baseline;justify-content:space-between;}
        .mast h1{font-family:Georgia,'Iowan Old Style','Times New Roman',serif;font-size:23px;font-weight:600;font-style:italic;margin:0;letter-spacing:0;color:var(--ink);}
        .mast span{font-size:12px;color:var(--ink3);}
        .anchor{display:flex;align-items:center;gap:9px;border:1px solid var(--line);border-radius:14px;padding:11px 13px;margin:14px 0 12px;}
        .anchor .t{flex:1;min-width:0;}
        .anchor .t b{display:block;font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
        .anchor .t i{font-style:normal;font-size:11px;color:var(--ink3);}
        .gps{display:flex;align-items:center;justify-content:center;width:38px;height:38px;border:1px solid var(--line);border-radius:12px;background:var(--surface);cursor:pointer;color:#C8372D;flex:none;}
        .livepill{display:inline-flex;align-items:center;gap:5px;border:1px solid var(--line);background:var(--surface);color:var(--ink3);border-radius:12px;padding:0 11px;height:38px;font-size:11px;font-weight:700;letter-spacing:.8px;cursor:pointer;font-family:inherit;flex:none;}
        .livepill .ldot{width:7px;height:7px;border-radius:50%;background:var(--surface2);}
        .livepill.on{border-color:#C8372D;color:#C8372D;}
        .livepill.on .ldot{background:#C8372D;animation:pulse 1.2s ease infinite;}
        @keyframes pulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:.4;transform:scale(.75);}}
        .row{display:flex;gap:6px;overflow-x:auto;padding:2px 0 9px;scrollbar-width:none;}
        .catwrap{display:flex;flex-wrap:wrap;gap:6px;padding:2px 0 9px;max-height:236px;overflow-y:auto;}
        .row::-webkit-scrollbar{display:none;}
        .rowlbl{font-size:10px;font-weight:700;letter-spacing:1px;color:var(--ink3);text-transform:uppercase;align-self:center;margin-right:2px;flex:none;}
        .chip{flex:none;border:1px solid var(--line);background:var(--surface);color:var(--ink2);border-radius:99px;padding:7px 13px;font-size:12.5px;cursor:pointer;white-space:nowrap;font-family:inherit;}
        .chip.on{background:var(--raise);border-color:#111;color:#fff;font-weight:700;}
        .chip.coll.on{background:var(--raise);border-color:#111;}
        .seg{display:inline-flex;border:1px solid var(--line);border-radius:99px;overflow:hidden;flex:none;}
        .seg button{border:none;background:var(--surface);color:var(--ink2);padding:7px 13px;font-size:12.5px;cursor:pointer;font-family:inherit;}
        .seg button.on{background:var(--raise);color:#fff;font-weight:700;}
        .cust{display:flex;gap:6px;margin:0 0 10px;}
        .cust input{flex:1;border:1px solid var(--line);border-radius:12px;padding:9px 12px;font-size:13px;font-family:inherit;color:var(--ink);}
        .cust button{border:none;background:var(--raise);color:#fff;border-radius:12px;padding:0 16px;font-weight:700;font-size:13px;cursor:pointer;font-family:inherit;}
        .note{font-size:12px;color:var(--ink3);margin:6px 0 10px;}
        .note.warn{color:#C8372D;}
        .viewbar{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;padding:2px 0 10px;}
        .viewbar::-webkit-scrollbar{display:none;}
        .vb{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;border:1px solid var(--line);background:var(--surface);color:var(--ink2);border-radius:14px;padding:13px 6px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;line-height:1;}
        .vb svg{opacity:.8;}
        .vb.on{background:var(--raise);border-color:#161310;color:#fff;}
        .vb.on svg{opacity:1;}
        .actbar{display:flex;gap:8px;padding:0 0 10px;}
        .actb{flex:1;display:inline-flex;align-items:center;justify-content:center;gap:6px;border:1px solid var(--line);background:var(--surface);color:var(--ink2);border-radius:12px;padding:9px 11px;font-size:12.5px;font-weight:600;cursor:pointer;font-family:inherit;}
        .actb.acc{border-color:#C8372D;color:#C8372D;}
        .actb:disabled{opacity:.6;}
        .vb:disabled{opacity:.5;}
        .vbsep{width:1px;height:24px;background:var(--surface2);flex:none;margin:0 2px;}
        .tabs{display:flex;gap:18px;border-bottom:1px solid var(--line);margin:2px 0 0;}
        .tabs .tb{border:none;background:none;font-family:inherit;font-size:13.5px;color:var(--ink3);padding:8px 2px 10px;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;}
        .tabs .tb.on{color:var(--ink);font-weight:700;border-bottom-color:#111;}
        .count{font-size:11.5px;color:var(--ink3);margin:12px 0 6px;}
        /* photo tiles */
        .tile{width:70px;height:70px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:27px;flex:none;overflow:hidden;}
        .tile .img,.img{width:100%;height:100%;object-fit:cover;}
        .tileBig{width:100%;height:170px;display:flex;align-items:center;justify-content:center;font-size:44px;overflow:hidden;}
        .tileBig.tileEmo{height:116px;font-size:40px;}
        .imgBig{width:100%;height:100%;object-fit:cover;}
        /* map */
        .mapwrap{height:52vh;min-height:340px;border:1px solid var(--line);border-radius:18px;overflow:hidden;margin-bottom:10px;}
        .leaflet-container{position:relative;overflow:hidden;background:var(--surface2);font-family:inherit;height:100%;width:100%;}
        .leaflet-pane,.leaflet-tile,.leaflet-marker-icon,.leaflet-marker-shadow,.leaflet-tile-container,.leaflet-map-pane svg,.leaflet-map-pane canvas,.leaflet-zoom-box,.leaflet-image-layer,.leaflet-layer{position:absolute;left:0;top:0;}
        .leaflet-tile{width:256px;height:256px;}
        .leaflet-top,.leaflet-bottom{position:absolute;z-index:1000;pointer-events:none;}
        .leaflet-top{top:0}.leaflet-bottom{bottom:0}.leaflet-right{right:0}.leaflet-left{left:0}
        .leaflet-control{pointer-events:auto;}
        .mk{width:28px;height:28px;border-radius:50%;background:var(--surface);border:1.5px solid #C9C9C5;display:flex;align-items:center;justify-content:center;font-size:14px;box-shadow:0 1px 4px rgba(0,0,0,.18);cursor:pointer;}
        .mk.sv{border-color:#C8372D;} .mk.vf{border-color:#1F9E5A;border-width:2px;}

        /* cards */

        .body{padding:0 14px 12px;}
        .lore{font-size:13.5px;line-height:1.6;color:var(--ink);margin:2px 0 9px;}
        .src{font-size:11px;color:var(--ink3);margin-bottom:9px;}
        .comp{display:block;width:100%;text-align:left;background:var(--surface2);border:1px solid var(--line);border-radius:10px;padding:8px 11px;font-size:12px;color:var(--ink2);cursor:pointer;font-family:inherit;margin-bottom:10px;}

        .lite{display:inline-flex;align-items:center;gap:5px;border:1px solid var(--line);color:var(--ink);background:var(--surface);border-radius:10px;padding:8px 11px;font-size:12.5px;text-decoration:none;font-family:inherit;cursor:pointer;}
        .profsec{display:flex;align-items:center;justify-content:space-between;width:100%;background:none;border:none;padding:5px 2px;margin:10px 0 4px;cursor:pointer;font-family:inherit;}
        .checkin{display:inline-flex;align-items:center;gap:5px;border:1px solid #1F9E5A;color:#1F9E5A;background:var(--surface);border-radius:10px;padding:8px 11px;font-size:12.5px;font-weight:700;cursor:pointer;font-family:inherit;}

        .empty{text-align:center;color:var(--ink3);font-size:13.5px;padding:36px 14px;line-height:1.6;}

        .rsvg{width:100%;height:auto;display:block;}

        .tdesc{font-size:11.5px;line-height:1.55;color:var(--ink3);margin:9px 2px 0;}
        .tgt .tt{flex:1;min-width:0;}

        .ic.dark{border-color:#2A2E33;background:#1F2226;color:var(--ink3);}

        .stopt span{font-size:11px;color:var(--ink3);}
        .stopd{font-size:11.5px;color:#C8372D;font-weight:700;flex:none;}
        /* stats */
        .statgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:6px 0 12px;}
        .statcard{border:1px solid var(--line);border-radius:18px;padding:14px 15px;box-shadow:0 1px 2px var(--shadow);}

        .catrow{display:flex;align-items:center;gap:9px;padding:8px 2px;}

        .glance{background:#0F1113;border-radius:20px;padding:18px 16px 16px;margin-bottom:10px;color:#fff;min-height:52vh;display:flex;flex-direction:column;}
        .gtop{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}

        .gdial{flex:1;display:flex;align-items:center;justify-content:center;padding:6px 0;}
        .gbig{font-size:64px;font-weight:800;line-height:.9;letter-spacing:-1px;text-align:center;}

        .gname{font-size:20px;font-weight:700;text-align:center;margin-top:8px;}
        .gmeta{font-size:12.5px;color:var(--ink3);text-align:center;margin-top:4px;}

        .gnav{display:flex;align-items:center;gap:8px;margin-top:14px;}

        /* ---- editorial cards ---- */
        .ec{background:var(--surface2);border:1px solid var(--line);border-radius:18px;margin-bottom:18px;overflow:hidden;transition:box-shadow .15s ease;content-visibility:auto;contain-intrinsic-size:0 104px;}

        .ec-near{font-size:11px;color:var(--ink3);}

        .ec-where .ec-dist{color:#C8372D;font-weight:700;}
        .ec-dek{font-family:Georgia,'Iowan Old Style','Times New Roman',serif;font-size:15.5px;line-height:1.72;color:var(--ink);margin:0 0 18px;}

        .msthelp{display:flex;align-items:center;gap:7px;}
        .helpb{width:20px;height:20px;border-radius:50%;border:1px solid #D2CBBE;background:var(--surface);color:var(--ink3);font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;line-height:1;padding:0;}
