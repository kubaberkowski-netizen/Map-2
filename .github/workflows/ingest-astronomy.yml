name: Ingest astronomy

# Adds "look up tonight" events (meteor-shower peaks + full moons) to the feed
# for every city. No API key — peaks are a fixed calendar and full moons are
# computed. Runs daily + manual. Reuses SUPABASE_SERVICE_ROLE_KEY.
on:
  schedule:
    - cron: "30 6 * * *" # 06:30 UTC daily
  workflow_dispatch: {}
jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
      - name: Ingest
        run: node scripts/ingest-astronomy.mjs
        env:
          SUPABASE_URL: https://fpngxchltuovtsyzigul.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          INGEST_STATUS: approved
