name: Ingest Skiddle

# Fills the events feed with UK grassroots events (clubs, gigs, festivals) from
# Skiddle. No terminal needed — add one repo secret: SKIDDLE_KEY (free key from
# skiddle.com/api). Reuses SUPABASE_SERVICE_ROLE_KEY. Dedupes by ext_id 'sk:'.
on:
  schedule:
    - cron: "30 5 * * *" # daily, just after the Ticketmaster pull
  workflow_dispatch: {}

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
      - name: Ingest
        run: node scripts/ingest-skiddle.mjs
        env:
          SKIDDLE_KEY: ${{ secrets.SKIDDLE_KEY }}
          SUPABASE_URL: https://fpngxchltuovtsyzigul.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          INGEST_STATUS: approved
