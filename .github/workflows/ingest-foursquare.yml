name: Ingest Foursquare

# Quality restaurants/cafés/bars into the places table (rating-filtered, no chains).
# Add one repo secret: FOURSQUARE_KEY (location.foursquare.com/developer).
# Reuses SUPABASE_SERVICE_ROLE_KEY. Dedupes by ext_id 'fsq:'.
on:
  schedule:
    - cron: "0 4 * * 1" # Mondays 04:00 UTC (places are fairly static)
  workflow_dispatch: {}

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
      - name: Ingest
        run: node scripts/ingest-foursquare.mjs
        env:
          FOURSQUARE_KEY: ${{ secrets.FOURSQUARE_KEY }}
          SUPABASE_URL: https://fpngxchltuovtsyzigul.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          INGEST_STATUS: approved
