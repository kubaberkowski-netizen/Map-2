name: Ingest parkrun

# Fills the Flâneur events feed with parkrun (free, weekly 5k) courses so people
# can check in at a parkrun in person. Runs daily to keep the rolling few weeks
# of Saturdays fresh, plus a manual "Run workflow" button. No API key needed —
# parkrun publishes its course list publicly. Reuses SUPABASE_SERVICE_ROLE_KEY.
on:
  schedule:
    - cron: "0 6 * * *" # every day at 06:00 UTC
  workflow_dispatch: {} # manual trigger from the Actions tab

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
      - name: Ingest
        run: node scripts/ingest-parkrun.mjs
        env:
          SUPABASE_URL: https://fpngxchltuovtsyzigul.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          INGEST_STATUS: approved
