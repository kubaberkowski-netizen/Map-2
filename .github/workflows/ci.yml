name: CI

# Build gate — the "one bad commit white-screens prod" tripwire (audit P0.2).
# Runs on every push/PR: rebuilds from source, checks the committed bundle is
# fresh + parses, and asserts the structural invariants that would white-screen
# the app if wrong. Does NOT touch deployment (GitHub Pages serves main as-is).
on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  build-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
      - run: npm ci

      # build.js validates spots.json (categories/cities/coords), regenerates
      # index.html + SEO, runs node --check + the CLAUDE.md checks, and refuses
      # to write on any hard error.
      - name: Build (validate + regenerate)
        run: node build.js

      # The committed bundle must equal a fresh build — catches "edited the
      # template/spots but forgot to rebuild" (the deployed file would be stale).
      - name: Committed index.html is up to date
        run: |
          git diff --exit-code -- index.html \
            || { echo "::error::index.html is stale — run 'npm run build' and commit the result"; exit 1; }

      # Parse the deployed app bundle (largest inline <script>) as a syntax gate.
      - name: node --check the app bundle
        run: |
          node -e 'const fs=require("fs");const h=fs.readFileSync("index.html","utf8");const m=h.match(/<script>[\s\S]*?<\/script>/g)||[];const big=m.map(s=>s.slice(8,-9)).sort((a,b)=>b.length-a.length)[0]||"";fs.writeFileSync("/tmp/app.js",big);'
          node --check /tmp/app.js

      # Structural invariants (unknown category slug / missing World => white-screen).
      - name: Structural counts
        run: |
          W=$(grep -oE 'match:[[:space:]]*e[[:space:]]*=>' index.html | wc -l)
          C=$(grep -oE '[A-Za-z0-9_]+:\{l:"' index.html | wc -l)
          E=$(grep -oE 'id:"[^"]*",n:"' index.html | wc -l)
          echo "worlds=$W categories=$C entries=$E"
          [ "$W" = "80" ]    || { echo "::error::Worlds count $W != 80"; exit 1; }
          [ "$C" = "43" ]    || { echo "::error::categories $C != 43"; exit 1; }
          [ "$E" -ge "9000" ] || { echo "::error::entry count $E unexpectedly low"; exit 1; }
