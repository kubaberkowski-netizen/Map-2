<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://unpkg.com; style-src 'self' 'unsafe-inline' https://unpkg.com; img-src 'self' data: blob: https://*.basemaps.cartocdn.com https://*.tile.openstreetmap.org; connect-src 'self' https://*.supabase.co https://api.open-meteo.com https://air-quality-api.open-meteo.com; font-src 'self'; base-uri 'self'; object-src 'none'" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="robots" content="index,follow" />
<title>A collection — Flâneur</title>
<meta property="og:type" content="website" />
<meta property="og:site_name" content="Flâneur" />
<meta id="og-title" property="og:title" content="A collection — Flâneur" />
<meta id="og-desc" property="og:description" content="A hand-picked collection of places, mapped with Flâneur." />
<meta name="description" id="m-desc" content="A hand-picked collection of places, mapped with Flâneur." />
<meta name="twitter:card" content="summary_large_image" />
<meta id="og-image" property="og:image" content="" />
<meta id="tw-image" name="twitter:image" content="" />
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
  :root{--bg:#FAF8F3;--surface:#FFFFFF;--ink:#2C2522;--ink2:#5C524A;--ink3:#736A5E;--line:#E7E0D4;--accent:#C8372D;}
  *{box-sizing:border-box;}
  html,body{margin:0;background:var(--bg);color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    -webkit-text-size-adjust:100%;}
  .wrap{max-width:620px;margin:0 auto;padding:22px 18px calc(40px + env(safe-area-inset-bottom));}
  .brand{display:flex;align-items:center;gap:8px;font-weight:800;font-size:15px;letter-spacing:.01em;margin-bottom:20px;text-decoration:none;color:var(--ink);}
  .brand .dot{width:9px;height:9px;border-radius:50%;background:var(--accent);}
  .eyebrow{font-size:11px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:var(--accent);margin-bottom:6px;}
  h1{font-family:Georgia,"Times New Roman",serif;font-weight:700;font-size:30px;line-height:1.15;margin:0 0 6px;}
  h1 .e{margin-right:8px;}
  .meta{font-size:14px;color:var(--ink3);margin-bottom:4px;}
  .note{font-family:Georgia,serif;font-style:italic;font-size:16px;color:var(--ink2);margin:10px 0 0;line-height:1.5;}
  #map{height:300px;border-radius:16px;overflow:hidden;border:1px solid var(--line);margin:18px 0;background:var(--surface);}
  .leaflet-container{font:inherit;background:var(--bg);}
  .pin{width:26px;height:26px;background:var(--accent);color:#fff;border:2px solid #fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font:700 13px/1 system-ui;box-shadow:0 2px 6px rgba(0,0,0,.3);}
  ol.places{list-style:none;margin:0;padding:0;counter-reset:p;}
  ol.places li{display:flex;align-items:flex-start;gap:12px;background:var(--surface);border:1px solid var(--line);border-radius:13px;padding:13px 14px;margin-bottom:9px;}
  .num{counter-increment:p;flex:none;width:24px;height:24px;border-radius:50%;background:var(--accent);color:#fff;font:700 12px/24px system-ui;text-align:center;}
  .num::before{content:counter(p);}
  .pbody{flex:1;min-width:0;}
  .pname{font-size:15.5px;font-weight:700;}
  .pname .e{margin-right:5px;}
  .pcat{font-size:12.5px;color:var(--ink3);margin-top:1px;}
  /* day-by-day itinerary */
  .day{margin:16px 0 4px;}
  .dayh{font:800 12px/1 system-ui;letter-spacing:.08em;text-transform:uppercase;color:var(--accent);margin:0 0 9px;}
  .stop{display:flex;align-items:flex-start;gap:12px;background:var(--surface);border:1px solid var(--line);border-radius:13px;padding:13px 14px;}
  .num2{flex:none;width:24px;height:24px;border-radius:50%;background:var(--accent);color:#fff;font:700 12px/24px system-ui;text-align:center;}
  .parr{font:600 12.5px system-ui;color:var(--ink2);margin-top:3px;}
  .poh{font:600 12px system-ui;color:var(--ink3);margin-top:3px;}
  .wx{font:600 13px system-ui;color:var(--ink2);margin:6px 0 0;min-height:1px;}
  .leg{font:600 12px system-ui;color:var(--ink3);margin:8px 0 8px 12px;}
  .cta{display:block;text-align:center;background:var(--accent);color:#fff;text-decoration:none;border-radius:13px;padding:14px;font-weight:700;font-size:15px;margin:22px 0 8px;}
  .sub{text-align:center;font-size:12.5px;color:var(--ink3);}
  .state{text-align:center;color:var(--ink3);padding:60px 16px;font-size:15px;}
  .foot{margin-top:30px;font-size:12px;color:var(--ink3);text-align:center;}
  .foot a{color:var(--ink3);}
  .cmth{font-size:11px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:var(--accent);margin:26px 0 10px;}
  .cmt{background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:11px 13px;margin-bottom:8px;}
  .cmtwho{font-size:12.5px;font-weight:700;color:var(--ink);}
  .cmtbody{font-size:14px;color:var(--ink2);margin-top:2px;line-height:1.4;word-break:break-word;}
  .cmtempty{font-size:13px;color:var(--ink3);}
</style>
</head>
<body>
<div class="wrap">
  <a class="brand" href="./"><span class="dot"></span>Flâneur</a>
  <div id="app"><div class="state">Loading…</div></div>
  <div class="foot"><a href="./">Flâneur</a> — a personal guide to offbeat, storied places. · <a href="./privacy.html">Privacy</a></div>
</div>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
(function(){
  var SB_URL="https://fpngxchltuovtsyzigul.supabase.co";
  var SB_ANON="sb_publishable_At343ximg1anAi2TkHyCXw_82vw4wMB";
  var app=document.getElementById("app");
  function esc(t){return String(t==null?"":t).replace(/[&<>"']/g,function(c){return{"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c];});}
  function fmtMin(m){m=Math.round(m);var h=Math.floor(m/60)%24,mm=(m%60+60)%60,ap=h<12?"am":"pm",h12=h%12;if(h12===0)h12=12;return h12+":"+(mm<10?"0":"")+mm+ap;}
  function wxEmoji(c){c=+c;if(c===0)return"☀️";if(c<=3)return"⛅";if(c===45||c===48)return"🌫️";if(c>=51&&c<=67)return"🌧️";if(c>=71&&c<=77)return"❄️";if(c>=80&&c<=82)return"🌦️";if(c>=95)return"⛈️";return"🌥️";}
  function aqiWord(a){a=+a;return a<=20?" Good":a<=40?" Fair":a<=60?" Moderate":a<=80?" Poor":a<=100?" Very poor":" Extreme";}
  function state(msg){app.innerHTML='<div class="state">'+esc(msg)+'</div>';}
  function slugParam(){try{return new URLSearchParams(location.search).get("s");}catch(e){return null;}}
  function setMeta(title,desc){
    document.title=title;
    var ot=document.getElementById("og-title");ot&&ot.setAttribute("content",title);
    var od=document.getElementById("og-desc");od&&od.setAttribute("content",desc);
    var md=document.getElementById("m-desc");md&&md.setAttribute("content",desc);
  }
  function render(c){
    var spots=Array.isArray(c.spots)?c.spots.filter(function(s){return s&&typeof s.lat==="number"&&typeof s.lng==="number";}):[];
    var itin=spots.length&&typeof spots[0].d==="number";
    var ndays=itin?(Math.max.apply(null,spots.map(function(s){return s.d||0;}))+1):0;
    var twk=0;if(itin){spots.forEach(function(s){twk+=s.wk||0;});twk=Math.round(twk*10)/10;}
    var metaTitle=(c.name||(itin?"An itinerary":"A collection"))+" — Flâneur";
    var desc=itin
      ?(ndays+"-day walking itinerary · "+spots.length+" stops"+(c.city?" in "+c.city:"")+", planned on Flâneur"+(c.note?": "+c.note:"."))
      :(spots.length+" place"+(spots.length===1?"":"s")+(c.city?" in "+c.city:"")+", hand-picked on Flâneur"+(c.note?": "+c.note:"."));
    setMeta(metaTitle,desc.slice(0,180));
    try{var _img=SB_URL+"/storage/v1/object/public/cards/"+encodeURIComponent(c.slug)+".png";["og-image","tw-image"].forEach(function(id){var el=document.getElementById(id);if(el)el.setAttribute("content",_img);});}catch(e){}
    var h='<div class="eyebrow">A Flâneur '+(itin?'itinerary':'collection')+'</div>';
    h+='<h1>'+(c.emoji?'<span class="e">'+esc(c.emoji)+'</span>':'')+esc(c.name||(itin?"An itinerary":"A collection"))+'</h1>';
    h+='<div class="meta">'+(itin
      ?(ndays+'-day itinerary · '+spots.length+' stops · '+twk+' km walking'+(c.city?' · '+esc(c.city):''))
      :(spots.length+' place'+(spots.length===1?'':'s')+(c.city?' · '+esc(c.city):'')))+'</div>';
    if(c.note)h+='<p class="note">'+esc(c.note)+'</p>';
    h+='<div class="wx" id="wx"></div>';
    h+='<div id="map"></div>';
    if(itin){
      var gi=0,cur=-1;
      spots.forEach(function(s){
        var nd=s.d||0;
        if(nd!==cur){if(cur!==-1)h+='</div>';cur=nd;h+='<div class="day"><div class="dayh">Day '+(cur+1)+'</div>';}
        else if(s.wm||s.wk)h+='<div class="leg">🚶 '+(s.wm||0)+' min walk · '+(Math.round((s.wk||0)*10)/10)+' km</div>';
        gi++;
        h+='<div class="stop"><span class="num2">'+gi+'</span><div class="pbody"><div class="pname">'+(s.e?'<span class="e">'+esc(s.e)+'</span>':'')+esc(s.n||"Place")+'</div>'+
           '<div class="pcat">'+esc([s.cl,s.a].filter(Boolean).join(" · "))+'</div>'+
           (typeof s.arr==="number"?'<div class="parr">arrive '+fmtMin(s.arr)+(s.stay?' · stay '+s.stay+'m':'')+'</div>':'')+
           (s.oh?'<div class="poh">🕒 '+esc(s.oh)+'</div>':'')+'</div></div>';
      });
      if(cur!==-1)h+='</div>';
    }else{
      h+='<ol class="places">';
      spots.forEach(function(s){
        h+='<li><span class="num"></span><div class="pbody"><div class="pname">'+(s.e?'<span class="e">'+esc(s.e)+'</span>':'')+esc(s.n||"Place")+'</div>'+
           '<div class="pcat">'+esc([s.cl,s.a].filter(Boolean).join(" · "))+'</div>'+
           (s.oh?'<div class="poh">🕒 '+esc(s.oh)+'</div>':'')+'</div></li>';
      });
      h+='</ol>';
    }
    h+='<a class="cta" href="./#c='+encodeURIComponent(c.slug||"")+'">Open in Flâneur</a>';
    h+='<div class="sub">'+(itin?'Plan and share your own trips in the app.':'Build and share your own collections in the app.')+'</div>';
    h+='<div id="cmts"></div>';
    app.innerHTML=h;
    renderComments(c.slug);
    try{sb.from("collection_likes").select("*",{count:"exact",head:true}).eq("slug",c.slug).then(function(lc){var n=(lc&&lc.count)||0;if(n>0){var mEl=document.querySelector(".meta");if(mEl)mEl.insertAdjacentHTML("beforeend"," · \u2665 "+n);}},function(){});}catch(e){}
    if(window.L&&spots.length){
      try{
        var map=L.map("map",{scrollWheelZoom:false,attributionControl:true});
        L.tileLayer("https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}.png",{maxZoom:19,subdomains:"abcd",attribution:'© OpenStreetMap, © CARTO'}).addTo(map);
        var b=[];
        spots.forEach(function(s,i){
          var mk=L.marker([s.lat,s.lng],{icon:L.divIcon({html:'<div class="pin">'+(i+1)+'</div>',className:"",iconSize:[26,26],iconAnchor:[13,13]})});
          mk.addTo(map);b.push([s.lat,s.lng]);
        });
        if(b.length===1)map.setView(b[0],14);else map.fitBounds(b,{padding:[36,36],maxZoom:15});
        setTimeout(function(){try{map.invalidateSize();}catch(e){}},120);
      }catch(e){var m=document.getElementById("map");if(m)m.style.display="none";}
    }else{var m=document.getElementById("map");if(m)m.style.display="none";}
    if(spots.length){var w0=spots[0],wq="latitude="+w0.lat+"&longitude="+w0.lng;Promise.all([
      fetch("https://api.open-meteo.com/v1/forecast?"+wq+"&current=temperature_2m,apparent_temperature,relative_humidity_2m,wind_speed_10m,weather_code").then(function(r){return r.ok?r.json():null;}).catch(function(){return null;}),
      fetch("https://air-quality-api.open-meteo.com/v1/air-quality?"+wq+"&current=european_aqi").then(function(r){return r.ok?r.json():null;}).catch(function(){return null;})
    ]).then(function(a){var j=a[0],aq=a[1];if(!j||!j.current)return;var cu=j.current,parts=[wxEmoji(cu.weather_code)+" Now"+(c.city?" in "+c.city:"")+": "+Math.round(cu.temperature_2m)+"°C"];if(cu.apparent_temperature!=null)parts.push("feels "+Math.round(cu.apparent_temperature)+"°");if(cu.relative_humidity_2m!=null)parts.push("💧"+Math.round(cu.relative_humidity_2m)+"%");if(cu.wind_speed_10m!=null)parts.push("🌬 "+Math.round(cu.wind_speed_10m)+" km/h");if(aq&&aq.current&&aq.current.european_aqi!=null)parts.push("AQI "+Math.round(aq.current.european_aqi)+aqiWord(aq.current.european_aqi));var el=document.getElementById("wx");if(el)el.textContent=parts.join(" · ");}).catch(function(){});}
  }
  function renderComments(slug){
    try{sb.from('collection_comments').select('id,user_id,body,created_at').eq('slug',slug).order('created_at',{ascending:true}).limit(200).then(function(r){
      var rows=(r&&r.data)||[];var box=document.getElementById('cmts');if(!box)return;
      if(!rows.length){box.innerHTML='<div class=\'cmth\'>Comments</div><div class=\'cmtempty\'>No comments yet.</div>';return;}
      var ids=rows.map(function(x){return x.user_id;});
      sb.from('public_profiles').select('user_id,username,display_name').in('user_id',ids).then(function(pr){
        var pm={};((pr&&pr.data)||[]).forEach(function(p){pm[p.user_id]=p;});
        var h='<div class=\'cmth\'>Comments · '+rows.length+'</div>';
        rows.forEach(function(m){var a=pm[m.user_id];h+='<div class=\'cmt\'><div class=\'cmtwho\'>'+esc(a?('@'+a.username):'someone')+'</div><div class=\'cmtbody\'>'+esc(m.body)+'</div></div>';});
        box.innerHTML=h;
      },function(){});
    },function(){});}catch(e){}
  }
  var slug=slugParam();
  if(!slug){state("Nothing specified.");return;}
  if(!window.supabase){state("Couldn’t load. Please try again.");return;}
  var sb=window.supabase.createClient(SB_URL,SB_ANON);
  sb.from("collections").select("*").eq("slug",slug).maybeSingle().then(function(r){
    if(r.error||!r.data){state("This link couldn’t be found — it may have been made private.");return;}
    render(r.data);
  },function(){state("Couldn’t load this.");});
})();
</script>
</body>
</html>
